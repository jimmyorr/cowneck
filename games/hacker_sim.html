<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Sim</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RNVL7JZVJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-6RNVL7JZVJ');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { Terminal, Cpu, Database, Server, MousePointer2, Activity, Wifi } from 'https://esm.sh/lucide-react';


// --- GAME DATA ---
const INITIAL_UPGRADES = [
  {
    id: 'script',
    name: 'Auto-Clicker Script',
    description: 'A basic script to scrape data. (+1 MB/s)',
    baseCost: 15,
    type: 'idle',
    value: 1,
    icon: '📜',
    owned: 0,
  },
  {
    id: 'keyboard',
    name: 'Mechanical Keyboard',
    description: 'Faster typing means more data. (+1 MB/click)',
    baseCost: 50,
    type: 'click',
    value: 1,
    icon: '⌨️',
    owned: 0,
  },
  {
    id: 'botnet',
    name: 'Botnet Node',
    description: 'Infect a smart fridge to mine data. (+5 MB/s)',
    baseCost: 100,
    type: 'idle',
    value: 5,
    icon: '🕸️',
    owned: 0,
  },
  {
    id: 'overclock',
    name: 'Overclocked CPU',
    description: 'Liquid cooling for maximum clicks! (+5 MB/click)',
    baseCost: 500,
    type: 'click',
    value: 5,
    icon: '🔥',
    owned: 0,
  },
  {
    id: 'server',
    name: 'Server Rack',
    description: 'Dedicated hardware for serious processing. (+50 MB/s)',
    baseCost: 1100,
    type: 'idle',
    value: 50,
    icon: '🗄️',
    owned: 0,
  },
  {
    id: 'datacenter',
    name: 'Data Center',
    description: 'An entire warehouse crunching numbers. (+200 MB/s)',
    baseCost: 8500,
    type: 'idle',
    value: 200,
    icon: '🏢',
    owned: 0,
  },
  {
    id: 'quantum',
    name: 'Quantum Array',
    description: 'Bypass encryptions before they exist. (+1000 MB/s)',
    baseCost: 50000,
    type: 'idle',
    value: 1000,
    icon: '⚛️',
    owned: 0,
  }
];

function App() {
  // --- STATE ---
  const [data, setData] = useState(0);
  const [totalEarned, setTotalEarned] = useState(0);
  const [upgrades, setUpgrades] = useState(INITIAL_UPGRADES);
  
  // Animation states
  const [clickEffects, setClickEffects] = useState([]);
  const [isBouncing, setIsBouncing] = useState(false);
  const catRef = useRef(null);

  // --- DERIVED STATS ---
  const clickPower = 1 + upgrades
    .filter(u => u.type === 'click')
    .reduce((sum, u) => sum + (u.value * u.owned), 0);
    
  const passiveIncome = upgrades
    .filter(u => u.type === 'idle')
    .reduce((sum, u) => sum + (u.value * u.owned), 0);

  // --- GAME LOOP ---
  // Adds passive income every second
  useEffect(() => {
    if (passiveIncome === 0) return;
    
    const interval = setInterval(() => {
      setData(prev => prev + passiveIncome);
      setTotalEarned(prev => prev + passiveIncome);
    }, 1000);
    
    return () => clearInterval(interval);
  }, [passiveIncome]);

  // Clean up old click effects
  useEffect(() => {
    if (clickEffects.length > 0) {
      const timeout = setTimeout(() => {
        setClickEffects(prev => prev.slice(1));
      }, 800);
      return () => clearTimeout(timeout);
    }
  }, [clickEffects]);

  // --- ACTIONS ---
  const handleCatClick = (e) => {
    // Add currency
    setData(prev => prev + clickPower);
    setTotalEarned(prev => prev + clickPower);
    
    // Trigger bounce animation
    setIsBouncing(true);
    setTimeout(() => setIsBouncing(false), 100);

    // Create floating text effect
    if (e && e.clientX) {
      const rect = catRef.current.getBoundingClientRect();
      // Calculate position relative to the cat container
      const x = e.clientX - rect.left - 20 + (Math.random() * 40 - 20); 
      const y = e.clientY - rect.top - 20;

      const newEffect = {
        id: Date.now() + Math.random(),
        x,
        y,
        value: clickPower
      };
      setClickEffects(prev => [...prev, newEffect]);
    }
  };

  const buyUpgrade = (upgradeId) => {
    const upgrade = upgrades.find(u => u.id === upgradeId);
    if (!upgrade) return;

    const currentCost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.owned));
    
    if (data >= currentCost) {
      setData(prev => prev - currentCost);
      setUpgrades(prev => prev.map(u => 
        u.id === upgradeId ? { ...u, owned: u.owned + 1 } : u
      ));
    }
  };

  // --- UTILS ---
  const formatMoney = (num) => {
    if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(2) + 'k';
    return Math.floor(num).toLocaleString();
  };

  return (
    <div className="min-h-screen bg-slate-950 text-green-400 font-mono selection:bg-green-900 selection:text-green-100">
      {/* CSS for custom animations */}
      <style dangerouslySetInnerHTML={{__html: `
        @keyframes floatUp {
          0% { opacity: 1; transform: translateY(0) scale(1); }
          100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }
        .float-animation {
          animation: floatUp 0.8s ease-out forwards;
          pointer-events: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
          width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: #0f172a; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #166534; 
          border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: #15803d; 
        }
      `}} />

      {/* HEADER */}
      <header className="bg-slate-900 text-green-500 p-4 border-b border-green-900 shadow-[0_4px_20px_-5px_rgba(34,197,94,0.2)] sticky top-0 z-10">
        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
          <div className="flex items-center gap-3">
            <Terminal className="w-8 h-8 text-green-400" />
            <div>
              <h1 className="text-2xl font-bold tracking-tight">HACK_NET</h1>
              <p className="text-green-600 text-xs uppercase tracking-wider font-semibold">Data Extraction Protocol</p>
            </div>
          </div>
          <div className="bg-slate-950 rounded-lg px-6 py-2 border border-green-800 shadow-inner flex flex-col items-center md:items-end">
            <div className="text-sm text-green-600 flex items-center gap-1">
              <Database className="w-4 h-4" /> 
              Harvested Data
            </div>
            <div className="text-2xl font-bold text-green-400 drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]">
              {formatMoney(data)} <span className="text-sm text-green-600">MB</span>
            </div>
          </div>
        </div>
      </header>

      {/* MAIN CONTENT */}
      <main className="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">
        
        {/* LEFT COLUMN: THE TERMINAL (Click Area) */}
        <div className="lg:col-span-5 flex flex-col gap-6">
          <div className="bg-slate-900 rounded-2xl shadow-xl border border-green-900 overflow-hidden flex flex-col">
            <div className="bg-slate-950 p-4 text-center border-b border-green-900">
              <h2 className="text-lg font-bold text-green-500">Target Server</h2>
              <p className="text-sm text-green-700">Extract data by attacking the mainframe!</p>
            </div>
            
            <div className="p-8 flex-grow flex items-center justify-center relative select-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-slate-950">
              
              {/* Click Effects Container */}
              <div className="absolute inset-0 z-10 pointer-events-none" ref={catRef}>
                {clickEffects.map(effect => (
                  <div 
                    key={effect.id}
                    className="float-animation absolute text-green-400 font-bold text-xl drop-shadow-[0_0_5px_rgba(34,197,94,1)] flex items-center"
                    style={{ left: effect.x, top: effect.y }}
                  >
                    +<Wifi className="w-4 h-4 mr-1" />{effect.value}
                  </div>
                ))}
              </div>

              {/* The Hacker Button */}
              <button 
                onClick={handleCatClick}
                className={`relative transition-transform duration-75 active:scale-95 focus:outline-none ${isBouncing ? 'scale-95' : 'scale-100'}`}
                style={{ WebkitTapHighlightColor: 'transparent' }}
              >
                {/* Glow behind terminal */}
                <div className="absolute inset-0 bg-green-500/20 blur-2xl rounded-full"></div>

                {/* Terminal Illustration */}
                <div className="relative z-10 text-[120px] leading-none filter drop-shadow-[0_0_15px_rgba(34,197,94,0.4)] hover:drop-shadow-[0_0_25px_rgba(34,197,94,0.6)] transition-all">
                  🖥️
                  {/* Lock icon overlay */}
                  <div className="absolute bottom-4 right-4 text-3xl animate-pulse">
                    🔓
                  </div>
                </div>
              </button>
            </div>

            {/* Stats Bar */}
            <div className="bg-slate-950 text-green-500 p-4 grid grid-cols-2 gap-4 divide-x divide-green-900 text-center text-sm border-t border-green-900">
              <div>
                <p className="uppercase text-xs font-bold text-green-700 mb-1">Bandwidth</p>
                <p className="text-lg font-bold flex items-center justify-center gap-1">
                  <MousePointer2 className="w-4 h-4 text-green-600" /> {formatMoney(clickPower)} <span className="text-xs text-green-600">MB/click</span>
                </p>
              </div>
              <div>
                <p className="uppercase text-xs font-bold text-green-700 mb-1">Auto-Harvest</p>
                <p className="text-lg font-bold flex items-center justify-center gap-1">
                  <Activity className="w-4 h-4 text-green-600" /> {formatMoney(passiveIncome)} <span className="text-xs text-green-600">MB/sec</span>
                </p>
              </div>
            </div>
          </div>
          
          {/* Achievement / Stats Panel */}
          <div className="bg-slate-900 rounded-2xl shadow-sm border border-green-900 p-6">
             <h3 className="font-bold text-green-400 mb-4 flex items-center gap-2">
               <Cpu className="w-5 h-5" /> System Specs
             </h3>
             <div className="space-y-3 text-sm">
               <div className="flex justify-between items-center py-2 border-b border-slate-800">
                 <span className="text-green-700">Total Data Extracted</span>
                 <span className="font-bold text-green-400">{formatMoney(totalEarned)} MB</span>
               </div>
               <div className="flex justify-between items-center py-2 border-b border-slate-800">
                 <span className="text-green-700">Active Scripts/Hardware</span>
                 <span className="font-bold text-green-400">
                   {upgrades.reduce((sum, u) => sum + u.owned, 0)}
                 </span>
               </div>
               <div className="flex justify-between items-center py-2">
                 <span className="text-green-700">Trace Level</span>
                 <span className="font-bold text-green-600">0.00% (Undetected)</span>
               </div>
             </div>
          </div>
        </div>

        {/* RIGHT COLUMN: UPGRADES SHOP */}
        <div className="lg:col-span-7 flex flex-col gap-4">
          <div className="bg-slate-900 rounded-2xl shadow-xl border border-green-900 overflow-hidden">
            <div className="bg-slate-950 p-4 flex justify-between items-center border-b border-green-900">
              <h2 className="text-lg font-bold flex items-center gap-2 text-green-400">
                <Server className="w-5 h-5" /> Data Brokers & Upgrades
              </h2>
              <span className="text-xs bg-slate-800 px-3 py-1 rounded border border-green-800 text-green-500 font-medium">
                Storage: {formatMoney(data)} MB
              </span>
            </div>
            
            <div className="divide-y divide-green-900/50 max-h-[700px] overflow-y-auto bg-slate-900 custom-scrollbar">
              {upgrades.map(upgrade => {
                const currentCost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.owned));
                const canAfford = data >= currentCost;
                
                return (
                  <button
                    key={upgrade.id}
                    onClick={() => buyUpgrade(upgrade.id)}
                    disabled={!canAfford}
                    className={`w-full text-left p-4 flex items-center gap-4 transition-all duration-200
                      ${canAfford 
                        ? 'hover:bg-slate-800 cursor-pointer active:bg-slate-950' 
                        : 'opacity-50 cursor-not-allowed bg-slate-900'
                      }`}
                  >
                    {/* Icon */}
                    <div className={`w-14 h-14 flex items-center justify-center text-3xl rounded-xl shadow-inner border
                      ${canAfford ? 'bg-slate-800 border-green-500/50 drop-shadow-[0_0_8px_rgba(34,197,94,0.3)]' : 'bg-slate-950 border-slate-800 grayscale'}
                    `}>
                      {upgrade.icon}
                    </div>
                    
                    {/* Details */}
                    <div className="flex-grow">
                      <div className="flex justify-between items-start mb-1">
                        <h3 className={`font-bold ${canAfford ? 'text-green-400' : 'text-green-700'}`}>
                          {upgrade.name}
                        </h3>
                        <div className="text-right">
                          <span className={`font-mono font-bold text-sm flex items-center gap-1
                            ${canAfford ? 'text-green-300' : 'text-red-900'}
                          `}>
                            {formatMoney(currentCost)} MB
                          </span>
                        </div>
                      </div>
                      <p className={`text-xs mb-2 ${canAfford ? 'text-green-600' : 'text-green-800'}`}>{upgrade.description}</p>
                      
                      {/* Meta stats */}
                      <div className="flex items-center gap-3 text-[10px] font-bold uppercase tracking-wider">
                        <span className="bg-slate-950 text-green-500 border border-green-900/50 px-2 py-1 rounded">
                          Lvl: {upgrade.owned}
                        </span>
                        {upgrade.type === 'idle' ? (
                          <span className="text-cyan-500 flex items-center">
                            <Activity className="w-3 h-3 mr-1" /> {formatMoney(upgrade.value)}/sec
                          </span>
                        ) : (
                          <span className="text-purple-400 flex items-center">
                            <MousePointer2 className="w-3 h-3 mr-1" /> +{formatMoney(upgrade.value)}/click
                          </span>
                        )}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

      </main>
    </div>
  );
}

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
