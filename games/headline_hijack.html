      let result = '';
      for (let i = 0; i < 4; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    };

    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

                          className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-2xl tracking-widest text-center uppercase focus:outline-none focus:border-pink-500"
                          placeholder="ABCD"
                        />
                      </div>
                      <button 
                        type="submit"
                        disabled={!roomCode}
                        className="w-full bg-pink-600 hover:bg-pink-500 disabled:bg-slate-700 text-white font-bold py-3 rounded-xl transition-colors text-lg"
                      >
                        Join Game
                      </button>
                    </form>
                    <div className="relative flex items-center py-2">
                      <div className="flex-grow border-t border-slate-700"></div>
                      <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-medium">OR</span>
                      <div className="flex-grow border-t border-slate-700"></div>
                    </div>
                    <button 
                      onClick={() => { setSelectedNetwork('party'); setViewState('MODE_SELECT'); }}
                      className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg"
                    >
                      <Crown size={20} /> Host New Game on TV
                    </button>
                  </div>
                )}

                {viewState === 'ONLINE_HUB' && (
                  <div className="space-y-6 animate-fade-in-up">
                    <button onClick={() => setViewState('HUB')} className="text-slate-400 hover:text-white flex items-center gap-1 text-sm mb-4">
                      <ArrowLeft size={16} /> Back
                    </button>
                    <div className="grid gap-4">
                      <button 
                        onClick={handleMatchmaking}
                        className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-xl transition-colors flex flex-col items-center justify-center gap-2 shadow-lg"
                      >
                        <div className="flex items-center gap-2 text-xl"><Globe size={24} /> Find Match</div>
                        <span className="text-blue-200 text-sm font-normal">Join any open public game</span>
                      </button>
                      <button 
                        onClick={() => { setSelectedNetwork('public'); setViewState('MODE_SELECT'); }}
                        className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-5 rounded-xl transition-colors flex flex-col items-center justify-center gap-2 shadow-lg"
                      >
                        <div className="flex items-center gap-2 text-xl"><Crown size={24} /> Host Public Game</div>
                        <span className="text-slate-300 text-sm font-normal">Create a lobby and pick the mode</span>
                      </button>
                    </div>
                  </div>
                )}

                {viewState === 'MODE_SELECT' && (
                  <div className="space-y-4 animate-fade-in-up">
                    <button onClick={() => setViewState(selectedNetwork === 'party' ? 'LOCAL_HUB' : (selectedNetwork === 'public' ? 'ONLINE_HUB' : 'HUB'))} className="text-slate-400 hover:text-white flex items-center gap-1 text-sm mb-2">
                      <ArrowLeft size={16} /> Cancel
                    </button>
                    <h3 className="text-center font-bold text-slate-300 uppercase tracking-widest mb-4 border-b border-slate-700 pb-2">Select Game Mode</h3>
                    
                    <button onClick={() => handleCreateRoom(selectedNetwork, 'classic')} className="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg flex justify-between px-6 items-center">
                      <span>Classic Headlines</span> <span className="text-pink-200 text-xs">Fill in the blank</span>
                    </button>
                    <button onClick={() => handleCreateRoom(selectedNetwork, 'dictionary')} className="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg flex justify-between px-6 items-center">
                      <span>Word Weaver</span> <span className="text-amber-200 text-xs">Fake definitions</span>
                    </button>
                    <button onClick={() => handleCreateRoom(selectedNetwork, 'autocomplete')} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg flex justify-between px-6 items-center">
                      <span>Search Snippets</span> <span className="text-emerald-200 text-xs">Autocomplete fun</span>
                    </button>
                    
                    {selectedNetwork === 'party' && (
                      <button onClick={() => handleCreateRoom(selectedNetwork, 'custom')} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg flex justify-between px-6 items-center mt-4">
                        <span>Custom Prompts</span> <span className="text-indigo-200 text-xs">Write your own</span>
                      </button>
                    )}
                  </div>
                )}

                {viewState === 'MATCHMAKING' && (
                  <div className="py-12 flex flex-col items-center justify-center text-center space-y-4">
                    <Globe size={48} className="text-blue-500 animate-spin-slow" />
                    <h3 className="text-2xl font-bold">Finding a match...</h3>
                    <p className="text-slate-400">Searching public servers.</p>
                  </div>
                )}
              </div>
            </div>
          ) : (
            <GameEngine 
              user={user} 
              roomCode={roomCode} 
              isHost={isHost} 
              leaveRoom={leaveRoom} 
            />
          )}
        </div>
      );
    }

    // --- GAME ENGINE COMPONENT ---
    function GameEngine({ user, roomCode, isHost, leaveRoom }) {
      const [room, setRoom] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!user) return;
        
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
        
        const unsubscribe = onSnapshot(roomRef, 
          (docSnap) => {
            if (docSnap.exists()) {
              setRoom(docSnap.data());
            } else {
              setError("Room was closed.");
            }
          },
          (err) => {
            console.error("Snapshot error:", err);
            setError("Lost connection to room.");
          }
        );

        return () => unsubscribe();
      }, [user, roomCode]);

      if (error) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
            <AlertCircle size={48} className="text-red-500 mb-4" />
            <h2 className="text-2xl font-bold mb-2">Uh oh!</h2>
            <p className="text-slate-400 mb-6">{error}</p>
            <button onClick={leaveRoom} className="bg-slate-700 px-6 py-3 rounded-lg font-bold">Back to Menu</button>
          </div>
        );
      }

      if (!room) {
        return <div className="flex items-center justify-center min-h-screen text-slate-400">Loading Game State...</div>;
      }

      if (room.networkType === 'party') {
        if (isHost) return <HostView room={room} roomCode={roomCode} />;
        return <PlayerView room={room} user={user} leaveRoom={leaveRoom} />;
      } else {
        return <UnifiedView room={room} user={user} isHost={isHost} leaveRoom={leaveRoom} />;
      }
    }

    // ============================================================================
    // HOST VIEW (The "Big Screen" / TV)
    // ============================================================================
    function HostView({ room, roomCode }) {
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);

      const playersList = Object.values(room.players || {});
      const numPlayers = playersList.length;
      const numSubmissions = Object.keys(room.submissions || {}).length;
      const numVotes = Object.keys(room.votes || {}).length;

      const [customPromptInput, setCustomPromptInput] = useState('');
      const [customAnswerInput, setCustomAnswerInput] = useState('');
      const [customError, setCustomError] = useState('');

      const startGame = async () => {
        if (numPlayers < 2) {
          alert("Need at least 2 players to start!"); 
          return;
        }
        if (room.gameMode === 'custom') {
          await updateDoc(roomRef, { state: 'HOST_WRITING' });
        } else {
          await updateDoc(roomRef, { state: 'TYPING' });
        }
      };

      const submitCustomPrompt = async () => {
        if (!customPromptInput.includes('_______')) {
          setCustomError("Your prompt must include exactly one blank line: _______");
          return;
        }
        if (!customAnswerInput.trim()) {
          setCustomError("You must provide the real answer!");
          return;
        }
        
        setCustomError('');
        await updateDoc(roomRef, {
          state: 'TYPING',
          currentPrompt: {
            prompt: customPromptInput,
            realAnswer: customAnswerInput.trim(),
            botLies: []
          }
        });
      };

      const advanceToVoting = async () => {
        const choices = [];
        
        choices.push({
          id: 'real',
          text: room.currentPrompt.realAnswer.toLowerCase(),
          isReal: true
        });

        Object.entries(room.submissions).forEach(([playerId, text]) => {
          const cleanText = text.toLowerCase().trim();
          const compareText = room.currentPrompt.realAnswer.toLowerCase();
          
          if (cleanText !== compareText) {
            choices.push({
              id: playerId,
              text: cleanText,
              authorId: playerId
            });
          }
        });

        const shuffledChoices = shuffleArray(choices);
        
        await updateDoc(roomRef, { 
          state: 'VOTING',
          choices: shuffledChoices,
          votes: {}
        });
      };

      const calculateScoresAndReveal = async () => {
        const updatedPlayers = { ...room.players };
        
        Object.entries(room.votes).forEach(([voterId, choiceId]) => {
          if (choiceId === 'real') {
            if (updatedPlayers[voterId]) updatedPlayers[voterId].score += 1000;
          } else {
            if (updatedPlayers[choiceId]) updatedPlayers[choiceId].score += 500;
          }
        });

        await updateDoc(roomRef, {
          state: 'REVEAL',
          players: updatedPlayers
        });
      };

      const nextRound = async () => {
        if (room.gameMode === 'custom') {
          setCustomPromptInput('');
          setCustomAnswerInput('');
          await updateDoc(roomRef, {
            state: 'HOST_WRITING',
            truthFinders: {},
            submissions: {}, choices: [], votes: {}
          });
        } else {
          let promptsList = PROMPTS;
          if (room.gameMode === 'dictionary') promptsList = DICTIONARY_PROMPTS;
          if (room.gameMode === 'autocomplete') promptsList = AUTOCOMPLETE_PROMPTS;

          const randomPrompt = promptsList[Math.floor(Math.random() * promptsList.length)];
          await updateDoc(roomRef, {
            state: 'TYPING',
            currentPrompt: randomPrompt,
            truthFinders: {},
            submissions: {}, choices: [], votes: {}
          });
        }
      };

      if (room.state === 'LOBBY') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-900">
            <div className="max-w-4xl w-full flex flex-col md:flex-row gap-12 items-center">
              <div className="flex-1 text-center bg-slate-800 p-12 rounded-3xl border-4 border-slate-700 shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-500 to-amber-500"></div>
                <h2 className="text-2xl font-bold text-slate-400 mb-4 uppercase tracking-widest">Join on your phone at</h2>
                <div className="text-8xl font-black text-white tracking-widest mb-6 font-mono">
                  {roomCode}
                </div>
                {numPlayers >= 2 ? (
                  <button 
                    onClick={startGame}
                    className="bg-green-500 hover:bg-green-400 text-white text-2xl font-black py-4 px-12 rounded-2xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center gap-3 mx-auto"
                  >
                    <Play fill="currentColor" /> {room.gameMode === 'custom' ? "START CUSTOM GAME" : "START GAME"}
                  </button>
                ) : (
                  <p className="text-slate-500 flex items-center justify-center gap-2">
                    <Users size={18} /> Waiting for at least 2 players...
                  </p>
                )}
              </div>

              <div className="flex-1 w-full">
                <h3 className="text-3xl font-bold mb-6 flex items-center gap-3">
                  Players <span className="bg-slate-700 text-sm py-1 px-3 rounded-full">{numPlayers}</span>
                </h3>
                <div className="grid grid-cols-2 gap-4">
                  {playersList.map(p => (
                    <div key={p.id} className="bg-slate-800 border border-slate-700 py-3 px-4 rounded-xl flex items-center gap-3 animate-fade-in-up">
                      <div className="w-10 h-10 rounded-full bg-gradient-to-br from-pink-500 to-amber-500 flex items-center justify-center font-bold text-lg">
                        {p.name.charAt(0).toUpperCase()}
                      </div>
                      <span className="font-bold text-xl truncate">{p.name}</span>
                    </div>
                  ))}
                  {playersList.length === 0 && (
                    <div className="col-span-2 text-slate-500 italic">No one has joined yet...</div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (room.state === 'HOST_WRITING') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 max-w-4xl mx-auto w-full">
            <div className="bg-indigo-900/30 border-2 border-indigo-500 rounded-3xl p-10 shadow-2xl w-full text-center">
              <h2 className="text-3xl font-black mb-2 text-indigo-400">Custom Prompt Maker</h2>
              <p className="text-slate-400 mb-8">Write a funny scenario or trivia question. Use <span className="font-bold text-white">_______</span> for the blank.</p>
              
              {customError && (
                 <div className="bg-red-500/20 text-red-300 p-4 rounded-xl mb-6 border border-red-500">
                   {customError}
                 </div>
              )}

              <div className="space-y-6 text-left">
                <div>
                  <label className="block text-sm font-bold text-indigo-300 uppercase tracking-widest mb-2">The Prompt</label>
                  <textarea 
                    value={customPromptInput}
                    onChange={(e) => setCustomPromptInput(e.target.value)}
                    placeholder="Example: At school today, the teacher accidentally brought a _______ to class."
                    className="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-4 text-xl text-white focus:border-indigo-500 min-h-[120px]"
                  />
                  <button 
                    onClick={() => setCustomPromptInput(prev => prev + " _______ ")}
                    className="mt-2 text-sm bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded border border-slate-600 transition-colors"
                  >
                    + Insert Blank Line
                  </button>
                </div>

                <div>
                  <label className="block text-sm font-bold text-indigo-300 uppercase tracking-widest mb-2">The Real Answer</label>
                  <input 
                    type="text"
                    value={customAnswerInput}
                    onChange={(e) => setCustomAnswerInput(e.target.value)}
                    placeholder="The actual truth..."
                    className="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-4 text-xl text-white focus:border-indigo-500"
                  />
                </div>

                <button 
                  onClick={submitCustomPrompt}
                  className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-black py-5 rounded-xl shadow-lg mt-8 text-xl"
                >
                  Send to Players
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (room.state === 'TYPING') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 text-center max-w-5xl mx-auto">
            <h2 className="text-pink-500 font-bold uppercase tracking-widest mb-4">Phase 1: The Lie</h2>
            
            <div className="bg-slate-800 border-2 border-slate-700 rounded-3xl p-10 shadow-2xl mb-12 w-full">
              <p className="text-4xl md:text-5xl font-medium leading-tight">
                {room.currentPrompt.prompt.split('_______').map((part, i, arr) => (
                  <React.Fragment key={i}>
                    {part}
                    {i !== arr.length - 1 && (
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-amber-500 font-black underline decoration-4 underline-offset-8">
                        {" ________ "}
                      </span>
                    )}
                  </React.Fragment>
                ))}
              </p>
            </div>

            <div className="flex flex-col items-center">
              <p className="text-2xl mb-6 font-bold text-slate-300">
                Check your devices and fill in the blank!
              </p>
              <div className="flex flex-wrap justify-center gap-4 mb-8">
                {playersList.map(p => {
                  const hasSubmitted = !!room.submissions[p.id];
                  return (
                    <div key={p.id} className={`py-2 px-4 rounded-full font-bold flex items-center gap-2 transition-colors ${hasSubmitted ? 'bg-green-500/20 text-green-400 border border-green-500/50' : 'bg-slate-800 text-slate-500'}`}>
                      {hasSubmitted && <CheckCircle2 size={18} />}
                      {p.name}
                    </div>
                  );
                })}
              </div>

              <button 
                onClick={advanceToVoting}
                className="text-slate-500 hover:text-white flex items-center gap-2 text-sm transition-colors"
              >
                <SkipForward size={16} /> Force Next Phase
              </button>
            </div>
          </div>
        );
      }

      if (room.state === 'VOTING') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 max-w-5xl mx-auto">
            <h2 className="text-amber-500 font-bold uppercase tracking-widest mb-4">Phase 2: The Truth</h2>
            
            <p className="text-3xl font-medium text-center leading-relaxed mb-10 text-slate-300">
              {room.currentPrompt.prompt.replace('_______', ' [ ... ] ')}
            </p>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full mb-12">
              {room.choices.map((choice, index) => (
                <div key={index} className="bg-slate-800 border-2 border-slate-700 rounded-2xl p-6 text-center shadow-lg flex items-center justify-center min-h-[100px]">
                  <span className="text-3xl font-bold uppercase text-white">{choice.text}</span>
                </div>
              ))}
            </div>

            <div className="flex flex-col items-center">
              <p className="text-xl mb-4 font-bold text-slate-400">
                Votes in: {numVotes} / {numPlayers}
              </p>
              
              <button 
                onClick={calculateScoresAndReveal}
                className="bg-amber-500 hover:bg-amber-400 text-slate-900 text-xl font-black py-4 px-10 rounded-2xl shadow-lg transition-transform hover:scale-105"
              >
                Reveal Answers
              </button>
            </div>
          </div>
        );
      }

      if (room.state === 'REVEAL') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 max-w-5xl mx-auto w-full">
            <h2 className="text-4xl font-black mb-6 text-center">THE RESULTS</h2>
            
            <div className="w-full space-y-6 max-h-[70vh] overflow-y-auto pr-4 custom-scrollbar">
              {room.choices.map((choice) => {
                const voters = Object.entries(room.votes)
                  .filter(([_, votedChoiceId]) => votedChoiceId === choice.id)
                  .map(([voterId, _]) => room.players[voterId]?.name);

                const isTruth = choice.id === 'real';
                const author = isTruth ? null : room.players[choice.authorId];

                return (
                  <div key={choice.id} className={`rounded-2xl border-2 p-6 flex flex-col md:flex-row items-center justify-between gap-6 ${isTruth ? 'bg-green-900/40 border-green-500' : 'bg-slate-800 border-slate-700'}`}>
                    
                    <div className="flex-1 text-center md:text-left">
                      <div className="text-3xl font-black uppercase mb-2">{choice.text}</div>
                      {isTruth ? (
                        <div className="text-green-400 font-bold uppercase tracking-widest text-sm flex items-center justify-center md:justify-start gap-1">
                          <CheckCircle2 size={16} /> THE ACTUAL TRUTH
                        </div>
                      ) : (
                        <div className="text-pink-400 font-bold text-sm">
                          Written by: <span className="text-white text-lg">{author?.name || 'Unknown'}</span>
                        </div>
                      )}
                    </div>

                    <div className="w-full md:w-1/3 bg-slate-900/50 rounded-xl p-4 min-h-[80px] flex flex-col justify-center border border-slate-800">
                      <div className="text-xs text-slate-500 font-bold uppercase mb-2">Fooled:</div>
                      <div className="flex flex-wrap gap-2">
                        {voters.length > 0 ? (
                          voters.map((v, i) => (
                            <span key={i} className="bg-slate-700 text-white text-sm py-1 px-3 rounded-full font-medium">
                              {v}
                            </span>
                          ))
                        ) : (
                          <span className="text-slate-600 italic">Nobody</span>
                        )}
                      </div>
                    </div>

                  </div>
                );
              })}
            </div>

            <div className="mt-10">
               <button 
                onClick={() => updateDoc(roomRef, { state: 'LEADERBOARD' })}
                className="bg-white text-slate-900 text-xl font-black py-4 px-10 rounded-2xl shadow-lg hover:bg-slate-200 transition-colors"
              >
                Show Leaderboard
              </button>
            </div>
          </div>
        );
      }

      if (room.state === 'LEADERBOARD') {
        const sortedPlayers = playersList.sort((a, b) => b.score - a.score);

        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-8 max-w-3xl mx-auto w-full">
            <Trophy size={64} className="text-amber-500 mb-6" />
            <h2 className="text-5xl font-black mb-10 text-center tracking-tight">LEADERBOARD</h2>

            <div className="w-full space-y-4 mb-12">
              {sortedPlayers.map((p, index) => (
                <div key={p.id} className={`flex items-center justify-between p-6 rounded-2xl border ${index === 0 ? 'bg-gradient-to-r from-pink-600 to-amber-600 border-transparent transform scale-105 shadow-xl' : 'bg-slate-800 border-slate-700'}`}>
                  <div className="flex items-center gap-6">
                    <span className={`text-4xl font-black ${index === 0 ? 'text-white/50' : 'text-slate-600'}`}>#{index + 1}</span>
                    <span className="text-3xl font-bold">{p.name}</span>
                  </div>
                  <span className="text-3xl font-mono font-bold">{p.score} <span className="text-lg opacity-60 font-sans">pts</span></span>
                </div>
              ))}
            </div>

            <button 
              onClick={nextRound}
              className="bg-slate-700 hover:bg-slate-600 text-white text-xl font-bold py-4 px-10 rounded-2xl shadow-lg transition-colors flex items-center gap-3"
            >
              <Play fill="currentColor" size={20} /> Next Round
            </button>
          </div>
        );
      }

      return <div>Unknown State</div>;
    }

    // ============================================================================
    // PLAYER VIEW (The Mobile Phone / Controller)
    // ============================================================================
    function PlayerView({ room, user, leaveRoom }) {
      const [inputText, setInputText] = useState('');
      const [localWarning, setLocalWarning] = useState('');

      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', room.code);
      const me = room.players?.[user.uid];

      const submitLie = async (e) => {
        e.preventDefault();
        const cleanText = inputText.trim().toLowerCase();
        if (!cleanText) return;

        const compareText = room.currentPrompt.realAnswer.toLowerCase();
        
        if (cleanText === compareText) {
          if (!room.truthFinders?.[user.uid]) {
            const currentScore = room.players[user.uid]?.score || 0;
            await updateDoc(roomRef, {
              [`players.${user.uid}.score`]: currentScore + 1500,
              [`truthFinders.${user.uid}`]: true
            });
            setLocalWarning("🎯 TRUTH BONUS! +1500 pts! Now type a fake answer.");
          } else {
            setLocalWarning("You already got the Truth Bonus! You must type a lie to proceed.");
          }
          return;
        }

        await updateDoc(roomRef, {
          [`submissions.${user.uid}`]: inputText.trim()
        });
        setLocalWarning('');
        setInputText(''); 
      };

      const submitVote = async (choiceId) => {
        await updateDoc(roomRef, {
          [`votes.${user.uid}`]: choiceId
        });
      };

      if (!me) {
        return (
          <div className="p-6 text-center mt-20">
            <p>You are not in this game.</p>
            <button onClick={leaveRoom} className="mt-4 text-pink-500">Go Back</button>
          </div>
        );
      }

      const Header = () => (
        <div className="fixed top-0 left-0 w-full bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center z-10">
          <div className="font-bold text-slate-300">{me.name}</div>
          <div className="font-mono bg-slate-800 px-3 py-1 rounded-lg text-pink-400 font-bold text-sm">
            {me.score} PTS
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-900 text-white pt-20 pb-10 px-6 flex flex-col items-center">
          <Header />

          {room.state === 'LOBBY' && (
            <div className="flex flex-col items-center text-center mt-10">
              <div className="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6 border-4 border-pink-500 shadow-[0_0_30px_rgba(236,72,153,0.3)]">
                <CheckCircle2 size={48} className="text-pink-500" />
              </div>
              <h2 className="text-3xl font-black mb-2">You're in!</h2>
              <p className="text-slate-400 text-lg">Look at the main screen.<br/>Waiting for host to start...</p>
            </div>
          )}

          {room.state === 'HOST_WRITING' && (
            <div className="flex flex-col items-center text-center mt-20 animate-fade-in-up">
              <div className="w-20 h-20 bg-indigo-900/30 rounded-full flex items-center justify-center mb-6 border-2 border-indigo-500 animate-pulse">
                <Crown size={32} className="text-indigo-400" />
              </div>
              <h2 className="text-3xl font-black mb-4">Custom Mode</h2>
              <p className="text-slate-300 text-lg bg-slate-800 p-6 rounded-2xl border border-slate-700">
                The Host is currently typing a custom prompt just for this group... Get ready!
              </p>
            </div>
          )}

          {room.state === 'TYPING' && (
            <div className="w-full max-w-md">
              {room.submissions[user.uid] ? (
                <div className="text-center mt-20">
                  <div className="inline-block p-4 bg-green-500/10 rounded-full mb-4">
                    <CheckCircle2 size={48} className="text-green-500" />
                  </div>
                  <h3 className="text-2xl font-bold">Lie submitted!</h3>
                  <p className="text-slate-400 mt-2">Waiting for other players...</p>
                </div>
              ) : (
                <form onSubmit={submitLie} className="flex flex-col gap-4 mt-6">
                  <label className="text-sm font-bold text-slate-400 uppercase tracking-widest text-center">
                    Fill in the blank
                  </label>
                  
                  {localWarning && (
                    <div className="bg-amber-500/20 text-amber-200 p-3 rounded-lg text-sm text-center border border-amber-500">
                      {localWarning}
                    </div>
                  )}

                  <input
                    type="text"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="Type your lie..."
                    className="w-full bg-slate-800 border-2 border-slate-700 rounded-xl px-4 py-4 text-xl text-center focus:outline-none focus:border-pink-500 shadow-inner"
                    autoFocus
                    maxLength={40}
                  />
                  <button 
                    type="submit"
                    disabled={!inputText.trim()}
                    className="w-full bg-gradient-to-r from-pink-600 to-amber-600 text-white font-black py-4 rounded-xl text-xl mt-4 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg"
                  >
                    SUBMIT
                  </button>
                </form>
              )}
            </div>
          )}

          {room.state === 'VOTING' && (
            <div className="w-full max-w-md">
              {room.votes[user.uid] ? (
                <div className="text-center mt-20">
                  <div className="inline-block p-4 bg-amber-500/10 rounded-full mb-4">
                    <CheckCircle2 size={48} className="text-amber-500" />
                  </div>
                  <h3 className="text-2xl font-bold">Vote recorded!</h3>
                  <p className="text-slate-400 mt-2">Waiting for everyone else...</p>
                </div>
              ) : (
                <div className="mt-4">
                  <p className="text-center font-bold text-slate-400 uppercase tracking-widest mb-6">Select the truth!</p>
                  <div className="flex flex-col gap-4">
                    {room.choices.map((choice) => {
                      if (choice.authorId === user.uid) return null;

                      return (
                        <button
                          key={choice.id}
                          onClick={() => submitVote(choice.id)}
                          className="w-full bg-slate-800 border-2 border-slate-700 hover:border-pink-500 hover:bg-slate-700 text-white font-bold py-5 px-4 rounded-xl text-xl uppercase transition-colors"
                        >
                          {choice.text}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

          {room.state === 'REVEAL' && (
            <div className="flex flex-col items-center text-center mt-20">
              <h2 className="text-3xl font-black mb-4">Results are in!</h2>
              <p className="text-slate-300 text-xl border-t border-b border-slate-700 py-4 px-8 inline-block">
                Look at the main screen to see how you did.
              </p>
            </div>
          )}

          {room.state === 'LEADERBOARD' && (
            <div className="flex flex-col items-center text-center mt-20">
              <Trophy size={48} className="text-amber-500 mb-4" />
              <h2 className="text-3xl font-black mb-2">Leaderboard</h2>
              <p className="text-slate-400 text-lg mb-8">Look at the main screen for rankings.</p>
              
              <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-xs border border-slate-700">
                <div className="text-sm text-slate-500 font-bold uppercase mb-1">Your Total Score</div>
                <div className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-amber-500">
                  {me.score}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ============================================================================
    // UNIFIED VIEW (Online & AI Mode - Single Screen Experience)
    // ============================================================================
    function UnifiedView({ room, user, isHost, leaveRoom }) {
      const [inputText, setInputText] = useState('');
      const [localWarning, setLocalWarning] = useState('');

      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', room.code);
      const me = room.players?.[user.uid];
      const playersList = Object.values(room.players || {});
      const numPlayers = playersList.length;

      useEffect(() => {
        if (!isHost) return;

        const advanceToVoting = async () => {
          const choices = [];
          choices.push({ id: 'real', text: room.currentPrompt.realAnswer.toLowerCase(), isReal: true });

          Object.entries(room.submissions).forEach(([playerId, text]) => {
            const cleanText = text.toLowerCase().trim();
            const compareText = room.currentPrompt.realAnswer.toLowerCase();
            
            if (cleanText !== compareText) {
              choices.push({ id: playerId, text: cleanText, authorId: playerId });
            }
          });
          await updateDoc(roomRef, { state: 'VOTING', choices: shuffleArray(choices), votes: {} });
        };

        const calculateScoresAndReveal = async () => {
          const updatedPlayers = { ...room.players };
          Object.entries(room.votes).forEach(([voterId, choiceId]) => {
            if (choiceId === 'real') {
              if (updatedPlayers[voterId]) updatedPlayers[voterId].score += 1000;
            } else {
              if (updatedPlayers[choiceId]) updatedPlayers[choiceId].score += 500;
            }
          });
          await updateDoc(roomRef, { state: 'REVEAL', players: updatedPlayers });
        };

        if (room.state === 'TYPING') {
          const neededSubmissions = numPlayers;
          if (Object.keys(room.submissions || {}).length === neededSubmissions && numPlayers > 0) {
            advanceToVoting();
          }
        }
        if (room.state === 'VOTING') {
          const neededVotes = numPlayers;
          if (Object.keys(room.votes || {}).length === neededVotes && numPlayers > 0) {
            calculateScoresAndReveal();
          }
        }
      }, [room, isHost, numPlayers, roomRef]);

      // AI Bot Logic Hook
      useEffect(() => {
        if (room.networkType !== 'ai' || !isHost) return;
        const bots = playersList.filter(p => p.isBot);

        const runAI = () => {
          if (room.state === 'TYPING') {
            const newSubs = { ...room.submissions };
            let updated = false;
            
            const availableLies = room.currentPrompt?.botLies ? [...room.currentPrompt.botLies] : [...BOT_LIES];
            for (let i = availableLies.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [availableLies[i], availableLies[j]] = [availableLies[j], availableLies[i]];
            }

            bots.forEach(bot => {
              if (!newSubs[bot.id]) {
                newSubs[bot.id] = availableLies.pop() || BOT_LIES[Math.floor(Math.random() * BOT_LIES.length)];
                updated = true;
              }
            });
            
            if (updated) {
              setTimeout(() => updateDoc(roomRef, { submissions: newSubs }), 1500);
            }
          } else if (room.state === 'VOTING') {
            const newVotes = { ...room.votes };
            let updated = false;
            bots.forEach(bot => {
              if (!newVotes[bot.id]) {
                const validChoices = room.choices.filter(c => c.authorId !== bot.id);
                if (validChoices.length > 0) {
                  newVotes[bot.id] = validChoices[Math.floor(Math.random() * validChoices.length)].id;
                  updated = true;
                }
              }
            });
            if (updated) {
              setTimeout(() => updateDoc(roomRef, { votes: newVotes }), 2500); 
            }
          }
        };
        runAI();
      }, [room, isHost, roomRef, playersList]);

      const submitLie = async (e) => {
        e.preventDefault();
        const cleanText = inputText.trim().toLowerCase();
        if (!cleanText) return;
        
        const compareText = room.currentPrompt.realAnswer.toLowerCase();
        if (cleanText === compareText) {
          if (!room.truthFinders?.[user.uid]) {
            const currentScore = room.players[user.uid]?.score || 0;
            await updateDoc(roomRef, { 
              [`players.${user.uid}.score`]: currentScore + 1500,
              [`truthFinders.${user.uid}`]: true
            });
            setLocalWarning("🎯 TRUTH BONUS! +1500 pts! Now type a fake answer.");
          } else {
            setLocalWarning("You already got the Truth Bonus! You must type a lie to proceed.");
          }
          return;
        }

        await updateDoc(roomRef, { [`submissions.${user.uid}`]: inputText.trim() });
        setLocalWarning('');
        setInputText('');
      };

      const submitVote = async (choiceId) => {
        await updateDoc(roomRef, { [`votes.${user.uid}`]: choiceId });
      };

      const startGame = async () => {
        await updateDoc(roomRef, { state: 'TYPING' });
      };

      const nextRound = async () => {
        let promptsList = PROMPTS;
        if (room.gameMode === 'dictionary') promptsList = DICTIONARY_PROMPTS;
        if (room.gameMode === 'autocomplete') promptsList = AUTOCOMPLETE_PROMPTS;
        
        const randomPrompt = promptsList[Math.floor(Math.random() * promptsList.length)];
        await updateDoc(roomRef, {
          state: 'TYPING', currentPrompt: randomPrompt,
          truthFinders: {}, submissions: {}, choices: [], votes: {}
        });
        setInputText('');
      };

      if (!me) {
        return <div className="p-6 text-center mt-20"><button onClick={leaveRoom}>Go Back</button></div>;
      }

      return (
        <div className="flex flex-col items-center min-h-screen p-6 pt-20 max-w-4xl mx-auto w-full">
          {/* Header */}
          <div className="fixed top-0 left-0 w-full bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center z-10 px-6">
            <div className="font-bold flex items-center gap-2">
              {room.networkType === 'ai' ? <Bot size={18} className="text-indigo-400"/> : <Globe size={18} className="text-blue-400"/>}
              {me.name}
            </div>
            <div className="flex gap-4 items-center">
              <div className="font-mono bg-slate-800 px-3 py-1 rounded-lg text-pink-400 font-bold text-sm">
                {me.score} PTS
              </div>
              <button onClick={leaveRoom} className="text-slate-500 text-sm hover:text-white">Leave</button>
            </div>
          </div>

          {room.state === 'LOBBY' && (
            <div className="w-full bg-slate-800 p-8 rounded-2xl border border-slate-700 text-center shadow-xl mt-10">
              <h2 className="text-3xl font-black mb-6 uppercase tracking-widest">{room.networkType === 'ai' ? 'Bot Match' : 'Public Match'}</h2>
              <div className="mb-8 flex flex-wrap justify-center gap-3">
                {playersList.map(p => (
                  <div key={p.id} className="bg-slate-700 px-4 py-2 rounded-full font-bold flex items-center gap-2">
                    {p.isBot && <Bot size={16} className="text-indigo-400"/>}
                    {p.name}
                  </div>
                ))}
              </div>
              {isHost && (
                <button 
                  onClick={startGame}
                  disabled={numPlayers < 2 && room.networkType !== 'ai'}
                  className="bg-green-500 hover:bg-green-400 text-white text-2xl font-black py-4 px-12 rounded-2xl shadow-lg transition-transform hover:scale-105 disabled:opacity-50 disabled:scale-100"
                >
                  START GAME
                </button>
              )}
              {!isHost && <p className="text-slate-400 animate-pulse">Waiting for host to start...</p>}
            </div>
          )}

          {room.state === 'TYPING' && (
            <div className="w-full text-center mt-10">
              <div className="bg-slate-800 border-2 border-slate-700 rounded-2xl p-8 shadow-xl mb-8">
                <p className="text-2xl md:text-3xl font-medium leading-relaxed">
                  {room.currentPrompt.prompt.split('_______').map((part, i, arr) => (
                    <React.Fragment key={i}>
                      {part}
                      {i !== arr.length - 1 && (
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-amber-500 font-black underline decoration-2 underline-offset-8">
                          {" ________ "}
                        </span>
                      )}
                    </React.Fragment>
                  ))}
                </p>
              </div>

              {room.submissions[user.uid] ? (
                <div className="p-8 bg-green-900/20 rounded-2xl border border-green-500/30 inline-block mt-4">
                  <CheckCircle2 size={48} className="text-green-500 mx-auto mb-4" />
                  <h3 className="text-xl font-bold">Answer Locked!</h3>
                  <p className="text-slate-400 text-sm mt-2">Waiting for others ({Object.keys(room.submissions).length}/{numPlayers})</p>
                </div>
              ) : (
                <form onSubmit={submitLie} className="max-w-md mx-auto w-full">
                  {localWarning && <div className="bg-amber-500/20 text-amber-200 p-3 rounded-lg text-sm text-center border border-amber-500 mb-2">{localWarning}</div>}
                  <input
                    type="text" value={inputText} onChange={(e) => setInputText(e.target.value)}
                    placeholder={room.gameMode === 'dictionary' ? "Type a fake definition..." : "Type your lie..."}
                    className="w-full bg-slate-800 border-2 border-slate-600 rounded-xl px-4 py-4 text-xl text-center focus:border-pink-500"
                    autoFocus maxLength={40}
                  />
                  <button type="submit" disabled={!inputText.trim()} className="w-full bg-pink-600 text-white font-black py-4 rounded-xl mt-4 disabled:opacity-50">
                    SUBMIT
                  </button>
                </form>
              )}
            </div>
          )}

          {room.state === 'VOTING' && (
            <div className="w-full text-center mt-6">
              <p className="text-xl md:text-2xl font-medium mb-8 text-slate-300 bg-slate-800 p-6 rounded-2xl">
                {room.currentPrompt.prompt.replace('_______', ' [ ... ] ')}
              </p>

              {room.votes[user.uid] ? (
                 <div className="p-8 bg-amber-900/20 rounded-2xl border border-amber-500/30 inline-block mt-4">
                  <CheckCircle2 size={48} className="text-amber-500 mx-auto mb-4" />
                  <h3 className="text-xl font-bold">Vote Locked!</h3>
                  <p className="text-slate-400 text-sm mt-2">Waiting for others ({Object.keys(room.votes).length}/{numPlayers})</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-2xl mx-auto w-full">
                  {room.choices.map((choice) => {
                    if (choice.authorId === user.uid) return null;
                    return (
                      <button
                        key={choice.id} onClick={() => submitVote(choice.id)}
                        className="bg-slate-800 border-2 border-slate-600 hover:border-amber-500 text-white font-bold py-6 px-4 rounded-xl text-lg uppercase transition-all shadow-md hover:shadow-amber-500/20"
                      >
                        {choice.text}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {room.state === 'REVEAL' && (
            <div className="w-full max-w-2xl mt-6">
              <h2 className="text-3xl font-black mb-6 text-center">RESULTS</h2>
              <div className="space-y-4 mb-8">
                {room.choices.map((choice) => {
                  const voters = Object.entries(room.votes)
                    .filter(([_, choiceId]) => choiceId === choice.id)
                    .map(([voterId]) => room.players[voterId]?.name);
                  const isTruth = choice.id === 'real';
                  const author = isTruth ? null : room.players[choice.authorId];

                  return (
                    <div key={choice.id} className={`rounded-xl border-2 p-5 flex flex-col sm:flex-row items-center justify-between gap-4 ${isTruth ? 'bg-green-900/30 border-green-500' : 'bg-slate-800 border-slate-700'}`}>
                      <div className="text-center sm:text-left flex-1">
                        <div className="text-2xl font-black uppercase mb-1">{choice.text}</div>
                        {isTruth ? (
                          <div className="text-green-400 font-bold text-xs uppercase flex items-center justify-center sm:justify-start gap-1"><CheckCircle2 size={14}/> THE TRUTH</div>
                        ) : (
                          <div className="text-pink-400 text-sm">By: <span className="text-white font-bold">{author?.name || 'Unknown'}</span></div>
                        )}
                      </div>
                      <div className="bg-slate-900 rounded p-3 min-w-[120px] text-center">
                        <div className="text-[10px] text-slate-500 font-bold uppercase mb-1">Voters:</div>
                        <div className="flex flex-wrap justify-center gap-1">
                          {voters.length > 0 ? voters.map((v, i) => <span key={i} className="bg-slate-700 text-xs py-1 px-2 rounded-full">{v}</span>) : <span className="text-slate-600 text-xs italic">None</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {isHost && (
                <button onClick={() => updateDoc(roomRef, { state: 'LEADERBOARD' })} className="w-full bg-white text-slate-900 text-xl font-black py-4 rounded-xl">
                  Show Standings
                </button>
              )}
              {!isHost && <p className="text-center text-slate-400 animate-pulse">Waiting for host to continue...</p>}
            </div>
          )}

          {room.state === 'LEADERBOARD' && (
            <div className="w-full max-w-md mt-6 text-center">
              <Trophy size={48} className="text-amber-500 mx-auto mb-6" />
              <div className="space-y-3 mb-8">
                {playersList.sort((a, b) => b.score - a.score).map((p, index) => (
                  <div key={p.id} className={`flex justify-between items-center p-4 rounded-xl border ${index === 0 ? 'bg-gradient-to-r from-pink-600 to-amber-600 border-transparent shadow-lg' : 'bg-slate-800 border-slate-700'}`}>
                    <span className="font-bold text-lg">{index + 1}. {p.name} {p.isBot && <Bot size={14} className="inline ml-1 opacity-50"/>}</span>
                    <span className="font-mono font-bold text-xl">{p.score}</span>
                  </div>
                ))}
              </div>
              {isHost && (
                <button onClick={nextRound} className="w-full bg-slate-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
                  <Play size={20}/> Next Round
                </button>
              )}
              {!isHost && <p className="text-slate-400 animate-pulse">Waiting for host to start next round...</p>}
            </div>
          )}
        </div>
      );
    }

    // --- RENDER APP ---
    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
