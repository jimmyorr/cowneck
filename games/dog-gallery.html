<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1930s Dog Variety Gallery</title>
    <style>
        :root {
            --paper: #e3d1af;
            --ink: #1a1a1a;
            --sepia: #c4b391;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c2c2c;
            color: var(--paper);
            font-family: 'Courier New', Courier, monospace;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 10px;
        }

        /* Main Preview Section */
        .preview-box {
            position: relative;
            background: var(--paper);
            border: 8px solid var(--ink);
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
        }

        #mainCanvas {
            image-rendering: pixelated;
            display: block;
        }

        .selection-name {
            color: var(--ink);
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Grid Section */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
        }

        .dog-card {
            background: var(--paper);
            border: 4px solid var(--ink);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .dog-card:hover {
            transform: scale(1.05);
            background: #eee0c5;
        }

        .dog-card.active {
            border-color: #d4a017;
            box-shadow: 0 0 15px rgba(212, 160, 23, 0.5);
        }

        .card-label {
            color: var(--ink);
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: bold;
            text-align: center;
        }

        canvas.thumb {
            width: 80px;
            height: 80px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.15;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>VINTAGE KENNEL CLUB</h1>
        <p>Pick a pup to preview the animation!</p>
    </div>

    <div class="preview-box">
        <div class="overlay"></div>
        <canvas id="mainCanvas"></canvas>
        <div id="selectionName" class="selection-name">THE ORIGINAL</div>
    </div>

    <div class="grid-container" id="dogGrid">
        <!-- Cards generated by JS -->
    </div>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const mainCtx = mainCanvas.getContext('2d');
        const gridContainer = document.getElementById('dogGrid');
        const selectionNameEl = document.getElementById('selectionName');

        mainCanvas.width = 300;
        mainCanvas.height = 250;

        const PALETTE = {
            INK: '#1a1a1a',
            PAPER: '#e3d1af',
            WHITE: '#ffffff'
        };

        // Dog variations database
        const variations = [
            { name: "The Original", ink: '#1a1a1a', sepia: '#c4b391', ear: 'floppy', snout: 1.0, eye: 'pie' },
            { name: "Cocoa Pup", ink: '#3e2723', sepia: '#8d6e63', ear: 'pointy', snout: 0.8, eye: 'pie' },
            { name: "Midnight", ink: '#000000', sepia: '#424242', ear: 'long', snout: 1.1, eye: 'dot' },
            { name: "Snowy", ink: '#455a64', sepia: '#cfd8dc', ear: 'floppy', snout: 0.9, eye: 'pie' },
            { name: "Patches", ink: '#1a1a1a', sepia: '#c4b391', ear: 'floppy', snout: 1.0, eye: 'patch' },
            { name: "Toffee", ink: '#5d4037', sepia: '#d7ccc8', ear: 'folded', snout: 1.2, eye: 'pie' },
            { name: "Bluey", ink: '#263238', sepia: '#90a4ae', ear: 'pointy', snout: 0.7, eye: 'pie' },
            { name: "Cinnamon", ink: '#bf360c', sepia: '#ffab91', ear: 'floppy', snout: 1.0, eye: 'pie' },
            { name: "Tiny", ink: '#1a1a1a', sepia: '#c4b391', ear: 'pointy', snout: 0.5, eye: 'pie' },
            { name: "Basset", ink: '#3e2723', sepia: '#a1887f', ear: 'very-long', snout: 1.3, eye: 'sleepy' },
            { name: "Noir", ink: '#1a1a1a', sepia: '#757575', ear: 'floppy', snout: 1.0, eye: 'pie' },
            { name: "Cookie", ink: '#4e342e', sepia: '#bcaaa4', ear: 'short', snout: 0.9, eye: 'dot' },
            { name: "Ghost", ink: '#9e9e9e', sepia: '#f5f5f5', ear: 'pointy', snout: 1.0, eye: 'pie' },
            { name: "Honey", ink: '#795548', sepia: '#ffe082', ear: 'floppy', snout: 1.1, eye: 'pie' },
            { name: "Button", ink: '#212121', sepia: '#bdbdbd', ear: 'folded', snout: 0.6, eye: 'pie' },
            { name: "Shadow", ink: '#000000', sepia: '#212121', ear: 'long', snout: 1.0, eye: 'pie' },
            { name: "Sandy", ink: '#5d4037', sepia: '#ffe0b2', ear: 'pointy', snout: 0.9, eye: 'pie' },
            { name: "Smokey", ink: '#37474f', sepia: '#b0bec5', ear: 'floppy', snout: 1.2, eye: 'sleepy' },
            { name: "Tuxedo", ink: '#1a1a1a', sepia: '#eeeeee', ear: 'folded', snout: 1.0, eye: 'pie' },
            { name: "Rusty", ink: '#3e2723', sepia: '#ef9a9a', ear: 'floppy', snout: 1.0, eye: 'pie' }
        ];

        let selectedDog = variations[0];

        function drawDog(ctx, config, x, y, scale = 1, animate = false) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            const bob = animate ? Math.sin(Date.now() / 150) * 3 : 0;
            ctx.translate(0, bob);

            const INK = config.ink;
            const SEPIA = config.sepia;

            // Body
            ctx.fillStyle = INK;
            ctx.beginPath();
            ctx.ellipse(0, 35, 12, 16, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.strokeStyle = INK;
            ctx.lineWidth = 2;
            ctx.fillStyle = SEPIA;
            ctx.beginPath();
            ctx.arc(0, 12, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Snout
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(8, 20, 10 * config.snout, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Nose
            ctx.fillStyle = INK;
            ctx.beginPath();
            ctx.arc(8 + (9 * config.snout), 18, 3, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = INK;
            if (config.eye === 'patch') {
                ctx.beginPath();
                ctx.arc(-6, 8, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
            }

            // Draw Pie Eyes
            const eyeSize = config.eye === 'sleepy' ? 3 : 5;
            // Left Eye
            ctx.beginPath(); ctx.ellipse(-6, 8, 2.5, eyeSize, 0, 0, Math.PI * 2); ctx.fill();
            // Right Eye
            ctx.beginPath(); ctx.ellipse(4, 8, 3.5, eyeSize, 0, 0, Math.PI * 2); ctx.fill();

            if (config.eye === 'pie') {
                ctx.fillStyle = SEPIA;
                ctx.beginPath();
                ctx.moveTo(4, 8); ctx.lineTo(8, 4); ctx.lineTo(8, 12);
                ctx.moveTo(-6, 8); ctx.lineTo(-2, 4); ctx.lineTo(-2, 12);
                ctx.fill();
            }

            // Ears
            ctx.fillStyle = INK;
            ctx.beginPath();
            if (config.ear === 'floppy') {
                ctx.moveTo(-12, 10);
                ctx.quadraticCurveTo(-30, 20, -25, 30);
                ctx.quadraticCurveTo(-15, 25, -8, 18);
            } else if (config.ear === 'pointy') {
                ctx.moveTo(-10, 2);
                ctx.lineTo(-25, -15);
                ctx.lineTo(-5, 5);
            } else if (config.ear === 'long' || config.ear === 'very-long') {
                const len = config.ear === 'very-long' ? 50 : 35;
                ctx.moveTo(-10, 10);
                ctx.quadraticCurveTo(-25, len, -15, len + 10);
                ctx.quadraticCurveTo(-5, len, -5, 15);
            } else if (config.ear === 'folded') {
                ctx.moveTo(-10, 5);
                ctx.lineTo(-20, -5);
                ctx.lineTo(-10, -10);
                ctx.lineTo(-5, 0);
            } else if (config.ear === 'short') {
                ctx.arc(-14, 5, 6, 0, Math.PI * 2);
            }
            ctx.fill();

            // Arm
            ctx.strokeStyle = INK;
            ctx.lineWidth = 4;
            ctx.beginPath();
            const armSway = animate ? Math.sin(Date.now() / 100) * 5 : 0;
            ctx.moveTo(0, 35);
            ctx.quadraticCurveTo(-10 + armSway, 40, -5, 45);
            ctx.stroke();

            ctx.restore();
        }

        function createGrid() {
            variations.forEach((dog, index) => {
                const card = document.createElement('div');
                card.className = 'dog-card' + (index === 0 ? ' active' : '');
                card.onclick = () => selectDog(index, card);

                const canvas = document.createElement('canvas');
                canvas.className = 'thumb';
                canvas.width = 100;
                canvas.height = 100;
                const tCtx = canvas.getContext('2d');

                // Draw static thumbnail
                drawDog(tCtx, dog, 50, 40, 0.8, false);

                const label = document.createElement('div');
                label.className = 'card-label';
                label.innerText = dog.name;

                card.appendChild(canvas);
                card.appendChild(label);
                gridContainer.appendChild(card);
            });
        }

        function selectDog(index, cardEl) {
            document.querySelectorAll('.dog-card').forEach(c => c.classList.remove('active'));
            cardEl.classList.add('active');
            selectedDog = variations[index];
            selectionNameEl.innerText = selectedDog.name;
        }

        function animate() {
            mainCtx.fillStyle = PALETTE.PAPER;
            mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

            // Vintage scratches
            if (Math.random() > 0.9) {
                mainCtx.strokeStyle = 'rgba(0,0,0,0.05)';
                mainCtx.beginPath();
                const rx = Math.random() * mainCanvas.width;
                mainCtx.moveTo(rx, 0); mainCtx.lineTo(rx + (Math.random() - 0.5) * 10, mainCanvas.height);
                mainCtx.stroke();
            }

            drawDog(mainCtx, selectedDog, mainCanvas.width / 2, mainCanvas.height / 2 - 20, 1.8, true);

            requestAnimationFrame(animate);
        }

        window.onload = () => {
            createGrid();
            animate();
        };
    </script>
</body>

</html>
