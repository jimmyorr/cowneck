<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goofy Paws: Origins 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital@0;1&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .letterbox {
            height: 0%;
            background: black;
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .cutscene-active .letterbox {
            height: 15%;
        }

        #dialogue-box {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #dialogue-box.visible {
            opacity: 1;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: white;
            transition: opacity 2s;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: linear-gradient(to right, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button.play-btn {
            pointer-events: auto;
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button.play-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 1s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 1s;
        }

        #joystick-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 50%;
            pointer-events: auto;
            display: none;
        }

        @media (hover: none) and (pointer: coarse) {
            #joystick-zone {
                display: block;
            }

            #hud {
                top: 10px;
                font-size: 1rem;
            }
        }

        #fade-overlay {
            position: absolute;
            inset: 0;
            background: black;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
            z-index: 40;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="letterbox top"></div>
        <div id="hud">Toys found: <span id="toy-count">0</span>/3</div>
        <div class="crosshair" id="crosshair"></div>
        <div id="dialogue-box"></div>
        <div class="letterbox bottom"></div>
    </div>

    <div id="fade-overlay"></div>
    <div id="joystick-zone"></div>

    <div id="start-screen">
        <p class="text-gray-400 tracking-[0.3em] mb-2 uppercase text-sm">A 3D Prequel</p>
        <h1>Goofy Paws: Origins</h1>
        <p class="text-xl font-light text-gray-300 italic">Mew York City</p>
        <button class="play-btn" onclick="startGame()">Start Memory</button>
        <p class="absolute bottom-10 text-xs text-gray-500">Headphones recommended. Use WASD/Arrows to move.</p>
    </div>

    <script>
        /**
         * GOOFY PAWS: ORIGINS 3D
         * Rebuilt from the ground up using Three.js.
         * Features a procedural 3D cat, dynamic lighting, and immersive environment.
         */

        // --- STATE & UI GLOBALS ---
        const STATE = { MENU: 0, CUTSCENE: 1, PLAYING: 2, CAPTURED: 3 };
        let currentState = STATE.MENU;
        let gameLoopId, lastTime = 0;
        let toysFound = 0;

        const uiLayer = document.getElementById('ui-layer');
        const dialogueBox = document.getElementById('dialogue-box');
        const hud = document.getElementById('hud');
        const toyCountSpan = document.getElementById('toy-count');
        const fadeOverlay = document.getElementById('fade-overlay');
        const crosshair = document.getElementById('crosshair');

        // --- INPUT HANDLING ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        let joystick = { x: 0, y: 0, active: false, startX: 0, startY: 0 };

        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        const joystickZone = document.getElementById('joystick-zone');
        joystickZone.addEventListener('touchstart', e => {
            e.preventDefault(); joystick.active = true;
            joystick.startX = e.touches[0].clientX; joystick.startY = e.touches[0].clientY;
        });
        joystickZone.addEventListener('touchmove', e => {
            e.preventDefault(); if (!joystick.active) return;
            const dx = e.touches[0].clientX - joystick.startX;
            const dy = e.touches[0].clientY - joystick.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = 50; const angle = Math.atan2(dy, dx);
            const pull = Math.min(dist, maxDist);
            joystick.x = (Math.cos(angle) * pull) / maxDist;
            joystick.y = (Math.sin(angle) * pull) / maxDist;
        });
        joystickZone.addEventListener('touchend', e => {
            e.preventDefault(); joystick.active = false; joystick.x = 0; joystick.y = 0;
        });

        // --- AUDIO SYSTEM ---
        const AudioSys = {
            ctx: null, masterGain: null, notes: [261.63, 293.66, 329.63, 392.00, 440.00], isDark: false,
            init() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain(); this.masterGain.gain.value = 0.3;
                this.convolver = this.ctx.createConvolver();
                const length = this.ctx.sampleRate * 2.5;
                const impulse = this.ctx.createBuffer(2, length, this.ctx.sampleRate);
                for (let i = 0; i < length; i++) {
                    impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
                    impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
                }
                this.convolver.buffer = impulse;
                this.masterGain.connect(this.convolver); this.convolver.connect(this.ctx.destination);
                this.masterGain.connect(this.ctx.destination);
            },
            playNote(freq, type = 'sine', duration = 2, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            startBGM() {
                if (!this.ctx) return;
                this.loop = setInterval(() => {
                    if (this.isDark) return;
                    const baseFreq = this.notes[Math.floor(Math.random() * this.notes.length)];
                    this.playNote(baseFreq / 2, 'sine', 4, 0.1);
                    if (Math.random() > 0.5) setTimeout(() => this.playNote(baseFreq, 'triangle', 3, 0.05), 500);
                }, 2000);
            },
            triggerScary() {
                if (!this.ctx) return;
                this.isDark = true;
                this.playNote(100, 'sawtooth', 5, 0.4);
                this.playNote(105, 'sawtooth', 5, 0.4);
                this.playNote(210, 'square', 5, 0.2);
            }
        };

        // --- THREE.JS SETUP ---
        let scene, camera, renderer;
        let cat, catMixer, legs = [], tailPivot, head;
        let roomBoxes = [];
        let toys = [];
        let door;
        let particles;
        let ambientLight, scaryRedLight;

        // 3D Game World Params
        const worldBounds = { xMin: -250, xMax: 250, zMin: -200, zMax: 200 };
        const playerSpeed = 120;
        const catData = { velocity: new THREE.Vector3(), direction: new THREE.Vector3(0, 0, 1), walkTime: 0 };

        function initThreeJS() {
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x050510, 0.003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            // Camera starts high for intro
            camera.position.set(0, 150, 150);
            camera.lookAt(0, 0, 0);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Lights
            ambientLight = new THREE.AmbientLight(0x222233, 0.5);
            scene.add(ambientLight);

            scaryRedLight = new THREE.DirectionalLight(0xff0000, 0);
            scaryRedLight.position.set(0, 50, 50);
            scene.add(scaryRedLight);

            buildEnvironment();
            buildCat();
            createDustParticles();
        }

        function buildCat() {
            cat = new THREE.Group();

            // Materials (Tuxedo Cat)
            const furMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const whiteFurMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
            const pinkMat = new THREE.MeshStandardMaterial({ color: 0xffaaaa, roughness: 0.5 });

            // Body (Using stretched Sphere instead of Capsule for r128 compatibility)
            const bodyGeo = new THREE.SphereGeometry(4, 16, 16);
            const body = new THREE.Mesh(bodyGeo, furMat);
            body.scale.set(1.8, 1, 1);
            body.position.y = 7;
            body.castShadow = true;
            cat.add(body);

            // Belly (White patch)
            const bellyGeo = new THREE.SphereGeometry(3.5, 16, 16);
            const belly = new THREE.Mesh(bellyGeo, whiteFurMat);
            belly.scale.set(1.8, 1, 1);
            belly.position.set(0, 5.5, 0);
            cat.add(belly);

            // Head
            head = new THREE.Group();
            head.position.set(8, 10, 0);

            const headMesh = new THREE.Mesh(new THREE.SphereGeometry(4.5, 16, 16), furMat);
            headMesh.castShadow = true;
            head.add(headMesh);

            // Muzzle
            const muzzle = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 16), whiteFurMat);
            muzzle.position.set(3, -1, 0);
            head.add(muzzle);

            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), pinkMat);
            nose.position.set(4.8, 0, 0);
            head.add(nose);

            // Ears
            const earGeo = new THREE.ConeGeometry(1.5, 3, 4);
            const earL = new THREE.Mesh(earGeo, furMat);
            earL.position.set(0, 4, 3);
            earL.rotation.z = -0.2;
            earL.rotation.x = 0.2;
            head.add(earL);

            const earR = new THREE.Mesh(earGeo, furMat);
            earR.position.set(0, 4, -3);
            earR.rotation.z = -0.2;
            earR.rotation.x = -0.2;
            head.add(earR);

            cat.add(head);

            // Tail
            tailPivot = new THREE.Group();
            tailPivot.position.set(-8, 9, 0);
            const tailGeo = new THREE.CylinderGeometry(0.8, 0.4, 12, 8);
            const tailMesh = new THREE.Mesh(tailGeo, furMat);
            tailMesh.position.set(-5, 3, 0);
            tailMesh.rotation.z = Math.PI / 2 - 0.5;
            tailMesh.castShadow = true;
            tailPivot.add(tailMesh);
            cat.add(tailPivot);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.8, 0.6, 6, 8);
            const pawGeo = new THREE.SphereGeometry(1.2, 8, 8);

            const legPositions = [
                { x: 5, z: 3 }, { x: 5, z: -3 },   // Front
                { x: -5, z: 3 }, { x: -5, z: -3 }  // Back
            ];

            legPositions.forEach((pos, index) => {
                const legGroup = new THREE.Group();
                legGroup.position.set(pos.x, 6, pos.z);

                const isWhitePaw = index < 2 || Math.random() > 0.5;
                const legMesh = new THREE.Mesh(legGeo, furMat);
                legMesh.position.y = -3;
                legMesh.castShadow = true;
                legGroup.add(legMesh);

                const paw = new THREE.Mesh(pawGeo, isWhitePaw ? whiteFurMat : furMat);
                paw.position.set(0.5, -6, 0);
                legGroup.add(paw);

                legs.push(legGroup);
                cat.add(legGroup);
            });

            // Cat Personal Light (simulates night vision glow)
            const catLight = new THREE.PointLight(0xa8c0ff, 0.5, 100);
            catLight.position.set(0, 10, 0);
            cat.add(catLight);

            cat.position.set(0, 0, 0);
            scene.add(cat);
        }

        function buildEnvironment() {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(800, 800);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1525, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid pattern on floor to simulate wood planks
            const gridHelper = new THREE.GridHelper(800, 20, 0x000000, 0x000000);
            gridHelper.position.y = 0.1;
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Walls
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0f0c16, roughness: 1 });
            const walls = [
                { w: 800, h: 100, d: 20, x: 0, y: 50, z: -250 }, // North (Tall)
                { w: 800, h: 20, d: 20, x: 0, y: 10, z: 250 },   // South (Low for camera visibility)
                { w: 20, h: 20, d: 500, x: -250, y: 10, z: 0 },  // West (Low for camera visibility)
                { w: 20, h: 20, d: 500, x: 250, y: 10, z: 0 }    // East (Low for camera visibility)
            ];

            walls.forEach(w => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, w.h, w.d), wallMat);
                wall.position.set(w.x, w.y, w.z);
                wall.receiveShadow = true;
                wall.castShadow = true;
                scene.add(wall);
                roomBoxes.push(new THREE.Box3().setFromObject(wall));
            });

            // Window (cutout illusion on North Wall)
            const winGeo = new THREE.PlaneGeometry(120, 60);
            const winMat = new THREE.MeshBasicMaterial({ color: 0x05051a });
            const windowMesh = new THREE.Mesh(winGeo, winMat);
            windowMesh.position.set(0, 60, -239);
            scene.add(windowMesh);

            // Window Light
            const winLight = new THREE.RectAreaLight(0x4444ff, 2, 120, 60);
            winLight.position.set(0, 60, -238);
            winLight.lookAt(0, 0, 0);
            scene.add(winLight);

            // Furniture Helper
            function addFurniture(w, h, d, x, y, z, color, isTall) {
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, d),
                    new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 })
                );
                mesh.position.set(x, y + h / 2, z);
                mesh.castShadow = isTall;
                mesh.receiveShadow = true;
                scene.add(mesh);
                if (isTall) {
                    // slightly smaller collision box to allow sliding
                    const colBox = new THREE.Box3().setFromObject(mesh);
                    colBox.expandByScalar(-2);
                    roomBoxes.push(colBox);
                }
                return mesh;
            }

            // Sofa
            addFurniture(100, 20, 40, -100, 0, -100, 0x4a3b52, true);
            addFurniture(100, 40, 10, -100, 0, -115, 0x3a2b42, true); // Backrest

            // TV Stand & TV
            addFurniture(120, 25, 30, 150, 0, -180, 0x222222, true);
            const tv = addFurniture(80, 50, 5, 150, 25, -180, 0x111111, true);

            // TV Light (Blue glow)
            const tvLight = new THREE.PointLight(0x6b8cce, 1.5, 200);
            tvLight.position.set(150, 50, -160);
            tvLight.castShadow = true;
            scene.add(tvLight);

            // Table & Lamp
            addFurniture(50, 30, 50, 180, 0, 100, 0x3b2f2f, true);
            const lamp = addFurniture(10, 40, 10, 180, 30, 100, 0xffaa00, true);
            const lampLight = new THREE.PointLight(0xffb347, 1.2, 150);
            lampLight.position.set(180, 75, 100);
            lampLight.castShadow = true;
            scene.add(lampLight);

            // Rug
            addFurniture(120, 1, 150, 0, 0, 50, 0x5c4b51, false);

            // Toys
            const toyColors = [0xff4757, 0x2ed573, 0x1e90ff];
            const toyPositions = [{ x: -120, z: -50 }, { x: -180, z: 120 }, { x: 100, z: 20 }];

            toyPositions.forEach((pos, i) => {
                const group = new THREE.Group();
                group.position.set(pos.x, 5, pos.z);

                const mesh = new THREE.Mesh(
                    new THREE.OctahedronGeometry(4, 0),
                    new THREE.MeshStandardMaterial({ color: toyColors[i], emissive: toyColors[i], emissiveIntensity: 0.5 })
                );
                group.add(mesh);

                const light = new THREE.PointLight(toyColors[i], 1, 50);
                group.add(light);

                scene.add(group);
                toys.push({ group: group, mesh: mesh, active: true, color: toyColors[i] });
            });

            // Door
            const doorGeo = new THREE.BoxGeometry(60, 80, 5);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x332222 });
            door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(50, 40, 250); // South wall door
            scene.add(door);

            // Door open light (hidden initially)
            door.light = new THREE.SpotLight(0xffffff, 0, 300, Math.PI / 4, 0.5, 1);
            door.light.position.set(50, 40, 260);
            door.light.target = new THREE.Object3D();
            door.light.target.position.set(50, 0, 0);
            scene.add(door.light);
            scene.add(door.light.target);
        }

        function createDustParticles() {
            const geo = new THREE.BufferGeometry();
            const count = 300;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 500;
                if (i % 3 === 1) positions[i] = Math.random() * 100; // Y axis
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.3 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }

        function spawnCollectionSparkle(pos, color) {
            const geo = new THREE.BufferGeometry();
            const count = 20;
            const positions = new Float32Array(count * 3);
            const velocities = [];
            for (let i = 0; i < count; i++) {
                positions[i * 3] = pos.x;
                positions[i * 3 + 1] = pos.y;
                positions[i * 3 + 2] = pos.z;
                velocities.push(new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 2, (Math.random() - 0.5) * 2));
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 3, transparent: true, opacity: 1 });
            const sparkle = new THREE.Points(geo, mat);
            scene.add(sparkle);

            // simple animation loop attachment
            const startTime = performance.now();
            const animateSparkle = () => {
                const time = performance.now() - startTime;
                if (time > 1000) {
                    scene.remove(sparkle);
                    return;
                }
                const posAttr = sparkle.geometry.attributes.position;
                for (let i = 0; i < count; i++) {
                    posAttr.array[i * 3] += velocities[i].x;
                    posAttr.array[i * 3 + 1] += velocities[i].y;
                    posAttr.array[i * 3 + 2] += velocities[i].z;
                    velocities[i].y -= 0.05; // gravity
                }
                posAttr.needsUpdate = true;
                sparkle.material.opacity = 1 - (time / 1000);
                requestAnimationFrame(animateSparkle);
            };
            animateSparkle();
        }

        // --- NARRATIVE / CUTSCENES ---
        const script = [
            { text: "Mew York City. The city of endless lights.", duration: 3000 },
            { text: "Life with my nice humans was purr-fect...", duration: 3000 },
            { text: "Warm beds, chin scratches, and all the treats I could eat.", duration: 4000 },
            { text: "But tonight... the city was calling to me.", duration: 3500 },
            { text: "I should find my 3 favorite toys before I leave.", duration: 3500, endCutscene: true }
        ];

        const endScript = [
            { text: "The door was left open... just a crack.", duration: 3000 },
            { text: "Finally, freedom. The cool city breeze...", duration: 3000 },
            { action: 'scary' },
            { text: "WAIT. Who are you? Put me down!", duration: 3000, shake: true },
            { text: "Gotcha now, you little pest.", duration: 3000, shake: true, redText: true },
            { text: "You're coming with us.", duration: 3500, shake: true, redText: true },
            { text: "...", duration: 2000, fadeBlack: true },
            { text: "And that's how I met the Mean Owners.", duration: 4000 },
            { action: 'gameOver' }
        ];

        let currentScript = script;
        let scriptIndex = 0;
        let typeTimer = 0, textToType = "", currentTyped = "", cutsceneTimer = 0;
        let screenShake = 0, fadeBlackAmount = 0;

        function startCutscene(seq) {
            currentState = STATE.CUTSCENE;
            currentScript = seq;
            scriptIndex = 0;
            uiLayer.classList.add('cutscene-active');
            crosshair.style.opacity = 0;
            loadNextDialogue();
        }

        function loadNextDialogue() {
            if (scriptIndex >= currentScript.length) { endCutscene(); return; }

            const line = currentScript[scriptIndex];
            if (line.action === 'scary') {
                AudioSys.triggerScary();
                scaryRedLight.intensity = 2; // Turn on red light
                scene.fog.color.setHex(0x1a0000); // Red fog
                scriptIndex++; loadNextDialogue(); return;
            }
            if (line.action === 'gameOver') { showTitleDrop(); return; }

            textToType = line.text; currentTyped = "";
            dialogueBox.innerHTML = ""; dialogueBox.classList.add('visible');
            dialogueBox.style.color = line.redText ? '#ff4444' : 'white';

            typeTimer = 0; cutsceneTimer = line.duration / 1000;
        }

        function endCutscene() {
            dialogueBox.classList.remove('visible');
            uiLayer.classList.remove('cutscene-active');
            if (currentScript === script) {
                currentState = STATE.PLAYING;
                hud.style.opacity = 1;
                crosshair.style.opacity = 1;
            }
        }

        function showTitleDrop() {
            uiLayer.style.display = 'none';
            fadeOverlay.style.display = 'none';
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = 0; startScreen.style.display = 'flex';
            startScreen.style.background = 'black';
            startScreen.innerHTML = `
        <h1 style="color:red; text-shadow: 0 0 20px red; background:none; -webkit-text-fill-color: red;">GOOFY PAWS</h1>
        <p class="text-white mt-4 tracking-widest uppercase">The Origins</p>
        <p class="text-gray-500 mt-10 text-sm">To be continued in the main game...</p>
    `;
            setTimeout(() => { startScreen.style.opacity = 1; }, 100);
        }

        // --- UPDATE LOGIC ---
        const catCollider = new THREE.Box3();

        function update(dt) {
            if (dt > 0.1) dt = 0.1;

            if (screenShake > 0) screenShake -= dt;
            else screenShake = 0;

            // Dust particles slow drift
            if (particles) {
                particles.rotation.y += 0.05 * dt;
                const pos = particles.geometry.attributes.position.array;
                for (let i = 1; i < pos.length; i += 3) {
                    pos[i] -= 2 * dt; // slow fall
                    if (pos[i] < 0) pos[i] = 100;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            // Cutscene logic
            if (currentState === STATE.CUTSCENE) {
                if (currentTyped.length < textToType.length) {
                    typeTimer += dt;
                    if (typeTimer > 0.03) {
                        currentTyped += textToType[currentTyped.length];
                        dialogueBox.innerHTML = currentTyped;
                        typeTimer = 0;
                    }
                }

                cutsceneTimer -= dt;
                if (cutsceneTimer <= 0) {
                    if (currentScript[scriptIndex].endCutscene) endCutscene();
                    else if (currentScript[scriptIndex].fadeBlack) {
                        fadeBlackAmount += dt * 0.5;
                        fadeOverlay.style.opacity = fadeBlackAmount;
                        if (fadeBlackAmount >= 1) { scriptIndex++; loadNextDialogue(); }
                    } else { scriptIndex++; loadNextDialogue(); }
                }
                if (currentScript[scriptIndex] && currentScript[scriptIndex].shake) screenShake = 0.2;

                // Intro Camera Pan
                if (currentScript === script) {
                    camera.position.lerp(new THREE.Vector3(0, 40, 100), dt * 0.5);
                    camera.lookAt(cat.position);
                }
            }

            if (currentState === STATE.PLAYING || currentState === STATE.CAPTURED) {

                // Movement Input
                let moveX = 0, moveZ = 0;
                if (currentState === STATE.PLAYING) {
                    if (keys.w || keys.ArrowUp) moveZ -= 1;
                    if (keys.s || keys.ArrowDown) moveZ += 1;
                    if (keys.a || keys.ArrowLeft) moveX -= 1;
                    if (keys.d || keys.ArrowRight) moveX += 1;

                    if (joystick.active) { moveX = joystick.x; moveZ = joystick.y; }
                } else {
                    // Captured - forced slow move backwards
                    moveZ = 0.5;
                }

                const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                if (len > 0) {
                    moveX /= len; moveZ /= len;
                    catData.velocity.x = moveX * playerSpeed;
                    catData.velocity.z = moveZ * playerSpeed;

                    // Calculate target rotation (cat faces movement direction)
                    const targetAngle = Math.atan2(moveX, moveZ);
                    // Smooth rotation with proper angle wrap-around handling
                    let diff = targetAngle - cat.rotation.y;
                    // Normalize diff to -PI to PI
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;

                    cat.rotation.y += diff * 10 * dt;

                    catData.walkTime += dt * 15;

                    // Wag tail while moving
                    if (tailPivot) tailPivot.rotation.y = Math.sin(catData.walkTime * 0.5) * 0.5;
                    // Bob head
                    if (head) head.rotation.z = Math.sin(catData.walkTime) * 0.1;

                } else {
                    // Friction
                    catData.velocity.x *= 0.8;
                    catData.velocity.z *= 0.8;
                    catData.walkTime += dt * 3; // Slow wag
                    if (tailPivot) tailPivot.rotation.y = Math.sin(catData.walkTime * 0.5) * 0.2;
                    if (head) head.rotation.z = 0;
                }

                // Animate Legs (simple swing)
                const speedRatio = Math.min(1, Math.sqrt(catData.velocity.x ** 2 + catData.velocity.z ** 2) / playerSpeed);
                if (legs.length === 4) {
                    const swing = Math.sin(catData.walkTime) * 0.6 * speedRatio;
                    legs[0].rotation.z = swing; // Front L
                    legs[1].rotation.z = -swing; // Front R
                    legs[2].rotation.z = -swing; // Back L
                    legs[3].rotation.z = swing; // Back R
                }

                // Apply Movement & Collision
                const nextX = cat.position.x + catData.velocity.x * dt;
                const nextZ = cat.position.z + catData.velocity.z * dt;

                // Set collider to intended position (Square footprint prevents snagging on walls when rotating)
                catCollider.setFromCenterAndSize(new THREE.Vector3(nextX, cat.position.y, nextZ), new THREE.Vector3(14, 15, 14));

                let collided = false;
                for (let box of roomBoxes) {
                    if (catCollider.intersectsBox(box)) { collided = true; break; }
                }

                if (!collided) {
                    cat.position.x = nextX;
                    cat.position.z = nextZ;
                } else {
                    // Try sliding (X then Z)
                    catCollider.setFromCenterAndSize(new THREE.Vector3(nextX, cat.position.y, cat.position.z), new THREE.Vector3(14, 15, 14));
                    let colX = false;
                    for (let box of roomBoxes) if (catCollider.intersectsBox(box)) colX = true;
                    if (!colX) cat.position.x = nextX;

                    catCollider.setFromCenterAndSize(new THREE.Vector3(cat.position.x, cat.position.y, nextZ), new THREE.Vector3(14, 15, 14));
                    let colZ = false;
                    for (let box of roomBoxes) if (catCollider.intersectsBox(box)) colZ = true;
                    if (!colZ) cat.position.z = nextZ;
                }

                // Toy Collection
                if (currentState === STATE.PLAYING) {
                    toys.forEach(t => {
                        if (t.active) {
                            // Hover animation
                            t.mesh.position.y = Math.sin(performance.now() * 0.003) * 2;
                            t.mesh.rotation.y += 2 * dt;
                            t.mesh.rotation.x += 1 * dt;

                            const dist = cat.position.distanceTo(t.group.position);
                            if (dist < 15) {
                                t.active = false;
                                scene.remove(t.group);
                                toysFound++;
                                toyCountSpan.innerText = toysFound;
                                spawnCollectionSparkle(t.group.position, t.color);
                                AudioSys.playNote(600 + toysFound * 100, 'sine', 0.5, 0.2);

                                if (toysFound >= 3) {
                                    // Open door
                                    door.position.x += 40; // Slide open
                                    door.light.intensity = 2; // Shine light in
                                    AudioSys.playNote(300, 'square', 1, 0.2);
                                    hud.innerHTML = "The door is open... Time to explore.";

                                    // add door to collision properly
                                    const dBox = new THREE.Box3().setFromObject(door);
                                    roomBoxes.push(dBox);
                                }
                            }
                        }
                    });

                    // Win condition (reach door z > 240 near x=50)
                    if (toysFound >= 3 && cat.position.z > 230 && cat.position.x > 30 && cat.position.x < 110) {
                        currentState = STATE.CAPTURED;
                        hud.style.opacity = 0;
                        crosshair.style.opacity = 0;
                        startCutscene(endScript);
                    }
                }

                // Fixed isometric/trailing camera (decoupled from cat rotation to prevent dizzying control loops)
                if (currentState === STATE.PLAYING) {
                    // Fixed offset: looking down from the South towards the North
                    const offset = new THREE.Vector3(0, 80, 100);

                    const targetCamPos = cat.position.clone().add(offset);

                    // Shake
                    if (screenShake > 0) {
                        targetCamPos.x += (Math.random() - 0.5) * 5;
                        targetCamPos.y += (Math.random() - 0.5) * 5;
                    }

                    camera.position.lerp(targetCamPos, 5 * dt);

                    // Look slightly ahead of the cat
                    const lookTarget = cat.position.clone();
                    lookTarget.y += 10;
                    camera.lookAt(lookTarget);
                } else if (currentState === STATE.CAPTURED) {
                    // Dramatically lock camera and shake
                    const offset = new THREE.Vector3(0, 20, -50); // Look at the cat's back as it is pulled south
                    const targetCamPos = cat.position.clone().add(offset);
                    if (screenShake > 0) {
                        targetCamPos.x += (Math.random() - 0.5) * 10;
                        targetCamPos.y += (Math.random() - 0.5) * 10;
                    }
                    camera.position.lerp(targetCamPos, 10 * dt);
                    camera.lookAt(cat.position);
                }
            }
        }

        // --- MAIN LOOP ---
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (currentState !== STATE.MENU) {
                update(dt);
                if (renderer && scene && camera) {
                    renderer.render(scene, camera);
                }
            }

            gameLoopId = requestAnimationFrame(loop);
        }

        // --- INITIALIZATION ---
        function startGame() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';

                initThreeJS();
                AudioSys.init();
                AudioSys.startBGM();

                startCutscene(script);
                lastTime = performance.now();
                requestAnimationFrame(loop);
            }, 1000);
        }

    </script>
