<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Society</title>
    <link rel="icon" type="image/png" href="../high-society-favicon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RNVL7JZVJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-6RNVL7JZVJ');
    </script>
</head>

<body>
    <div id="root"></div>

    <!-- Load game scripts in order: logic -> ui components -> screens -> app (mounts React) -->
    <script src="js/logic.js"></script>
    <script type="text/babel" data-plugins="transform-react-jsx" src="js/ui-components.js"></script>
    <script type="text/babel" data-plugins="transform-react-jsx" src="js/screens.js"></script>
    <script type="text/babel" data-plugins="transform-react-jsx" src="js/app.js"></script>
</body>

</html>
