<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goofy Paws: Origins 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital@0;1&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .letterbox {
            height: 0%;
            background: black;
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .cutscene-active .letterbox {
            height: 15%;
        }

        #dialogue-box {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #dialogue-box.visible {
            opacity: 1;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: white;
            transition: opacity 2s;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: linear-gradient(to right, #fff, #a8c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button.play-btn {
            pointer-events: auto;
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button.play-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 1s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #controls-guide {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #a8c0ff;
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            line-height: 1.4;
            backdrop-filter: blur(4px);
        }

        #controls-guide b { color: #a8c0ff; margin-right: 5px; }

        #quest-log {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            color: white;
            font-size: 0.9rem;
            max-width: 300px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
        }
        
        #quest-log h3 { margin: 0 0 10px 0; color: #a8c0ff; font-family: 'Playfair Display', serif; }
        .quest-item { margin-bottom: 8px; }
        .quest-title { font-weight: bold; }
        .quest-desc { font-size: 0.8rem; color: #aaa; margin-left: 10px; }
        .quest-status { float: right; color: #2ed573; font-weight: bold;}
        
        #interaction-prompt {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 1s;
        }

        #joystick-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 50%;
            pointer-events: auto;
            display: none;
        }

        @media (hover: none) and (pointer: coarse) {
            #joystick-zone {
                display: block;
            }

            #hud {
                top: 10px;
                font-size: 1rem;
            }
        }

        #fade-overlay {
            position: absolute;
            inset: 0;
            background: black;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
            z-index: 40;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="letterbox top"></div>
        <div id="hud">
            <div id="controls-guide">
                <div><b>WASD / Arrows</b> Move</div>
                <div><b>[E]</b> Interact / Scratch</div>
                <div id="guide-jump" style="opacity: 0.5;"><b>[Space]</b> Jump (Locked)</div>
                <div id="guide-sprint" style="opacity: 0.5;"><b>[Shift]</b> Sprint (Locked)</div>
                <div id="guide-vision" style="opacity: 0.5;"><b>[F]</b> Night Vision (Locked)</div>
            </div>
            <div>Memory Fragments: <span id="toy-count">0</span>/3</div>
            <div id="abilities-hud" style="font-size: 0.8rem; color: #a8c0ff; margin-top: 5px;"></div>
        </div>
        <div id="quest-log">
            <h3>Active Quests</h3>
            <div id="main-quest"></div>
            <hr style="border-color: rgba(255,255,255,0.2); margin: 10px 0;">
            <div id="side-quests"></div>
        </div>
        <div class="crosshair" id="crosshair"></div>
        <div id="interaction-prompt">[E] Interact</div>
        <div id="dialogue-box"></div>
        <div class="letterbox bottom"></div>
    </div>

    <div id="fade-overlay"></div>
    <div id="joystick-zone"></div>

    <div id="start-screen">
        <p class="text-gray-400 tracking-[0.3em] mb-2 uppercase text-sm">A 3D Prequel</p>
        <h1>Goofy Paws: Origins</h1>
        <p class="text-xl font-light text-gray-300 italic">Mew York City</p>
        <button class="play-btn" onclick="startGame()">Start Memory</button>
        <p class="absolute bottom-10 text-xs text-gray-500">Headphones recommended. Use WASD/Arrows to move.</p>
    </div>

    <script>
        /**
         * GOOFY PAWS: ORIGINS 3D
         * Rebuilt from the ground up using Three.js.
         * Features a procedural 3D cat, dynamic lighting, and immersive environment.
         */

        // --- STATE & UI GLOBALS ---
        const STATE = { MENU: 0, CUTSCENE: 1, PLAYING: 2, CAPTURED: 3 };
        let currentState = STATE.MENU;
        let gameLoopId, lastTime = 0;
        let toysFound = 0;

        const uiLayer = document.getElementById('ui-layer');
        const dialogueBox = document.getElementById('dialogue-box');
        const hud = document.getElementById('hud');
        const questLog = document.getElementById('quest-log');
        const mainQuestDiv = document.getElementById('main-quest');
        const sideQuestsDiv = document.getElementById('side-quests');
        const abilitiesHud = document.getElementById('abilities-hud');
        const promptDiv = document.getElementById('interaction-prompt');
        const toyCountSpan = document.getElementById('toy-count');
        const fadeOverlay = document.getElementById('fade-overlay');
        const crosshair = document.getElementById('crosshair');

        // --- NEW DATA STRUCTURES ---
        const abilities = { sprint: false, jump: false, scratch: false, nightVision: false };
        
        const Quests = {
            main: [
                { id: 0, title: 'The Great Awakening', desc: 'Find 3 lost memory toys in the living room.', target: 3, progress: 0, reward: 'Sprint', abilityCheck: null },
                { id: 1, title: 'Rebel Without Claws', desc: 'Find the sofa and scratch it 5 times.', target: 5, progress: 0, reward: 'Jump', abilityCheck: 'sprint' },
                { id: 2, title: 'Midnight Snack', desc: 'Jump onto the kitchen counter and eat 5 treats.', target: 5, progress: 0, reward: 'Night Vision', abilityCheck: 'jump' },
                { id: 3, title: 'Vase Destruction', desc: 'Find and knock over 4 vases.', target: 4, progress: 0, reward: 'Scratch Mastery', abilityCheck: 'nightVision' },
                { id: 4, title: 'The Great Escape', desc: 'Find the key under the bed, open the door, and leave.', target: 1, progress: 0, reward: 'Freedom', abilityCheck: 'scratch' }
            ],
            side: [
                { id: 0, title: 'Dust Bunny Hunter', desc: 'Catch 5 dust bunnies.', target: 5, progress: 0, completed: false, rewardText: 'Squeaky Sound' },
                { id: 1, title: 'TV Critic', desc: 'Turn on the TV.', target: 1, progress: 0, completed: false, rewardText: '+1 Point' },
                { id: 2, title: 'Bug Catcher', desc: 'Catch the fly near the lamp.', target: 1, progress: 0, completed: false, rewardText: 'Aura Glow' },
                { id: 3, title: 'Water Break', desc: 'Drink from the water bowl.', target: 1, progress: 0, completed: false, rewardText: 'Hydration' },
                { id: 4, title: 'Socks Thief', desc: 'Steal 3 socks.', target: 3, progress: 0, completed: false, rewardText: 'Soft Footsteps' },
                { id: 5, title: 'High Ground', desc: 'Reach the highest point.', target: 1, progress: 0, completed: false, rewardText: 'Eagle Eye' },
                { id: 6, title: 'Nap Time', desc: 'Sleep on the rug for 5s.', target: 5, progress: 0, completed: false, rewardText: 'Stamina' },
                { id: 7, title: 'Laser Chaser', desc: 'Catch the red dot.', target: 1, progress: 0, completed: false, rewardText: 'Speed Burst' },
                { id: 8, title: 'Cardboard Box', desc: 'Sit inside a box.', target: 1, progress: 0, completed: false, rewardText: 'Stealth' },
                { id: 9, title: 'Knock it Off', desc: 'Knock 5 books off the table.', target: 5, progress: 0, completed: false, rewardText: 'Chaos' }
            ],
            activeMain: 0
        };

        let isInteracting = false;
        let showPrompt = false;

        function updateQuestUI() {
            if (currentState !== STATE.PLAYING) return;
            
            const mq = Quests.main[Quests.activeMain];
            if (mq) {
                mainQuestDiv.innerHTML = `
                    <div class="quest-item">
                        <span class="quest-title">${mq.title}</span> <span class="quest-status">${mq.progress}/${mq.target}</span>
                        <div class="quest-desc">${mq.desc} <br><i>Reward: ${mq.reward}</i></div>
                    </div>`;
            } else {
                mainQuestDiv.innerHTML = `<div class="quest-item"><span class="quest-title" style="color:#2ed573;">Story Complete</span></div>`;
            }

            let sideHtml = '';
            Quests.side.filter(sq => !sq.completed && sq.progress > 0).forEach(sq => {
                 sideHtml += `
                    <div class="quest-item">
                        <span class="quest-title">${sq.title}</span> <span class="quest-status">${sq.progress}/${sq.target}</span>
                    </div>`;
            });
            sideQuestsDiv.innerHTML = sideHtml;
            
            ABILITIES_HUD_UPDATE: {
                if (abilities.sprint) document.getElementById('guide-sprint').style.opacity = "1";
                if (abilities.jump) document.getElementById('guide-jump').style.opacity = "1";
                if (abilities.nightVision) document.getElementById('guide-vision').style.opacity = "1";
            }
            
            let absHtml = '';
            if (abilities.sprint) absHtml += '[Hold Shift] Sprint Enabled<br>';
            if (abilities.jump) absHtml += '[Space] Jump Enabled<br>';
            if (abilities.scratch) absHtml += '[E] Scratch Mastery Enabled<br>';
            if (abilities.nightVision) absHtml += '[F] Night Vision Enabled<br>';
            abilitiesHud.innerHTML = absHtml;
        }

        // --- INPUT HANDLING ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, Shift: false, ' ': false, e: false, f: false };
        let joystick = { x: 0, y: 0, active: false, startX: 0, startY: 0 };

        window.addEventListener('keydown', e => { 
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true; 
            if (e.key === ' ' || e.key === 'f') e.preventDefault();
        });
        window.addEventListener('keyup', e => { 
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false; 
            if (e.key === 'e') isInteracting = false;
        });

        const joystickZone = document.getElementById('joystick-zone');
        joystickZone.addEventListener('touchstart', e => {
            e.preventDefault(); joystick.active = true;
            joystick.startX = e.touches[0].clientX; joystick.startY = e.touches[0].clientY;
        });
        joystickZone.addEventListener('touchmove', e => {
            e.preventDefault(); if (!joystick.active) return;
            const dx = e.touches[0].clientX - joystick.startX;
            const dy = e.touches[0].clientY - joystick.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = 50; const angle = Math.atan2(dy, dx);
            const pull = Math.min(dist, maxDist);
            joystick.x = (Math.cos(angle) * pull) / maxDist;
            joystick.y = (Math.sin(angle) * pull) / maxDist;
        });
        joystickZone.addEventListener('touchend', e => {
            e.preventDefault(); joystick.active = false; joystick.x = 0; joystick.y = 0;
        });

        // --- AUDIO SYSTEM ---
        const AudioSys = {
            ctx: null, masterGain: null, notes: [261.63, 293.66, 329.63, 392.00, 440.00], isDark: false,
            init() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain(); this.masterGain.gain.value = 0.3;
                this.convolver = this.ctx.createConvolver();
                const length = this.ctx.sampleRate * 2.5;
                const impulse = this.ctx.createBuffer(2, length, this.ctx.sampleRate);
                for (let i = 0; i < length; i++) {
                    impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
                    impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
                }
                this.convolver.buffer = impulse;
                this.masterGain.connect(this.convolver); this.convolver.connect(this.ctx.destination);
                this.masterGain.connect(this.ctx.destination);
            },
            playNote(freq, type = 'sine', duration = 2, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            startBGM() {
                if (!this.ctx) return;
                this.loop = setInterval(() => {
                    if (this.isDark) return;
                    const baseFreq = this.notes[Math.floor(Math.random() * this.notes.length)];
                    this.playNote(baseFreq / 2, 'sine', 4, 0.1);
                    if (Math.random() > 0.5) setTimeout(() => this.playNote(baseFreq, 'triangle', 3, 0.05), 500);
                }, 2000);
            },
            triggerScary() {
                if (!this.ctx) return;
                this.isDark = true;
                this.playNote(100, 'sawtooth', 5, 0.4);
                this.playNote(105, 'sawtooth', 5, 0.4);
                this.playNote(210, 'square', 5, 0.2);
            }
        };

        // --- THREE.JS SETUP ---
        let scene, camera, renderer;
        let cat, catMixer, legs = [], tailPivot, head;
        let roomBoxes = [];
        let interactables = [];
        let toys = [];
        let door;
        let particles;
        let ambientLight, scaryRedLight;

        // 3D Game World Params
        const worldBounds = { xMin: -250, xMax: 250, zMin: -200, zMax: 200 };
        let playerSpeed = 120;
        const catData = { velocity: new THREE.Vector3(), direction: new THREE.Vector3(0, 0, 1), walkTime: 0, velocityY: 0, isGrounded: false };

        function initThreeJS() {
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333344); // Lighter background
            scene.fog = new THREE.FogExp2(0x333344, 0.0001); // Almost no fog

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            // Camera starts high for intro
            camera.position.set(0, 150, 150);
            camera.lookAt(0, 0, 0);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Lights (Brighter)
            ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
            scene.add(ambientLight);

            scaryRedLight = new THREE.DirectionalLight(0xff0000, 0);
            scaryRedLight.position.set(0, 50, 50);
            scene.add(scaryRedLight);

            buildEnvironment();
            buildCat();
            createDustParticles();
        }

        function buildCat() {
            cat = new THREE.Group();

            // Materials (Tuxedo Cat)
            const furMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const whiteFurMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
            const pinkMat = new THREE.MeshStandardMaterial({ color: 0xffaaaa, roughness: 0.5 });

            // Body (Using stretched Sphere instead of Capsule for r128 compatibility)
            const bodyGeo = new THREE.SphereGeometry(4, 16, 16);
            const body = new THREE.Mesh(bodyGeo, furMat);
            body.scale.set(1.8, 1, 1);
            body.position.y = 7;
            body.castShadow = true;
            cat.add(body);

            // Belly (White patch)
            const bellyGeo = new THREE.SphereGeometry(3.5, 16, 16);
            const belly = new THREE.Mesh(bellyGeo, whiteFurMat);
            belly.scale.set(1.8, 1, 1);
            belly.position.set(0, 5.5, 0);
            cat.add(belly);

            // Head
            head = new THREE.Group();
            head.position.set(8, 10, 0);

            const headMesh = new THREE.Mesh(new THREE.SphereGeometry(4.5, 16, 16), furMat);
            headMesh.castShadow = true;
            head.add(headMesh);

            // Muzzle
            const muzzle = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 16), whiteFurMat);
            muzzle.position.set(3, -1, 0);
            head.add(muzzle);

            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), pinkMat);
            nose.position.set(4.8, 0, 0);
            head.add(nose);

            // Ears
            const earGeo = new THREE.ConeGeometry(1.5, 3, 4);
            const earL = new THREE.Mesh(earGeo, furMat);
            earL.position.set(0, 4, 3);
            earL.rotation.z = -0.2;
            earL.rotation.x = 0.2;
            head.add(earL);

            const earR = new THREE.Mesh(earGeo, furMat);
            earR.position.set(0, 4, -3);
            earR.rotation.z = -0.2;
            earR.rotation.x = -0.2;
            head.add(earR);

            cat.add(head);

            // Tail
            tailPivot = new THREE.Group();
            tailPivot.position.set(-8, 9, 0);
            const tailGeo = new THREE.CylinderGeometry(0.8, 0.4, 12, 8);
            const tailMesh = new THREE.Mesh(tailGeo, furMat);
            tailMesh.position.set(-5, 3, 0);
            tailMesh.rotation.z = Math.PI / 2 - 0.5;
            tailMesh.castShadow = true;
            tailPivot.add(tailMesh);
            cat.add(tailPivot);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.8, 0.6, 6, 8);
            const pawGeo = new THREE.SphereGeometry(1.2, 8, 8);

            const legPositions = [
                { x: 5, z: 3 }, { x: 5, z: -3 },   // Front
                { x: -5, z: 3 }, { x: -5, z: -3 }  // Back
            ];

            legPositions.forEach((pos, index) => {
                const legGroup = new THREE.Group();
                legGroup.position.set(pos.x, 6, pos.z);

                const isWhitePaw = index < 2 || Math.random() > 0.5;
                const legMesh = new THREE.Mesh(legGeo, furMat);
                legMesh.position.y = -3;
                legMesh.castShadow = true;
                legGroup.add(legMesh);

                const paw = new THREE.Mesh(pawGeo, isWhitePaw ? whiteFurMat : furMat);
                paw.position.set(0.5, -6, 0);
                legGroup.add(paw);

                legs.push(legGroup);
                cat.add(legGroup);
            });

            // Cat Personal Light (simulates night vision glow)
            const catLight = new THREE.PointLight(0xa8c0ff, 1.5, 300);
            catLight.position.set(0, 20, 0);
            cat.add(catLight);

            cat.position.set(0, 0, 0);
            scene.add(cat);
        }

        function buildEnvironment() {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(800, 800);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a4555, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid pattern on floor to simulate wood planks
            const gridHelper = new THREE.GridHelper(800, 20, 0x000000, 0x000000);
            gridHelper.position.y = 0.1;
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Walls
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x3d394a, roughness: 1 });
            const walls = [
                { w: 800, h: 100, d: 20, x: 0, y: 50, z: -250 }, // North (Tall)
                { w: 800, h: 20, d: 20, x: 0, y: 10, z: 250 },   // South (Low for camera visibility)
                { w: 20, h: 20, d: 500, x: -250, y: 10, z: 0 },  // West (Low for camera visibility)
                { w: 20, h: 20, d: 500, x: 250, y: 10, z: 0 }    // East (Low for camera visibility)
            ];

            walls.forEach(w => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, w.h, w.d), wallMat);
                wall.position.set(w.x, w.y, w.z);
                wall.receiveShadow = true;
                wall.castShadow = true;
                scene.add(wall);
                roomBoxes.push(new THREE.Box3().setFromObject(wall));

        function createDustParticles() {
            const geo = new THREE.BufferGeometry();
            const count = 300;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 500;
                if (i % 3 === 1) positions[i] = Math.random() * 100; // Y axis
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.3 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }

        function spawnCollectionSparkle(pos, color) {
            const geo = new THREE.BufferGeometry();
            const count = 20;
            const positions = new Float32Array(count * 3);
            const velocities = [];
            for (let i = 0; i < count; i++) {
                positions[i * 3] = pos.x;
                positions[i * 3 + 1] = pos.y;
                positions[i * 3 + 2] = pos.z;
                velocities.push(new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 2, (Math.random() - 0.5) * 2));
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 3, transparent: true, opacity: 1 });
            const sparkle = new THREE.Points(geo, mat);
            scene.add(sparkle);

            // simple animation loop attachment
            const startTime = performance.now();
            const animateSparkle = () => {
                const time = performance.now() - startTime;
                if (time > 1000) {
                    scene.remove(sparkle);
                    return;
                }
                const posAttr = sparkle.geometry.attributes.position;
                for (let i = 0; i < count; i++) {
                    posAttr.array[i * 3] += velocities[i].x;
                    posAttr.array[i * 3 + 1] += velocities[i].y;
                    posAttr.array[i * 3 + 2] += velocities[i].z;
                    velocities[i].y -= 0.05; // gravity
                }
                posAttr.needsUpdate = true;
                sparkle.material.opacity = 1 - (time / 1000);
                requestAnimationFrame(animateSparkle);
            };
            animateSparkle();
        }

        // --- INTERACTION & QUEST LOGIC ---
        let nearestInteractable = null;

        function checkInteractions() {
            nearestInteractable = null;
            let minDist = 30;
            for (let obj of interactables) {
                if (obj.active && cat.position.distanceTo(obj.mesh.position) < minDist) {
                    nearestInteractable = obj;
                    minDist = cat.position.distanceTo(obj.mesh.position);

            if (!nearestInteractable) return;

        function progressMainQuest(amount = 1) {
            const mq = Quests.main[Quests.activeMain];
            if (!mq) return;
            mq.progress += amount;
            if (mq.progress >= mq.target) {

                if (mq.reward === 'Sprint') { abilities.sprint = true; hud.innerHTML += '<br><b style="color:#a8c0ff;">Unlocked: Sprint!</b>'; }
                if (mq.reward === 'Jump') { abilities.jump = true; hud.innerHTML += '<br><b style="color:#a8c0ff;">Unlocked: Jump!</b>'; }
                if (mq.reward === 'Night Vision') { abilities.nightVision = true; hud.innerHTML += '<br><b style="color:#a8c0ff;">Unlocked: Night Vision!</b>'; }
                if (mq.reward === 'Scratch Mastery') { abilities.scratch = true; hud.innerHTML += '<br><b style="color:#a8c0ff;">Unlocked: Scratch Mastery!</b>'; }
                
                AudioSys.playNote(800, 'sine', 1, 0.2);

        // --- UPDATE LOGIC ---
        const catCollider = new THREE.Box3();

        function update(dt) {
            if (dt > 0.1) dt = 0.1;

            if (screenShake > 0) screenShake -= dt;
            else screenShake = 0;

            // Dust particles slow drift
            if (particles) {
                particles.rotation.y += 0.05 * dt;
                const pos = particles.geometry.attributes.position.array;
                for (let i = 1; i < pos.length; i += 3) {
                    pos[i] -= 2 * dt; // slow fall
                    if (pos[i] < 0) pos[i] = 100;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            // Cutscene logic
            if (currentState === STATE.CUTSCENE) {
                if (currentTyped.length < textToType.length) {
                    typeTimer += dt;
                    if (typeTimer > 0.03) {
                        currentTyped += textToType[currentTyped.length];
                        dialogueBox.innerHTML = currentTyped;
                        typeTimer = 0;
                    }
                }

                cutsceneTimer -= dt;
                if (cutsceneTimer <= 0) {
                    if (currentScript[scriptIndex].endCutscene) endCutscene();
                    else if (currentScript[scriptIndex].fadeBlack) {
                        fadeBlackAmount += dt * 0.5;
                        fadeOverlay.style.opacity = fadeBlackAmount;
                        if (fadeBlackAmount >= 1) { scriptIndex++; loadNextDialogue(); }
                    } else { scriptIndex++; loadNextDialogue(); }
                }
                if (currentScript[scriptIndex] && currentScript[scriptIndex].shake) screenShake = 0.2;

                // Intro Camera Pan
                if (currentScript === script) {
                    camera.position.lerp(new THREE.Vector3(0, 40, 100), dt * 0.5);
                    camera.lookAt(cat.position);
                }
            }

            if (currentState === STATE.PLAYING || currentState === STATE.CAPTURED) {

                // Interaction & Abilities Input
                if (abilities.sprint && keys.Shift) playerSpeed = 240;
                else playerSpeed = 120;

                if (abilities.jump && keys[' '] && catData.isGrounded) {
                    catData.velocityY = 150; // Jump force
                    catData.isGrounded = false;
                }

                if (keys.e && !isInteracting) {
                    isInteracting = true; // prevent hold
                    handleInteraction();
                }

                if (keys.f) {
                    if (abilities.nightVision) scene.fog.density = 0.00001; // almost zero
                } else {
                    if (currentState !== STATE.CUTSCENE || currentScript !== endScript) {
                        scene.fog.density = 0.0001;
                    }
                }

                // Movement Input
                let moveX = 0, moveZ = 0;
                if (currentState === STATE.PLAYING) {
                    if (keys.w || keys.ArrowUp) moveZ -= 1;
                    if (keys.s || keys.ArrowDown) moveZ += 1;
                    if (keys.a || keys.ArrowLeft) moveX -= 1;
                    if (keys.d || keys.ArrowRight) moveX += 1;

                    if (joystick.active) { moveX = joystick.x; moveZ = joystick.y; }
                } else {
                    // Captured - forced slow move backwards
                    moveZ = 0.5;
                }

                const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                if (len > 0) {
                    moveX /= len; moveZ /= len;
                    catData.velocity.x = moveX * playerSpeed;
                    catData.velocity.z = moveZ * playerSpeed;

                    // Calculate target rotation (cat faces movement direction)
                    const targetAngle = Math.atan2(moveZ, moveX);
                    // Smooth rotation with proper angle wrap-around handling
                    let diff = targetAngle - cat.rotation.y;
                    // Normalize diff to -PI to PI
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;

                    cat.rotation.y += diff * 10 * dt;

                    catData.walkTime += dt * 15;

                    // Wag tail while moving
                    if (tailPivot) tailPivot.rotation.y = Math.sin(catData.walkTime * 0.5) * 0.5;
                    // Bob head
                    if (head) head.rotation.z = Math.sin(catData.walkTime) * 0.1;

                } else {
                    // Friction
                    catData.velocity.x *= 0.8;
                    catData.velocity.z *= 0.8;
                    catData.walkTime += dt * 3; // Slow wag
                    if (tailPivot) tailPivot.rotation.y = Math.sin(catData.walkTime * 0.5) * 0.2;
                    if (head) head.rotation.z = 0;
                }

                // Animate Legs (simple swing)
                const speedRatio = Math.min(1, Math.sqrt(catData.velocity.x ** 2 + catData.velocity.z ** 2) / 120);
                if (legs.length === 4) {
                    const swing = Math.sin(catData.walkTime) * 0.6 * speedRatio;
                    legs[0].rotation.z = swing; // Front L
                    legs[1].rotation.z = -swing; // Front R
                    legs[2].rotation.z = -swing; // Back L
                    legs[3].rotation.z = swing; // Back R
                }

                // Physics & Y Movement (Gravity)
                catData.velocityY -= 400 * dt; // Gravity
                const nextY = cat.position.y + catData.velocityY * dt;

                // Apply Movement & Collision
                const nextX = cat.position.x + catData.velocity.x * dt;
                const nextZ = cat.position.z + catData.velocity.z * dt;

                // Box Collision
                catCollider.setFromCenterAndSize(new THREE.Vector3(nextX, nextY + 7, nextZ), new THREE.Vector3(14, 15, 14));

                let collidedX = false, collidedZ = false, collidedY = false;
                let groundY = 0;

                for (let box of roomBoxes) {
                    // Check Y collision (landing on things)
                    if (nextY <= box.max.y && cat.position.y >= box.max.y - 1) {
                         const tempCol = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(cat.position.x, box.max.y - 1, cat.position.z), new THREE.Vector3(14, 15, 14));
                         if (tempCol.intersectsBox(box)) {
                             if (box.max.y > groundY) groundY = box.max.y;
                         }
                    }
                }
                
                if (nextY <= groundY) {
                    cat.position.y = groundY;
                    catData.velocityY = 0;
                    catData.isGrounded = true;
                } else {
                    cat.position.y = nextY;
                    catData.isGrounded = false;
                }

                // Try sliding (X then Z)
                catCollider.setFromCenterAndSize(new THREE.Vector3(nextX, cat.position.y + 7, cat.position.z), new THREE.Vector3(14, 14, 14));
                for (let box of roomBoxes) if (catCollider.intersectsBox(box)) collidedX = true;
                if (!collidedX) cat.position.x = nextX;

                catCollider.setFromCenterAndSize(new THREE.Vector3(cat.position.x, cat.position.y + 7, nextZ), new THREE.Vector3(14, 14, 14));
                for (let box of roomBoxes) if (catCollider.intersectsBox(box)) collidedZ = true;
                if (!collidedZ) cat.position.z = nextZ;

                // Prompts & Interactions Check
                checkInteractions();


                // Toy Collection (Quest 0)
                if (currentState === STATE.PLAYING) {
                    toys.forEach(t => {
                        if (t.active) {
                            // Hover animation
                            t.mesh.position.y = Math.sin(performance.now() * 0.003) * 2;
                            t.mesh.rotation.y += 2 * dt;
                            t.mesh.rotation.x += 1 * dt;

                            const dist = cat.position.distanceTo(t.group.position);
                            if (dist < 15) {
                                t.active = false;
                                scene.remove(t.group);
                                toysFound++;
                                toyCountSpan.innerText = toysFound;
                                progressMainQuest(1); // Progress Quest 0
                                spawnCollectionSparkle(t.group.position, t.color);
                                AudioSys.playNote(600 + toysFound * 100, 'sine', 0.5, 0.2);
                            }
                        }
                    });

                    // Win condition (reach door z > 240 near x=50) - Check for Quest 4 completion instead
                    if (Quests.main[4].completed && cat.position.z > 230 && cat.position.x > 30 && cat.position.x < 110) {
                        currentState = STATE.CAPTURED;
                        hud.style.opacity = 0;
                        questLog.style.opacity = 0;
                        crosshair.style.opacity = 0;
                        startCutscene(endScript);
                    }
                }

                // Fixed isometric/trailing camera (decoupled from cat rotation to prevent dizzying control loops)
                if (currentState === STATE.PLAYING) {
                    // Fixed offset: looking down from the South towards the North
                    const offset = new THREE.Vector3(0, 80, 100);

                    const targetCamPos = cat.position.clone().add(offset);

                    // Shake
                    if (screenShake > 0) {
                        targetCamPos.x += (Math.random() - 0.5) * 5;
                        targetCamPos.y += (Math.random() - 0.5) * 5;
                    }

                    camera.position.lerp(targetCamPos, 5 * dt);

                    // Look slightly ahead of the cat
                    const lookTarget = cat.position.clone();
                    lookTarget.y += 10;
                    camera.lookAt(lookTarget);
                } else if (currentState === STATE.CAPTURED) {
                    // Dramatically lock camera and shake
                    const offset = new THREE.Vector3(0, 20, -50); // Look at the cat's back as it is pulled south
                    const targetCamPos = cat.position.clone().add(offset);
                    if (screenShake > 0) {
                        targetCamPos.x += (Math.random() - 0.5) * 10;
                        targetCamPos.y += (Math.random() - 0.5) * 10;
                    }
                    camera.position.lerp(targetCamPos, 10 * dt);
                    camera.lookAt(cat.position);
                }
            }
        }

        // --- MAIN LOOP ---
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (currentState !== STATE.MENU) {
                update(dt);
                if (renderer && scene && camera) {
                    renderer.render(scene, camera);
                }
            }

            gameLoopId = requestAnimationFrame(loop);
        }

        // --- INITIALIZATION ---
        function startGame() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';

                initThreeJS();
                AudioSys.init();
                AudioSys.startBGM();

                startCutscene(script);
                lastTime = performance.now();
                requestAnimationFrame(loop);
            }, 1000);
        }

    </script>
