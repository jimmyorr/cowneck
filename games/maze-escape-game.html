if (firebaseConfig) {
  app = initializeApp(firebaseConfig);

// --- Helper Functions & Hooks ---

// Custom hook to sync traps to a global 4.5-second cycle (1.5s ON, 3.0s OFF)
function useTraps() {
  const [trapsActive, setTrapsActive] = useState(() => (Date.now() % 4500) < 1500);
  
  useEffect(() => {
    const interval = setInterval(() => {
      const active = (Date.now() % 4500) < 1500;
      setTrapsActive(prev => {
        if (prev !== active) return active;
        return prev;
      });
    }, 50);
    return () => clearInterval(interval);
  }, []);
  
  return trapsActive;
}

// Custom hook for the single sweeping Skull. Rotates the perimeter every 5 seconds.
function useSkullPosition(level) {
  const [pos, setPos] = useState({x: -1, y: -1});
  
  useEffect(() => {
    if (!level) return;
    const path = [];
    const w = level.gridW; const h = level.gridH;
    for(let x = 1; x < w-1; x++) path.push({x, y: 1}); // Top
    for(let y = 1; y < h-1; y++) path.push({x: w-2, y}); // Right
    for(let x = w-2; x > 1; x--) path.push({x, y: h-2}); // Bottom
    for(let y = h-2; y > 1; y--) path.push({x: 1, y}); // Left
    
    const interval = setInterval(() => {
      const progress = (Date.now() % 5000) / 5000;
      const index = Math.floor(progress * path.length);
      const newPos = path[index];
      // FIX: Only update state if the tile actually changed, preventing event listener thrashing!
      setPos(prev => (prev.x === newPos.x && prev.y === newPos.y) ? prev : newPos);
    }, 50);
    
    return () => clearInterval(interval);
  }, [level]);
  
  return pos;
}

// Global movement logic handling sliding, portals, and collisions
const calculateMove = (px, py, dx, dy, level, trapsActive, skullPos) => {
  let cx = px, cy = py;
  let dead = false;

  while (true) {
    let nx = cx + dx;
    let ny = cy + dy;

    // Bounds / Wall
    if (nx < 0 || ny < 0 || nx >= level.gridW || ny >= level.gridH || level.layout[ny][nx] === '1') {
      break; // Hit wall
    }

    // Hit the Skull
    if (nx === skullPos.x && ny === skullPos.y) {
      dead = true; break;
    }

    // Hit Fire Trap
    if (level.layout[ny][nx] === '2' && trapsActive) {
      dead = true; break;
    }

    // Commit Move
    cx = nx; cy = ny;
    let tile = level.layout[ny][nx];

    // Portal Teleportation
    if (tile === '4' && level.portals && level.portals.length === 2) {
      const p1 = level.portals[0];
      const p2 = level.portals[1];
      if (cx === p1.x && cy === p1.y) {
        cx = p2.x; cy = p2.y;
      } else if (cx === p2.x && cy === p2.y) {
        cx = p1.x; cy = p1.y;
      }
      // Check for death at the teleported position
      if (cx === skullPos.x && cy === skullPos.y) {
        dead = true;
      }
      if (level.layout[cy][cx] === '2' && trapsActive) {
        dead = true;
      }
      break; // Stop sliding after teleport
    }

    // Stop sliding on normal floor or trap
    if (tile === '0' || tile === '2') break; 
    
    // Continue loop if ice ('3')
  }

  return { x: cx, y: cy, dead };
};

const generateLevel = () => {
  const w = 21, h = 15;
  const grid = Array(h).fill().map(() => Array(w).fill('1'));
  const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];

  // 1. Carve Paths (0 = Path, 1 = Wall)
  const carve = (y, x) => {
    grid[y][x] = '0';
    const shuffled = [...dirs].sort(() => Math.random() - 0.5);
    for (let [dy, dx] of shuffled) {
      const ny = y + dy, nx = x + dx;
      if (ny > 0 && ny < h - 1 && nx > 0 && nx < w - 1 && grid[ny][nx] === '1') {
        grid[y + dy / 2][x + dx / 2] = '0';
        carve(ny, nx);
      }
    }
  };
  carve(1, 1);

  // 2. Add random loops to make multiple paths
  for (let i = 0; i < 20; i++) {
    const rx = Math.floor(Math.random() * ((w - 3) / 2)) * 2 + 1;
    const ry = Math.floor(Math.random() * ((h - 3) / 2)) * 2 + 1;
    grid[ry][rx] = '0';
  }

  const pStart = { x: 1, y: 1 };
  const doorPos = { x: w - 2, y: h - 2 };
  
  // Guarantee door access
  grid[doorPos.y][doorPos.x] = '0';
  grid[doorPos.y - 1][doorPos.x] = '0'; 
  grid[doorPos.y][doorPos.x - 1] = '0'; 
  
  // 3. Place Key
  let keyPos;
  while (true) {
    const rx = Math.floor(Math.random() * (w - 2)) + 1;
    const ry = Math.floor(Math.random() * (h - 2)) + 1;
    if (grid[ry][rx] === '0' && !(rx === pStart.x && ry === pStart.y) && !(rx === doorPos.x && ry === doorPos.y)) {
      keyPos = { x: rx, y: ry };
      break;
    }
  }

  // 4. Place Fire Traps (2 = Trap) - 6 traps
  let traps = 0;
  let attempts = 0;
  while (traps < 6 && attempts < 150) { 
    const rx = Math.floor(Math.random() * (w - 2)) + 1;
    const ry = Math.floor(Math.random() * (h - 2)) + 1;
    
    if (grid[ry][rx] === '0' && 
        !(rx === pStart.x && ry === pStart.y) && 
        !(rx === doorPos.x && ry === doorPos.y) && 
        !(rx === keyPos.x && ry === keyPos.y)) {
      
      const distStart = Math.abs(rx - pStart.x) + Math.abs(ry - pStart.y);
      if (distStart > 3) {
        grid[ry][rx] = '2';
        traps++;
      }
    }
    attempts++;
  }

  // 5. Place Ice Patches ('3')
  let icePatches = 0;
  attempts = 0;
  while (icePatches < 8 && attempts < 200) {
    const rx = Math.floor(Math.random() * (w - 2)) + 1;
    const ry = Math.floor(Math.random() * (h - 2)) + 1;
    if (grid[ry][rx] === '0' && 
        !(rx === pStart.x && ry === pStart.y) && 
        !(rx === doorPos.x && ry === doorPos.y) && 
        !(rx === keyPos.x && ry === keyPos.y)) {
        
      const dir = Math.random() < 0.5 ? [0, 1] : [1, 0];
      let len = Math.floor(Math.random() * 3) + 2; 
      let placed = false;
      for (let l = 0; l < len; l++) {
        let ix = rx + dir[0] * l;
        let iy = ry + dir[1] * l;
        if (ix > 0 && ix < w - 1 && iy > 0 && iy < h - 1 && grid[iy][ix] === '0' &&
            !(ix === pStart.x && iy === pStart.y) && 
            !(ix === doorPos.x && iy === doorPos.y) && 
            !(ix === keyPos.x && iy === keyPos.y)) {
          grid[iy][ix] = '3';
          placed = true;
        } else {
          break;
        }
      }
      if (placed) icePatches++;
    }
    attempts++;
  }

  // 6. Place Portals ('4')
  let portals = [];
  attempts = 0;
  while (portals.length < 2 && attempts < 100) {
    const rx = Math.floor(Math.random() * (w - 2)) + 1;
    const ry = Math.floor(Math.random() * (h - 2)) + 1;
    if (grid[ry][rx] === '0' && 
        !(rx === pStart.x && ry === pStart.y) && 
        !(rx === doorPos.x && ry === doorPos.y) && 
        !(rx === keyPos.x && ry === keyPos.y)) {
      grid[ry][rx] = '4';
      portals.push({x: rx, y: ry});
    }
    attempts++;
  }

  return { layout: grid.map(row => row.join('')), keyPos, doorPos, pStart, gridW: w, gridH: h, portals };
};

const generateRoomCode = () => {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let result = '';
  for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
};

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('menu'); 
  const [roomId, setRoomId] = useState('');
  
  // Firebase Auth Init
  useEffect(() => {
    if (!auth) return;
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth Error:", error);
      }
    };
    initAuth();

    const unsubscribe = onAuthStateChanged(auth, (u) => {
      setUser(u);
    });
    return () => unsubscribe();
  }, []);

  const handleReturnToMenu = () => {
    setView('menu');
    setRoomId('');
  };

  return (
    <div className="w-screen h-screen overflow-hidden bg-neutral-950 text-neutral-100 font-sans flex flex-col items-center justify-center relative">
      {view === 'menu' && <MainMenu onSelectMode={setView} user={user} hasFirebase={!!db} />}
      {view === 'singleplayer' && <SinglePlayerGame onExit={handleReturnToMenu} />}
      {view === 'lobby' && (
        <MultiplayerLobby 
          db={db} user={user} appId={appId}
          onJoinRoom={(id) => { setRoomId(id); setView('multiplayer'); }}
          onBack={handleReturnToMenu}
        />
      )}
      {view === 'multiplayer' && (
        <MultiplayerGame db={db} user={user} roomId={roomId} appId={appId} onExit={handleReturnToMenu} />
      )}
    </div>
  );
}

        >

          Play Singleplayer
        </button>
        <button 
          onClick={() => onSelectMode('lobby')}

            (!hasFirebase || !user) 
              ? 'bg-neutral-800 text-neutral-600 cursor-not-allowed'

          }`}
        >

}

function MultiplayerLobby({ db, user, appId, onJoinRoom, onBack }) {
  const [joinCode, setJoinCode] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const createRoom = async () => {
    if (!user) {
      setError("Connecting to server... please wait.");
      return;
    }
    setLoading(true);
    setError('');
    const code = generateRoomCode();
    const level = generateLevel();
    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
    
    try {
      await setDoc(roomRef, {
        id: code,
        status: 'waiting', 
        level: level,
        players: {
          [user.uid]: {
            x: level.pStart.x, y: level.pStart.y,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            name: `Player ${code.substring(0,2)}`
          }
        },
        keyOwner: null, winner: null
      });
      onJoinRoom(code);
    } catch (err) {
      console.error("Create Room Error:", err);
      setError(`Failed to create room: ${err.message}`);
      setLoading(false);
    }
  };

  const joinRoom = async (e) => {
    e.preventDefault();
    const code = joinCode.trim().toUpperCase();
    if (!code || code.length !== 4) return;
    if (!user) {
      setError("Connecting to server... please wait.");
      return;
    }

    setLoading(true); 
    setError('');
    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
    
    try {
      const snap = await getDoc(roomRef);
      if (snap.exists()) {
        const data = snap.data();
        if (data.status === 'finished') {
          setError("Game already finished."); 
          setLoading(false); 
          return;
        }
        if (data.status === 'playing') {
          setError("Game is already in progress."); 
          setLoading(false); 
          return;
        }
        
        await updateDoc(roomRef, {
          [`players.${user.uid}`]: {
            x: data.level.pStart.x, y: data.level.pStart.y,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            name: `Player ${code.substring(0,2)}`
          }
        });
        onJoinRoom(code);
      } else {
        setError("Room not found. Check the code."); 
        setLoading(false);
      }
    } catch (err) {
      console.error("Join Room Error:", err);
      setError(`Failed to join room: ${err.message}`); 
      setLoading(false);
    }
  };

  return (
    <div className="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-2xl z-10">
      <button onClick={onBack} className="text-neutral-400 hover:text-white mb-6 flex items-center gap-2">
        <ArrowLeft className="w-4 h-4" /> Back to Menu
      </button>
      <h2 className="text-2xl font-bold mb-6">Multiplayer Lobby</h2>
      <div className="space-y-6">
        <button onClick={createRoom} disabled={loading} className="w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition-all">
          <Plus className="w-5 h-5" /> {loading ? 'Creating...' : 'Create New Room'}
        </button>
        <div className="relative flex py-2 items-center">
          <div className="flex-grow border-t border-neutral-800"></div>
          <span className="flex-shrink-0 mx-4 text-neutral-500 text-sm">OR JOIN EXISTING</span>
          <div className="flex-grow border-t border-neutral-800"></div>
        </div>
        <form onSubmit={joinRoom} className="space-y-3">
          <input 
            type="text" 
            placeholder="Enter 4-Letter Code" 
            value={joinCode} 
            onChange={(e) => setJoinCode(e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase())} 
            maxLength={4} 
            className="w-full bg-neutral-950 border border-neutral-700 text-white text-center text-xl tracking-widest font-mono rounded-xl py-3 focus:outline-none focus:border-indigo-500 uppercase transition-colors" 
          />
          {error && <p className="text-red-400 text-sm text-center">{error}</p>}
          <button type="submit" disabled={loading || joinCode.length !== 4} className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-neutral-800 disabled:text-neutral-500 text-white font-bold py-3 px-4 rounded-xl transition-all">
            <LogIn className="w-5 h-5" /> Join Room
          </button>
        </form>
      </div>
    </div>
  );
}

// ==========================================
// GAME MANAGERS
// ==========================================

function SinglePlayerGame({ onExit }) {
  const [levelData, setLevelData] = useState(() => generateLevel());
  const [player, setPlayer] = useState({ x: levelData.pStart.x, y: levelData.pStart.y, id: 'local', color: '#3b82f6' });
  const [hasKey, setHasKey] = useState(false);
  const [won, setWon] = useState(false);
  
  const trapsActive = useTraps();
  const skullPos = useSkullPosition(levelData);

  // Passive death (Skull moves onto player, or Trap turns on)
  useEffect(() => {
    if (won) return;
    let dead = false;
    const tile = levelData.layout[player.y][player.x];
    if (trapsActive && tile === '2') dead = true;
    if (player.x === skullPos.x && player.y === skullPos.y) dead = true;

    if (dead) {
      setHasKey(false);
      setPlayer(prev => ({ ...prev, x: levelData.pStart.x, y: levelData.pStart.y }));
    }
  }, [trapsActive, skullPos, player.x, player.y, levelData, won]);

  const handleMove = useCallback((dx, dy) => {
    if (won) return;
    setPlayer(prev => {
      const { x: newX, y: newY, dead } = calculateMove(prev.x, prev.y, dx, dy, levelData, trapsActive, skullPos);
      
      if (dead) {
        setHasKey(false);
        return { ...prev, x: levelData.pStart.x, y: levelData.pStart.y };
      }

      if (newX === prev.x && newY === prev.y) return prev;

      if (newX === levelData.keyPos.x && newY === levelData.keyPos.y && !hasKey) setHasKey(true);
      if (newX === levelData.doorPos.x && newY === levelData.doorPos.y && hasKey) setWon(true);

      return { ...prev, x: newX, y: newY };
    });
  }, [hasKey, won, levelData, trapsActive, skullPos]);

  const reset = () => {
    const newLevel = generateLevel();
    setLevelData(newLevel);
    setPlayer({ x: newLevel.pStart.x, y: newLevel.pStart.y, id: 'local', color: '#3b82f6' });
    setHasKey(false);
    setWon(false);
  };

  return (
    <div className="absolute inset-0 w-full h-full flex flex-col bg-[#0a0a0a]">
      <div className="absolute top-0 left-0 w-full flex justify-between items-center p-4 z-20 pointer-events-none">
        <div className="pointer-events-auto">
          <button onClick={onExit} className="p-3 bg-neutral-800/80 hover:bg-neutral-700 backdrop-blur rounded-xl text-neutral-300 transition-colors shadow-lg">
            <Home className="w-6 h-6" />
          </button>
        </div>
      </div>
      <div className="absolute inset-0 w-full h-full flex items-center justify-center">
        <GameBoard 
          players={[player]} keyOwner={hasKey ? 'local' : null} winner={won ? 'local' : null}
          onMove={handleMove} level={levelData} trapsActive={trapsActive} skullPos={skullPos}
        />
      </div>
      {won && (
        <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50 backdrop-blur-sm">
          <Trophy className="w-32 h-32 text-yellow-400 mb-8 animate-bounce drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]" />
          <h2 className="text-5xl font-black text-white mb-8 drop-shadow-lg text-center">You Escaped!</h2>
          <div className="flex gap-4">
            <button onClick={reset} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-6 sm:px-10 rounded-2xl transition-all text-lg sm:text-xl shadow-xl shadow-indigo-900/50">Play Again</button>
            <button onClick={onExit} className="bg-neutral-700 hover:bg-neutral-600 text-white font-bold py-4 px-6 sm:px-10 rounded-2xl transition-all text-lg sm:text-xl shadow-xl">Main Menu</button>
          </div>
        </div>
      )}
    </div>
  );
}

function MultiplayerGame({ db, user, roomId, appId, onExit }) {
  const [roomData, setRoomData] = useState(null);
  const [error, setError] = useState(null);
  const trapsActive = useTraps();
  const skullPos = useSkullPosition(roomData?.level);
  
  // Ref to prevent spamming the server when dying on a trap
  const pendingDeathRef = useRef(false);

  // Sync Room State
  useEffect(() => {
    if (!user || !roomId) return;
    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
    const unsubscribe = onSnapshot(roomRef, (snapshot) => {
      if (snapshot.exists()) {
        setRoomData(snapshot.data());
        setError(null);
      } else {
        // Prevent immediate disconnects caused by local caching delays. Only error if it stays missing.
        setTimeout(() => {
          getDoc(roomRef).then(docSnap => {
            if (!docSnap.exists()) setError("Room was closed.");
          }).catch(() => setError("Room was closed."));
        }, 1000);
      }
    }, (err) => {
      console.error("Snapshot Error:", err);
      setError("Lost connection to room.");
    });
    return () => unsubscribe();
  }, [db, user, roomId, appId]);

  const playersList = Object.entries(roomData?.players || {}).filter(([_, p]) => p !== null).map(([uid, p]) => ({ id: uid, ...p }));
  const isHost = playersList.length > 0 && playersList[0].id === user?.uid;

  // Passive death checks (Optimized to prevent server spam)
  useEffect(() => {
    if (!roomData || roomData.status !== 'playing') return;
    const myPlayer = roomData.players[user.uid];
    if (!myPlayer) return;

    let dead = false;
    const tile = roomData.level.layout[myPlayer.y][myPlayer.x];
    if (trapsActive && tile === '2') dead = true;
    if (myPlayer.x === skullPos.x && myPlayer.y === skullPos.y) dead = true;

    if (dead && !pendingDeathRef.current) {
      pendingDeathRef.current = true;
      
      // OPTIMISTIC UPDATE: instantly respawn on screen
      setRoomData(prev => ({
        ...prev,
        keyOwner: prev.keyOwner === user.uid ? null : prev.keyOwner,
        players: {
          ...prev.players,
          [user.uid]: { ...prev.players[user.uid], x: roomData.level.pStart.x, y: roomData.level.pStart.y }
        }
      }));

      const updates = {
        [`players.${user.uid}.x`]: roomData.level.pStart.x,
        [`players.${user.uid}.y`]: roomData.level.pStart.y
      };
      if (roomData.keyOwner === user.uid) updates.keyOwner = null;
      
      updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), updates)
        .catch(console.error)
        .finally(() => {
          // Add small delay before checking death again to prevent rapid-fire loops
          setTimeout(() => { pendingDeathRef.current = false; }, 300);
        });
    }
  }, [trapsActive, skullPos, roomData?.players?.[user?.uid]?.x, roomData?.players?.[user?.uid]?.y]);

  const startGame = async () => {
    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { status: 'playing' });
  };

  const handleMove = useCallback(async (dx, dy) => {
    if (!roomData || roomData.status !== 'playing' || roomData.winner) return;
    const myPlayer = roomData.players[user.uid];
    if (!myPlayer) return;

    const { level } = roomData;
    const { x: newX, y: newY, dead } = calculateMove(myPlayer.x, myPlayer.y, dx, dy, level, trapsActive, skullPos);
    
    if (newX === myPlayer.x && newY === myPlayer.y && !dead) return;

    // OPTIMISTIC UPDATE: Instantly move the player on their own screen so it feels fast!
    setRoomData(prev => {
      const next = { ...prev };
      next.players = { ...next.players, [user.uid]: { ...next.players[user.uid], x: dead ? level.pStart.x : newX, y: dead ? level.pStart.y : newY } };
      if (dead && next.keyOwner === user.uid) next.keyOwner = null;
      if (!dead && newX === level.keyPos.x && newY === level.keyPos.y && !next.keyOwner) next.keyOwner = user.uid;
      return next;
    });

    const updates = {};
    if (dead) {
      updates[`players.${user.uid}.x`] = level.pStart.x;
      updates[`players.${user.uid}.y`] = level.pStart.y;
      if (roomData.keyOwner === user.uid) updates.keyOwner = null;
    } else {
      updates[`players.${user.uid}.x`] = newX;
      updates[`players.${user.uid}.y`] = newY;
      if (newX === level.keyPos.x && newY === level.keyPos.y && !roomData.keyOwner) updates.keyOwner = user.uid;
      if (newX === level.doorPos.x && newY === level.doorPos.y && roomData.keyOwner === user.uid) {
        updates.status = 'finished'; updates.winner = user.uid;
      }
    }

    try {
      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), updates);
    } catch (err) { console.error("Failed to move:", err); }
  }, [roomData, user, db, appId, roomId, trapsActive, skullPos]);

  const handleLeave = async () => {
    try {
      // Clean up the player properly using deleteField
      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { [`players.${user.uid}`]: deleteField() });
      onExit();
    } catch(e) { onExit(); }
  };

  if (error) {
    return (
      <div className="text-center z-10">
        <p className="text-red-400 mb-6 text-xl">{error}</p>
        <button onClick={onExit} className="bg-neutral-800 text-white py-2 px-6 rounded-xl hover:bg-neutral-700">Return to Menu</button>
      </div>
    );
  }

  if (!roomData) return <div className="animate-pulse text-indigo-400 text-xl font-bold z-10">Loading Room...</div>;

  if (roomData.status === 'waiting') {
    return (
      <div className="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-2xl flex flex-col items-center z-10">
        <h2 className="text-2xl font-bold mb-2">Waiting Room</h2>
        <div className="bg-neutral-950 px-6 py-3 rounded-xl border border-neutral-800 mb-6 text-center">
          <p className="text-neutral-500 text-xs mb-1 font-bold">ROOM CODE</p>
          <p className="text-4xl font-mono tracking-widest text-indigo-400">{roomData.id}</p>
        </div>
        <div className="w-full space-y-3 mb-8">
          <p className="text-sm text-neutral-400 uppercase font-bold px-2">Players ({playersList.length})</p>
          {playersList.map((p) => (
            <div key={p.id} className="flex items-center gap-3 bg-neutral-800 p-3 rounded-xl">
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white" style={{ backgroundColor: p.color }}><User className="w-4 h-4" /></div>
              <span className="font-medium">{p.name} {p.id === user.uid && <span className="text-neutral-500 text-sm">(You)</span>}</span>
            </div>
          ))}
        </div>
        <div className="w-full flex gap-3">
          <button onClick={handleLeave} className="flex-1 bg-neutral-800 hover:bg-neutral-700 py-3 rounded-xl font-bold transition-colors">Leave</button>
          <button onClick={startGame} disabled={!isHost} className={`flex-[2] py-3 rounded-xl font-bold transition-all shadow-lg ${isHost ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-emerald-900/50' : 'bg-neutral-800 text-neutral-500 cursor-not-allowed'}`}>
            {isHost ? 'Start Game' : 'Waiting for Host...'}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="absolute inset-0 w-full h-full flex flex-col bg-[#0a0a0a]">
      <div className="absolute top-0 left-0 w-full flex justify-between items-center p-4 z-20 pointer-events-none">
        <div className="pointer-events-auto flex gap-4 items-center">
          <button onClick={handleLeave} className="p-3 bg-red-500/80 hover:bg-red-500 text-white backdrop-blur rounded-xl transition-colors shadow-lg"><LogOut className="w-6 h-6" /></button>
          <div className="hidden sm:block bg-neutral-900/80 backdrop-blur px-4 py-2 rounded-xl shadow-lg border border-neutral-800">
            <p className="text-[10px] text-neutral-400 font-bold uppercase">Room Code</p>
            <p className="font-mono text-xl text-white tracking-widest">{roomData.id}</p>
          </div>
        </div>
        <div className="pointer-events-auto flex items-center gap-2 bg-neutral-900/80 backdrop-blur p-2 rounded-2xl shadow-lg border border-neutral-800">
          {playersList.map(p => (
            <div key={p.id} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${roomData.keyOwner === p.id ? 'ring-4 ring-yellow-400 ring-offset-2 ring-offset-neutral-900 scale-110' : ''}`} style={{ borderColor: p.color, backgroundColor: p.color + '40' }}>
              {roomData.keyOwner === p.id ? <Key className="w-5 h-5 text-white" /> : <User className="w-5 h-5 text-white" />}
            </div>
          ))}
        </div>
      </div>

      <div className="absolute inset-0 w-full h-full flex items-center justify-center">
        <GameBoard 
          players={playersList} keyOwner={roomData.keyOwner} winner={roomData.winner}
          onMove={handleMove} level={roomData.level} trapsActive={trapsActive} skullPos={skullPos}
        />
      </div>

      {roomData.status === 'finished' && (
        <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-50 backdrop-blur-sm">
          <Trophy className="w-32 h-32 text-yellow-400 mb-6 animate-bounce drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]" />
          <h2 className="text-5xl font-black text-white mb-4 drop-shadow-lg text-center">
            {roomData.winner === user.uid ? "You Escaped!" : "Someone Else Escaped!"}
          </h2>
          <p className="text-neutral-400 text-2xl mb-10 font-medium">Game Over</p>
          <button onClick={handleLeave} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-10 rounded-2xl transition-all text-xl shadow-xl">Back to Menu</button>
        </div>
      )}
    </div>
  );
}

// ==========================================
// CORE GAME ENGINE COMPONENTS
// ==========================================

function GameBoard({ players, keyOwner, winner, onMove, level, trapsActive, skullPos }) {
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (winner) return;
      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': onMove(0, -1); break;
        case 'ArrowDown': case 's': case 'S': onMove(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': onMove(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': onMove(1, 0); break;
        default: return;
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [onMove, winner]);

  const walls = useMemo(() => {
    if (!level) return [];
    const blocks = [];
    for (let y = 0; y < level.gridH; y++) for (let x = 0; x < level.gridW; x++) if (level.layout[y][x] === '1') blocks.push({ x, y });
    return blocks;
  }, [level]);

  const hazards = useMemo(() => {
    if (!level) return [];
    const blocks = [];
    for (let y = 0; y < level.gridH; y++) for (let x = 0; x < level.gridW; x++) if (level.layout[y][x] === '2') blocks.push({ x, y });
    return blocks;
  }, [level]);

  const ices = useMemo(() => {
    if (!level) return [];
    const blocks = [];
    for (let y = 0; y < level.gridH; y++) for (let x = 0; x < level.gridW; x++) if (level.layout[y][x] === '3') blocks.push({ x, y });
    return blocks;
  }, [level]);

  if (!level) return null;

  return (
    <div className="absolute inset-0 w-full h-full flex items-center justify-center bg-[#0a0a0a]">
      <div 
        className="relative bg-[#0a0a0a] overflow-hidden flex-shrink-0"
        style={{ aspectRatio: `${level.gridW}/${level.gridH}`, width: `min(100vw, 100vh * (${level.gridW} / ${level.gridH}))`, height: `min(100vh, 100vw * (${level.gridH} / ${level.gridW}))` }}
      >
        {/* Ice Patches */}
        {ices.map((pos, i) => (
          <div key={`ice-${i}`} className="absolute bg-cyan-400/20 border border-cyan-300/30 shadow-[inset_0_0_20px_rgba(34,211,238,0.2)]" style={{ left: `${(pos.x / level.gridW) * 100}%`, top: `${(pos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }} />
        ))}

        {/* Walls */}
        {walls.map((pos, i) => (
          <div key={`wall-${i}`} className="absolute bg-neutral-800 shadow-[inset_0_0_12px_rgba(0,0,0,0.8)] border border-neutral-900/50" style={{ left: `${(pos.x / level.gridW) * 100}%`, top: `${(pos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }} />
        ))}

        {/* Fire Traps */}
        {hazards.map((pos, i) => (
          <div key={`hazard-${i}`} className="absolute flex items-center justify-center transition-all duration-300" style={{ left: `${(pos.x / level.gridW) * 100}%`, top: `${(pos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }}>
            {trapsActive ? (
              <div className="bg-orange-500/20 w-full h-full flex items-center justify-center shadow-[inset_0_0_15px_rgba(249,115,22,0.4)] transition-opacity duration-300"><Flame className="w-[60%] h-[60%] text-orange-500 animate-pulse drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]" /></div>
            ) : (
              <div className="bg-orange-900/10 w-full h-full flex items-center justify-center transition-opacity duration-300"><Flame className="w-[40%] h-[40%] text-orange-900/30" /></div>
            )}
          </div>
        ))}

        {/* Portals */}
        {level.portals && level.portals.map((pos, i) => (
          <div key={`portal-${i}`} className="absolute flex items-center justify-center" style={{ left: `${(pos.x / level.gridW) * 100}%`, top: `${(pos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }}>
            <div className="w-[80%] h-[80%] rounded-full border-4 border-fuchsia-500 border-dashed animate-[spin_4s_linear_infinite] flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.8)]">
               <div className="w-[50%] h-[50%] rounded-full bg-fuchsia-400/80 animate-pulse" />
            </div>
          </div>
        ))}

        {/* Key */}
        {!keyOwner && (
          <div className="absolute flex items-center justify-center animate-pulse" style={{ left: `${(level.keyPos.x / level.gridW) * 100}%`, top: `${(level.keyPos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }}>
            <div className="bg-yellow-500/20 w-[80%] h-[80%] rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(234,179,8,0.5)]"><Key className="w-full h-full text-yellow-400 p-[10%]" /></div>
          </div>
        )}

        {/* Door */}
        <div className="absolute flex items-center justify-center" style={{ left: `${(level.doorPos.x / level.gridW) * 100}%`, top: `${(level.doorPos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%` }}>
          {keyOwner ? (
             <div className="bg-emerald-500/20 w-full h-full flex items-center justify-center shadow-[inset_0_0_20px_rgba(16,185,129,0.3)]"><DoorOpen className="w-[80%] h-[80%] text-emerald-400" /></div>
          ) : (
             <div className="bg-red-500/10 w-full h-full flex items-center justify-center shadow-[inset_0_0_10px_rgba(239,68,68,0.1)]"><DoorClosed className="w-[80%] h-[80%] text-neutral-700" /></div>
          )}
        </div>

        {/* Sweeping Skull */}
        {skullPos.x >= 0 && (
          <div className="absolute flex items-center justify-center transition-all duration-[50ms] ease-linear" style={{ left: `${(skullPos.x / level.gridW) * 100}%`, top: `${(skullPos.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%`, zIndex: 20 }}>
             <div className="bg-red-900/50 w-[95%] h-[95%] rounded-full flex items-center justify-center shadow-[0_0_25px_rgba(220,38,38,1)] border-2 border-red-500">
               <Skull className="w-[65%] h-[65%] text-white" />
             </div>
          </div>
        )}

        {/* Players */}
        {players.map((p) => (
          <div key={p.id} className="absolute transition-all duration-150 ease-out flex items-center justify-center" style={{ left: `${(p.x / level.gridW) * 100}%`, top: `${(p.y / level.gridH) * 100}%`, width: `${(1 / level.gridW) * 100}%`, height: `${(1 / level.gridH) * 100}%`, zIndex: 10 }}>
            <div className="w-[75%] h-[75%] rounded-lg shadow-lg flex items-center justify-center relative border border-white/20" style={{ backgroundColor: p.color }}>
              <User className="w-[60%] h-[60%] text-white/90" />
              {keyOwner === p.id && (
                <div className="absolute -top-3 -right-3 bg-yellow-400 rounded-full p-1 shadow-lg border-2 border-yellow-600 animate-bounce"><Key className="w-4 h-4 text-yellow-900" /></div>
              )}
            </div>
          </div>
        ))}
      </div>

      <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-30 sm:hidden pointer-events-auto">
        <div className="grid grid-cols-3 gap-3 w-60 opacity-90 drop-shadow-2xl">
          <div /><ControlButton onClick={() => onMove(0, -1)} icon={<ArrowUp />} /><div />
          <ControlButton onClick={() => onMove(-1, 0)} icon={<ArrowLeft />} />
          <ControlButton onClick={() => onMove(0, 1)} icon={<ArrowDown />} />
          <ControlButton onClick={() => onMove(1, 0)} icon={<ArrowRight />} />
        </div>
      </div>
    </div>
  );
}

function ControlButton({ onClick, icon }) {
  const handleTouch = (e) => { e.preventDefault(); onClick(); };
  return (
    <button onMouseDown={onClick} onTouchStart={handleTouch} className="bg-neutral-800 hover:bg-neutral-700 active:bg-neutral-600 text-white rounded-2xl h-16 flex items-center justify-center shadow-lg transition-colors border-b-4 border-neutral-900 active:border-b-0 active:translate-y-1">
      {React.cloneElement(icon, { className: "w-8 h-8" })}
    </button>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
