<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Violet Velocity 3D Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        .retro-text {
            text-shadow: 2px 2px 0px #d946ef;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none; /* Disabled until intro finishes */
            transition: opacity 0.5s ease-in-out; /* Faster fade for seamless feel */
            z-index: 20;
        }
        #intro-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        #cursor-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            pointer-events: none;
            text-shadow: 0 0 10px #d946ef;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 15;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

    <!-- 3D Intro Container -->
    <div id="intro-container"></div>
    <div id="cursor-prompt">CLICK TO PLAY</div>

    <!-- 2D Game Container (Initially Hidden) -->
    <div id="game-container">
        <!-- Game UI Overlay -->
        <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-30">
            <div class="flex justify-between items-start">
                <div class="bg-black/40 backdrop-blur-md p-2 rounded border border-purple-500/30">
                    <p class="text-xs text-purple-300 uppercase tracking-widest">Score</p>
                    <p id="score-display" class="text-2xl font-bold font-mono text-fuchsia-400">0</p>
                </div>
                <div class="bg-black/40 backdrop-blur-md p-2 rounded border border-purple-500/30">
                    <p class="text-xs text-purple-300 uppercase tracking-widest">High Score</p>
                    <p id="highscore-display" class="text-2xl font-bold font-mono text-purple-200">0</p>
                </div>
            </div>
            
            <div class="text-center opacity-50 text-sm text-purple-300 pb-2">
                <span class="hidden md:inline">MOVE MOUSE TO STEER</span>
                <span class="md:hidden">DRAG TO STEER</span>
            </div>
        </div>

        <!-- Start / Game Over Screen (Initially Hidden for seamless start) -->
        <div id="menu-screen" class="absolute inset-0 flex items-center justify-center bg-black/80 z-40 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none">
            <div class="text-center max-w-md w-full p-6 animate-pulse-slow">
                <h1 class="text-5xl md:text-7xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-b from-fuchsia-300 to-purple-600 retro-text tracking-tighter">
                    VIOLET<br>VELOCITY
                </h1>
                <p class="text-purple-300 mb-8 font-mono text-sm tracking-widest">AVOID OBSTACLES • COLLECT YELLOW ORBS</p>
                
                <button id="start-btn" class="pointer-events-auto group relative px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-none border-2 border-fuchsia-400 shadow-[0_0_20px_rgba(192,38,211,0.5)] transition-all transform hover:scale-105 active:scale-95">
                    <span class="relative z-10">RETRY</span>
                    <div class="absolute inset-0 h-full w-full bg-fuchsia-600 opacity-0 group-hover:opacity-20 transition-opacity"></div>
                </button>
                
                <p id="final-score" class="mt-6 text-xl text-white font-mono hidden">SCORE: 0</p>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 3D Intro Script -->
    <script>
        // --- 3D ARCADE INTRO LOGIC ---
        const introContainer = document.getElementById('intro-container');
        const cursorPrompt = document.getElementById('cursor-prompt');
        let scene, camera, renderer, arcadeLoopId;
        let cabinets = [];
        let mouseX = 0, mouseY = 0;
        let isTransitioning = false;
        let introActive = true;
        
        // Target Coordinates for the screen
        const screenWorldY = 3.2;
        const screenWorldZ = -1.49; // Cabinet is at -2, screen is +0.51 relative

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;
            camera.position.y = 1.6; // Eye level

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            introContainer.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x222222);
            scene.add(ambientLight);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                roughness: 0.1, 
                metalness: 0.5 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Grid on floor
            const gridHelper = new THREE.GridHelper(50, 50, 0x555555, 0x222222);
            scene.add(gridHelper);

            // Create Cabinets
            createCabinet(0, 0, 0xd946ef, true); // Violet Velocity (Center)
            createCabinet(-3.5, 0.5, 0x3b82f6, false); // Blue (Left)
            createCabinet(3.5, 0.5, 0xef4444, false); // Red (Right)
            createCabinet(-7, 1.0, 0x22c55e, false); // Green (Far Left)
            createCabinet(7, 1.0, 0xeab308, false); // Yellow (Far Right)

            // Input Listeners
            document.addEventListener('mousemove', onDocumentMouseMove);
            document.addEventListener('click', onDocumentClick);
            window.addEventListener('resize', onWindowResize3D);

            animate3D();
        }

        function createCabinet(x, zOffset, glowColor, isMain) {
            const group = new THREE.Group();
            group.position.set(x, 0, -2 - zOffset);

            // Base
            const baseGeo = new THREE.BoxGeometry(2, 2, 2);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.2 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 1;
            group.add(base);

            // Top
            const topGeo = new THREE.BoxGeometry(2, 2.5, 1.5);
            const top = new THREE.Mesh(topGeo, baseMat);
            top.position.y = 3.25;
            top.position.z = -0.25;
            group.add(top);

            // Screen Area (Emissive)
            const screenGeo = new THREE.PlaneGeometry(1.6, 1.2);
            const screenMat = new THREE.MeshBasicMaterial({ color: glowColor });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 3.2, 0.51); // Slightly in front
            screen.rotation.x = -0.1;
            group.add(screen);

            // Marquee
            const marqueeGeo = new THREE.BoxGeometry(1.8, 0.4, 0.2);
            const marqueeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: glowColor, emissiveIntensity: 0.5 });
            const marquee = new THREE.Mesh(marqueeGeo, marqueeMat);
            marquee.position.set(0, 4.2, 0.5);
            group.add(marquee);

            // Glow Light
            const light = new THREE.PointLight(glowColor, 1.5, 10);
            light.position.set(0, 3, 2);
            group.add(light);

            scene.add(group);
            cabinets.push({ mesh: group, screen: screen, light: light, isMain: isMain, baseColor: glowColor });
        }

        function onDocumentMouseMove(event) {
            if (!introActive) return;
            mouseX = (event.clientX - window.innerWidth / 2) / 1000;
            mouseY = (event.clientY - window.innerHeight / 2) / 1000;

            if (!isTransitioning) {
                const distFromCenter = Math.sqrt(Math.pow(event.clientX - window.innerWidth/2, 2) + Math.pow(event.clientY - window.innerHeight/2, 2));
                if (distFromCenter < 200) {
                    cursorPrompt.style.opacity = 1;
                    document.body.style.cursor = 'pointer';
                } else {
                    cursorPrompt.style.opacity = 0;
                    document.body.style.cursor = 'default';
                }
            }
        }

        function onDocumentClick(event) {
            if (!introActive || isTransitioning) return;
            
            const distFromCenter = Math.sqrt(Math.pow(event.clientX - window.innerWidth/2, 2) + Math.pow(event.clientY - window.innerHeight/2, 2));
            if (distFromCenter < 300) {
                enterGame();
            }
        }

        function enterGame() {
            isTransitioning = true;
            cursorPrompt.style.opacity = 0;
            document.body.style.cursor = 'default';
        }

        function onWindowResize3D() {
            if (!introActive) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            if (!introActive) return;
            arcadeLoopId = requestAnimationFrame(animate3D);

            const time = Date.now() * 0.001;

            if (!isTransitioning) {
                // Idle Camera Sway
                camera.position.x += (mouseX - camera.position.x) * 0.05;
                camera.position.y += (1.6 - mouseY - camera.position.y) * 0.05;
                camera.lookAt(0, 2.5, 0); 
            } else {
                // ZOOM IN TRANSITION
                // We want to zoom almost exactly into the screen
                const targetZ = screenWorldZ + 0.6; // Get very close

                camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, 0.08);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, screenWorldY, 0.08);
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetZ, 0.06);
                
                // Force camera to look exactly at screen center
                camera.lookAt(0, screenWorldY, screenWorldZ);
                
                // Transition threshold (when very close)
                if (camera.position.z < screenWorldZ + 1.2) {
                    switchTo2DGame();
                }
            }

            // Cabinet Pulse Effects
            cabinets.forEach(cab => {
                const pulse = Math.sin(time * 2 + cab.mesh.position.x) * 0.2 + 0.8;
                cab.light.intensity = pulse * (cab.isMain ? 2 : 1);
                
                if (cab.isMain) {
                     const hue = (time * 0.1) % 1;
                     cab.screen.material.color.setHSL(0.8 + Math.sin(time)*0.1, 1, 0.5);
                     cab.light.color.setHSL(0.8 + Math.sin(time)*0.1, 1, 0.5);
                }
            });

            renderer.render(scene, camera);
        }

        function switchTo2DGame() {
            if(!introActive) return; // Prevent double firing
            introActive = false;
            cancelAnimationFrame(arcadeLoopId);
            
            // Fade out intro, Fade in game
            const gameContainer = document.getElementById('game-container');
            gameContainer.style.opacity = 1;
            gameContainer.style.pointerEvents = 'auto';
            
            // Auto Start the game logic
            resize2D();
            startGame(); 

            // Clean up ThreeJS
            setTimeout(() => {
                if(introContainer) introContainer.remove();
            }, 800);
        }

        // Initialize 3D on load
        init3D();

    </script>

    <!-- 2D Game Logic -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('highscore-display');
        const menuScreen = document.getElementById('menu-screen');
        const startBtn = document.getElementById('start-btn');
        const finalScoreDisplay = document.getElementById('final-score');

        // Game State
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('violetHighScore') || 0;
        let frameCount = 0;
        let difficultyMultiplier = 1;

        // Entities
        let player = { x: 0, y: 0, size: 20, speed: 0.15, targetX: 0, targetY: 0, tail: [] };
        let obstacles = [];
        let particles = [];
        let collectibles = [];
        let gridOffset = 0;

        highScoreDisplay.innerText = highScore;

        function resize2D() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!gameRunning) {
                player.x = canvas.width / 2;
                player.y = canvas.height - 100;
                player.targetX = player.x;
                player.targetY = player.y;
            }
        }
        window.addEventListener('resize', resize2D);

        function handleInput(x, y) {
            if (!gameRunning) return;
            player.targetX = x;
            player.targetX = Math.max(player.size, Math.min(canvas.width - player.size, player.targetX));
        }

        window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
        
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
             if(gameRunning) {
                 player.targetX = e.touches[0].clientX;
             }
        }, { passive: false });


        function startGame() {
            score = 0;
            difficultyMultiplier = 1;
            frameCount = 0;
            obstacles = [];
            particles = [];
            collectibles = [];
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.targetX = player.x;
            player.tail = [];
            
            scoreDisplay.innerText = "0";
            
            // Ensure menu is hidden on start
            menuScreen.classList.remove('opacity-100', 'pointer-events-auto');
            menuScreen.classList.add('opacity-0', 'pointer-events-none');
            finalScoreDisplay.classList.add('hidden');
            
            gameRunning = true;
            animate2D();
        }

        function gameOver() {
            gameRunning = false;
            // Show menu only on game over
            menuScreen.classList.remove('opacity-0', 'pointer-events-none');
            menuScreen.classList.add('opacity-100', 'pointer-events-auto');
            
            finalScoreDisplay.innerText = `FINAL SCORE: ${Math.floor(score)}`;
            finalScoreDisplay.classList.remove('hidden');
            
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('violetHighScore', highScore);
                highScoreDisplay.innerText = highScore;
            }
        }

        function spawnObstacle() {
            const size = Math.random() * 30 + 20;
            const x = Math.random() * (canvas.width - size * 2) + size;
            const speed = (Math.random() * 2 + 3) * difficultyMultiplier;
            const type = Math.random() > 0.8 ? 'spinner' : 'block';
            
            obstacles.push({
                x, y: -50, size, speed, type, rotation: 0, 
                color: `hsl(${270 + Math.random() * 60}, 100%, 70%)`
            });
        }

        function spawnCollectible() {
            const size = 15;
            const x = Math.random() * (canvas.width - size * 2) + size;
            collectibles.push({
                x, y: -50, size, speed: 4, 
                oscillationOffset: Math.random() * Math.PI * 2
            });
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function drawPlayer() {
            player.x += (player.targetX - player.x) * 0.15;
            player.tail.push({x: player.x, y: player.y});
            if (player.tail.length > 15) player.tail.shift();

            ctx.beginPath();
            for (let i = 0; i < player.tail.length; i++) {
                const p = player.tail[i];
                const alpha = i / player.tail.length;
                ctx.lineTo(p.x, p.y);
                ctx.strokeStyle = `rgba(56, 189, 248, ${alpha * 0.5})`;
                ctx.lineWidth = player.size * (i/player.tail.length);
            }
            ctx.stroke();

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#38bdf8";
            ctx.fillStyle = "#e0f2fe";
            ctx.beginPath();
            ctx.moveTo(0, -player.size);
            ctx.lineTo(player.size, player.size);
            ctx.lineTo(0, player.size * 0.7);
            ctx.lineTo(-player.size, player.size);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#2e1065");
            gradient.addColorStop(1, "#4c1d95");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(192, 38, 211, 0.2)";
            ctx.lineWidth = 1;
            
            const gridSize = 60;
            gridOffset = (gridOffset + 2 * difficultyMultiplier) % gridSize;

            const centerX = canvas.width / 2;
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                let slant = (x - centerX) * 0.2; 
                ctx.moveTo(x, 0);
                ctx.lineTo(x + slant, canvas.height);
                ctx.stroke();
            }

            for (let y = gridOffset; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function animate2D() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            frameCount++;
            difficultyMultiplier = 1 + (score / 2000);
            score += 0.5 * difficultyMultiplier;
            scoreDisplay.innerText = Math.floor(score);

            if (frameCount % Math.max(20, Math.floor(60 / difficultyMultiplier)) === 0) {
                spawnObstacle();
            }
            if (frameCount % 150 === 0) {
                spawnCollectible();
            }

            obstacles.forEach((obs, index) => {
                obs.y += obs.speed;
                if (obs.type === 'spinner') obs.rotation += 0.1;

                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);
                ctx.shadowBlur = 15;
                ctx.shadowColor = obs.color;
                ctx.fillStyle = obs.color;

                if (obs.type === 'spinner') {
                    ctx.beginPath();
                    for(let i=0; i<6; i++) {
                        ctx.lineTo(obs.size * Math.cos(i * Math.PI / 3), obs.size * Math.sin(i * Math.PI / 3));
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = "#2e1065";
                    ctx.beginPath();
                    for(let i=0; i<6; i++) {
                        ctx.lineTo((obs.size*0.6) * Math.cos(i * Math.PI / 3), (obs.size*0.6) * Math.sin(i * Math.PI / 3));
                    }
                    ctx.fill();
                } else {
                    ctx.fillRect(-obs.size/2, -obs.size/2, obs.size, obs.size);
                }
                ctx.restore();

                if (obs.y > canvas.height + 50) {
                    obstacles.splice(index, 1);
                }

                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.size + obs.size * 0.8) {
                    createParticles(player.x, player.y, "#38bdf8", 20);
                    createParticles(obs.x, obs.y, obs.color, 10);
                    gameOver();
                }
            });

            collectibles.forEach((col, index) => {
                col.y += col.speed;
                col.x += Math.sin(frameCount * 0.1 + col.oscillationOffset) * 2;

                ctx.save();
                ctx.translate(col.x, col.y);
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#fbbf24";
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath();
                ctx.arc(0, 0, col.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(-3, -3, col.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (col.y > canvas.height + 50) collectibles.splice(index, 1);

                const dx = player.x - col.x;
                const dy = player.y - col.y;
                if (Math.sqrt(dx*dx + dy*dy) < player.size + col.size) {
                    score += 500;
                    createParticles(col.x, col.y, "#fbbf24", 10);
                    collectibles.splice(index, 1);
                    scoreDisplay.classList.add('scale-125', 'text-yellow-300');
                    setTimeout(() => scoreDisplay.classList.remove('scale-125', 'text-yellow-300'), 100);
                }
            });

            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                p.size *= 0.95;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (p.life <= 0) particles.splice(index, 1);
            });

            drawPlayer();

            requestAnimationFrame(animate2D);
        }

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
