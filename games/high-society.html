<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Society</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom animation for newly revealed cards */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #022c22;
            /* Fallback for green-950 */
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- GAME CONSTANTS ---
        const MONEY_CARDS = [1, 2, 3, 4, 5, 8, 10, 12, 15, 20, 25];

        const INITIAL_DECK = [
            { id: 'l1', type: 'luxury', value: 1, name: 'Luxury 1', isDark: false },
            { id: 'l2', type: 'luxury', value: 2, name: 'Luxury 2', isDark: false },
            { id: 'l3', type: 'luxury', value: 3, name: 'Luxury 3', isDark: false },
            { id: 'l4', type: 'luxury', value: 4, name: 'Luxury 4', isDark: false },
            { id: 'l5', type: 'luxury', value: 5, name: 'Luxury 5', isDark: false },
            { id: 'l6', type: 'luxury', value: 6, name: 'Luxury 6', isDark: false },
            { id: 'l7', type: 'luxury', value: 7, name: 'Luxury 7', isDark: false },
            { id: 'l8', type: 'luxury', value: 8, name: 'Luxury 8', isDark: false },
            { id: 'l9', type: 'luxury', value: 9, name: 'Luxury 9', isDark: false },
            { id: 'l10', type: 'luxury', value: 10, name: 'Luxury 10', isDark: false },
            { id: 'p1', type: 'prestige', value: 'x2', name: 'Award (x2)', isDark: true },
            { id: 'p2', type: 'prestige', value: 'x2', name: 'Award (x2)', isDark: true },
            { id: 'p3', type: 'prestige', value: 'x2', name: 'Award (x2)', isDark: true },
            { id: 'd1', type: 'disgrace', value: 'discard', name: 'Faux Pas (Drop)', isDark: false },
            { id: 'd2', type: 'disgrace', value: '-5', name: 'Passé (-5)', isDark: false },
            { id: 'd3', type: 'disgrace', value: '/2', name: 'Scandale (/2)', isDark: true },
        ];

        const sumArray = (arr) => arr.reduce((a, b) => a + b, 0);

        // Helper to shuffle array
        function shuffle(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function App() {
            const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'end'
            const [players, setPlayers] = useState([]);
            const [deck, setDeck] = useState([]);
            const [revealedCard, setRevealedCard] = useState(null);
            const [darkCardsDrawn, setDarkCardsDrawn] = useState(0);

            const [turn, setTurn] = useState(0);
            const [currentHighestBid, setCurrentHighestBid] = useState(0);
            const [highestBidder, setHighestBidder] = useState(null);

            const [logs, setLogs] = useState([]);
            const [showLogs, setShowLogs] = useState(false);
            const [humanPendingBid, setHumanPendingBid] = useState([]); // Indices of selected cards in hand
            const [fastForward, setFastForward] = useState(false);

            // Pre-game state
            const [playerName, setPlayerName] = useState('You');
            const [spectatorMode, setSpectatorMode] = useState(false);
            const [selectedOpponents, setSelectedOpponents] = useState(['Oliver', 'Miles', 'Kirby 🐱']);
            const AVAILABLE_OPPONENTS = ['Oliver', 'Miles', 'Kirby 🐱', 'Pookie', 'Jimmy'];

            // --- INITIALIZATION ---
            const startGame = () => {
                let initialPlayers = [];
                let playerIndex = 0;

                if (!spectatorMode) {
                    initialPlayers.push({ id: playerIndex++, name: playerName.trim() || 'You', isAI: false, hand: [...MONEY_CARDS], bid: [], won: [], passed: false, isEliminated: false, pendingDiscard: false });
                }

                selectedOpponents.forEach(name => {
                    initialPlayers.push({
                        id: playerIndex++,
                        name: name,
                        isAI: true,
                        hand: [...MONEY_CARDS],
                        bid: [], won: [], passed: false, isEliminated: false, pendingDiscard: false
                    });
                });

                setPlayers(initialPlayers);

                let shuffledDeck = shuffle(INITIAL_DECK);
                setDeck(shuffledDeck);
                setDarkCardsDrawn(0);
                setLogs(['The game of High Society has begun!']);
                setGameState('playing');
                setTurn(0); // Human starts
                drawNextCard(shuffledDeck, initialPlayers, 0, 0);
            };

            const addLog = (msg) => {
                setLogs((prev) => [msg, ...prev]);
            };

            const drawNextCard = (currentDeck = deck, currentPlayers = players, darkCount = darkCardsDrawn, nextTurn = turn) => {
                if (currentDeck.length === 0) return endGame(currentPlayers);

                const newDeck = [...currentDeck];
                const card = newDeck.shift();
                setDeck(newDeck);
                setRevealedCard(card);

                let newDarkCount = darkCount;
                if (card.isDark) {
                    newDarkCount++;
                    setDarkCardsDrawn(newDarkCount);
                    addLog(`Dark card drawn: ${card.name}. (${newDarkCount}/4)`);
                }

                if (newDarkCount >= 4) {
                    addLog(`The 4th dark card (${card.name}) was drawn! The game ends immediately.`);
                    setRevealedCard(null);
                    endGame(currentPlayers);
                    return;
                }

                // Reset bidding state for all players
                const updatedPlayers = currentPlayers.map(p => ({
                    ...p,
                    passed: false,
                    bid: []
                }));
                setPlayers(updatedPlayers);
                setCurrentHighestBid(0);
                setHighestBidder(null);
                setHumanPendingBid([]);
                setTurn(nextTurn);

                addLog(`New auction: ${card.name} (${card.type === 'disgrace' ? 'First to pass gets it!' : 'Highest bidder wins!'})`);
            };

            // --- AI LOGIC & AUTO PASS ---
            useEffect(() => {
                if (gameState !== 'playing') return;

                const currentPlayer = players[turn];
                if (!currentPlayer || currentPlayer.passed) return;

                // Auto-pass if the player has completely run out of money
                if (currentPlayer.hand.length === 0) {
                    const timer = setTimeout(() => {
                        executePass(turn);
                    }, fastForward ? 50 : 1000);
                    return () => clearTimeout(timer);
                }

                // If it is an AI turn and they have money, process AI turn
                if (currentPlayer.isAI) {
                    const timer = setTimeout(() => {
                        processAITurn();
                    }, fastForward ? 50 : 1200);
                    return () => clearTimeout(timer);
                }
            }, [turn, gameState, revealedCard, fastForward]);

            // --- FIREWORKS ---
            useEffect(() => {
                if (gameState === 'end' && window.confetti) {
                    const duration = 3000;
                    const animationEnd = Date.now() + duration;
                    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

                    const interval = setInterval(function () {
                        const timeLeft = animationEnd - Date.now();

                        if (timeLeft <= 0) {
                            return clearInterval(interval);
                        }

                        const particleCount = 50 * (timeLeft / duration);
                        window.confetti({
                            ...defaults, particleCount,
                            origin: { x: Math.random() * 0.5 + 0.25, y: Math.random() - 0.2 }
                        });
                        window.confetti({
                            ...defaults, particleCount,
                            origin: { x: Math.random() * 0.5 + 0.5, y: Math.random() - 0.2 }
                        });
                    }, 250);
                }
            }, [gameState]);

            const processAITurn = () => {
                const ai = players[turn];
                if (ai.passed) {
                    goToNextPlayer();
                    return;
                }

                const currentBidTotal = sumArray(ai.bid);
                const availableTotal = sumArray(ai.hand) + currentBidTotal;
                const isNegativeAuction = revealedCard.type === 'disgrace';

                // Heuristics for max willingness to pay
                let maxWillingness = 0;
                if (isNegativeAuction) {
                    maxWillingness = 12; // Risk up to 12k to avoid disgrace
                    if (currentHighestBid > 8 && Math.random() > 0.4) maxWillingness = 0;
                } else {
                    if (revealedCard.type === 'prestige') maxWillingness = 15;
                    else maxWillingness = revealedCard.value * 1.5;
                }

                if (availableTotal < 30) maxWillingness *= 0.6;

                let bestAdditionalCards = null;
                let lowestSufficientTotal = Infinity;

                const getSubsets = (arr) => {
                    let subsets = [[]];
                    for (let el of arr) {
                        const last = subsets.length;
                        for (let i = 0; i < last; i++) {
                            subsets.push([...subsets[i], el]);
                        }
                    }
                    return subsets;
                };

                const allCombinations = getSubsets(ai.hand);

                for (const combo of allCombinations) {
                    const proposedTotal = currentBidTotal + sumArray(combo);
                    if (proposedTotal > currentHighestBid && proposedTotal <= maxWillingness && proposedTotal < lowestSufficientTotal) {
                        lowestSufficientTotal = proposedTotal;
                        bestAdditionalCards = combo;
                    }
                }

                if (isNegativeAuction && currentHighestBid === 0 && Math.random() < 0.2) {
                    bestAdditionalCards = null;
                }

                if (bestAdditionalCards) {
                    executeBid(turn, bestAdditionalCards);
                } else {
                    executePass(turn);
                }
            };

            // --- ACTIONS ---
            const toggleHumanPendingCard = (cardIndex) => {
                if (humanPendingBid.includes(cardIndex)) {
                    setHumanPendingBid(humanPendingBid.filter(i => i !== cardIndex));
                } else {
                    setHumanPendingBid([...humanPendingBid, cardIndex]);
                }
            };

            const handleHumanBid = () => {
                const humanIndex = players.findIndex(p => !p.isAI);
                if (humanIndex === -1) return;
                const p = players[humanIndex];
                const selectedCards = humanPendingBid.map(i => p.hand[i]);
                const proposedTotal = sumArray(p.bid) + sumArray(selectedCards);

                if (proposedTotal <= currentHighestBid) return;

                executeBid(humanIndex, selectedCards);
            };

            const executeBid = (playerId, additionalCards) => {
                const p = players[playerId];
                const additionalAmount = sumArray(additionalCards);
                const newBidTotal = sumArray(p.bid) + additionalAmount;

                let newHand = [...p.hand];
                for (const card of additionalCards) {
                    const idx = newHand.indexOf(card);
                    if (idx > -1) newHand.splice(idx, 1);
                }

                const updatedPlayers = [...players];
                updatedPlayers[playerId] = {
                    ...p,
                    hand: newHand,
                    bid: [...p.bid, ...additionalCards]
                };

                setPlayers(updatedPlayers);
                setCurrentHighestBid(newBidTotal);
                setHighestBidder(playerId);

                if (p.bid.length > 0) {
                    addLog(`${p.name} added ${additionalAmount}k to their bid (Total: ${newBidTotal}k).`);
                } else {
                    addLog(`${p.name} bid ${newBidTotal}k.`);
                }

                setHumanPendingBid([]);
                goToNextPlayer(updatedPlayers);
            };

            const executePass = (playerId) => {
                const p = players[playerId];
                addLog(`${p.name} passed.`);

                const updatedPlayers = [...players];
                updatedPlayers[playerId].passed = true;

                setPlayers(updatedPlayers);
                setHumanPendingBid([]);

                checkAuctionStatus(updatedPlayers, playerId);
            };

            const goToNextPlayer = (currentPlayers = players) => {
                let next = (turn + 1) % currentPlayers.length;
                let safeGuard = 0;
                while (currentPlayers[next].passed && safeGuard < currentPlayers.length + 1) {
                    next = (next + 1) % currentPlayers.length;
                    safeGuard++;
                }
                setTurn(next);
            };

            const checkAuctionStatus = (currentPlayers, passedPlayerId) => {
                const isNegativeAuction = revealedCard.type === 'disgrace';

                if (isNegativeAuction) {
                    endAuction(currentPlayers, passedPlayerId);
                } else {
                    const activePlayers = currentPlayers.filter(p => !p.passed);
                    if (activePlayers.length === 1) {
                        endAuction(currentPlayers, activePlayers[0].id);
                    } else if (activePlayers.length === 0) {
                        addLog(`Everyone passed. The card is discarded.`);
                        drawNextCard(deck, currentPlayers, darkCardsDrawn, (turn + 1) % currentPlayers.length);
                    } else {
                        goToNextPlayer(currentPlayers);
                    }
                }
            };

            const endAuction = (currentPlayers, winnerId) => {
                const isNegativeAuction = revealedCard.type === 'disgrace';
                const updatedPlayers = [...currentPlayers];
                const winner = updatedPlayers[winnerId];

                if (isNegativeAuction) {
                    updatedPlayers.forEach(p => {
                        if (p.id === winnerId) {
                            p.won.push(revealedCard);
                            p.hand = [...p.hand, ...p.bid];
                            p.bid = [];
                        } else {
                            p.bid = [];
                        }
                    });

                    if (revealedCard.value === 'discard') {
                        const luxuryCards = winner.won.filter(c => c.type === 'luxury');
                        if (luxuryCards.length > 0) {
                            luxuryCards.sort((a, b) => a.value - b.value);
                            const lowest = luxuryCards[0];
                            winner.won = winner.won.filter(c => c.id !== lowest.id);
                            addLog(`${winner.name} took Faux Pas and automatically discarded their lowest luxury: ${lowest.name}!`);
                        } else {
                            winner.pendingDiscard = true;
                            addLog(`${winner.name} took Faux Pas but had no Luxury cards. The next Luxury card they win will be discarded!`);
                        }
                    } else if (revealedCard.value === '-5') {
                        addLog(`${winner.name} took ${revealedCard.name} and saved their money! Others lost their bids.`);
                    } else {
                        addLog(`${winner.name} took the negative card and saved their money! Others lost their bids.`);
                    }

                } else {
                    updatedPlayers.forEach(p => {
                        if (p.id === winnerId) {
                            if (p.pendingDiscard && revealedCard.type === 'luxury') {
                                p.pendingDiscard = false;
                                p.won.push(revealedCard); // Technically it gets discarded immediately but keeping it out of the final score logic via removing it
                                winner.won = winner.won.filter(c => c.id !== revealedCard.id); // Remove immediately to represent discard
                                addLog(`${winner.name} won ${revealedCard.name}, but it was immediately discarded due to their pending Faux Pas!`);
                            } else {
                                p.won.push(revealedCard);
                                addLog(`${winner.name} won ${revealedCard.name} for ${currentHighestBid}k!`);
                            }
                            p.bid = [];
                        } else {
                            p.hand = [...p.hand, ...p.bid];
                            p.bid = [];
                        }
                    });
                }

                setPlayers(updatedPlayers);

                setTimeout(() => {
                    drawNextCard(deck, updatedPlayers, darkCardsDrawn, winnerId);
                }, fastForward ? 100 : 1500);
            };

            // --- GAME END ---
            const endGame = (currentPlayers) => {
                let finalPlayers = [...currentPlayers];

                finalPlayers.forEach(p => {
                    p.hand = [...p.hand, ...p.bid];
                    p.bid = [];
                });

                let minMoney = Infinity;
                finalPlayers.forEach(p => {
                    const money = sumArray(p.hand);
                    if (money < minMoney) minMoney = money;
                });

                finalPlayers.forEach(p => {
                    if (sumArray(p.hand) === minMoney) {
                        p.isEliminated = true;
                        addLog(`💀 ${p.name} eliminated for having the least money (${minMoney}k)!`);
                    }
                });

                finalPlayers.forEach(p => {
                    if (p.isEliminated) {
                        p.score = 0;
                        return;
                    }

                    let baseScore = 0;
                    let multipliers = 0;
                    let divisors = 0;

                    p.won.forEach(card => {
                        if (card.type === 'luxury') baseScore += card.value;
                        if (card.id === 'd2') baseScore -= 5; // Passé is d2 now
                        if (card.type === 'prestige') multipliers++;
                        if (card.id === 'd3') divisors++;
                    });

                    for (let i = 0; i < multipliers; i++) baseScore *= 2;
                    for (let i = 0; i < divisors; i++) baseScore = Math.ceil(baseScore / 2);

                    p.score = baseScore;
                });

                finalPlayers.sort((a, b) => {
                    if (a.isEliminated && !b.isEliminated) return 1;
                    if (!a.isEliminated && b.isEliminated) return -1;
                    if (a.score !== b.score) return b.score - a.score;
                    return sumArray(b.hand) - sumArray(a.hand);
                });

                setPlayers(finalPlayers);
                setGameState('end');
            };

            // --- RENDER HELPERS ---
            const renderCard = (card, size = 'large') => {
                if (!card) return null;
                const isDark = card.isDark;
                const isNegative = card.type === 'disgrace';

                let containerClasses = 'flex flex-col justify-center items-center rounded-lg shadow-md transition-all ';
                let titleClasses = 'font-bold text-center leading-tight ';
                let valueClasses = 'font-serif font-bold ';

                if (size === 'large') {
                    containerClasses += 'w-32 h-48 border-2 text-lg ' + (isDark ? 'border-yellow-500' : isNegative ? 'border-red-800' : 'border-emerald-800');
                    titleClasses += 'text-xl px-1';
                    valueClasses += 'mt-4 text-4xl';
                } else if (size === 'small') {
                    containerClasses += 'w-16 h-24 border-2 text-xs ' + (isDark ? 'border-yellow-500' : isNegative ? 'border-red-800' : 'border-emerald-800');
                    titleClasses += 'text-xs px-1 mt-1';
                    valueClasses += 'mt-1 text-xl';
                } else if (size === 'tiny') {
                    containerClasses += 'w-12 h-16 border border-gray-400 text-[10px] ' + (isDark ? 'border-yellow-500' : isNegative ? 'border-red-800' : 'border-emerald-800');
                    titleClasses += 'text-[10px] px-0.5 mt-0.5 tracking-tighter';
                    valueClasses += 'text-sm';
                }

                const bgClasses = isDark ? 'bg-emerald-900 text-yellow-400' : isNegative ? 'bg-red-100 text-red-800' : 'bg-amber-50 text-emerald-900';

                return (
                    <div className={`${containerClasses} ${bgClasses}`}>
                        <div className={titleClasses}>{card.name}</div>
                        {(card.type === 'luxury' || card.type === 'prestige') && (
                            <div className={valueClasses}>
                                {card.type === 'luxury' ? card.value : 'x2'}
                            </div>
                        )}
                    </div>
                );
            };

            const renderMoneyCard = (val, isSelected = false, onClick = null) => (
                <div
                    onClick={onClick}
                    className={`relative w-12 h-16 sm:w-16 sm:h-24 rounded shadow-sm border border-gray-400 flex items-center justify-center font-bold text-green-900 cursor-pointer transition-all
              ${isSelected ? 'bg-yellow-200 -translate-y-4 shadow-lg border-yellow-500 border-2' : 'bg-white hover:-translate-y-2'}`}
                >
                    {val}k
                </div>
            );

            return (
                <div className="min-h-screen bg-green-950 text-white font-sans flex flex-col">

                    {/* HEADER & LOGS */}
                    <div className="bg-green-900 p-2 border-b border-green-700 flex justify-between items-center shadow-md z-20 relative">
                        <h1 className="text-xl sm:text-2xl font-serif text-yellow-400 font-bold tracking-wider">HIGH SOCIETY</h1>
                        <div className="flex items-center space-x-4 w-1/2 justify-end">
                            <div className="h-8 leading-8 overflow-hidden text-sm sm:text-base text-gray-200 text-right opacity-80 italic hidden sm:block truncate flex-1">
                                {logs[0]}
                            </div>
                            <button onClick={() => setShowLogs(!showLogs)} className="bg-green-800 hover:bg-green-700 text-yellow-400 px-3 py-1 rounded border border-green-600 shadow text-sm whitespace-nowrap transition cursor-pointer">
                                📜 Logs
                            </button>
                        </div>
                    </div>

                    {/* Collapsible Log Panel */}
                    <div className={`fixed top-0 right-0 h-full bg-green-950 border-l border-green-700 shadow-2xl transition-transform duration-300 ease-in-out z-50 flex flex-col w-80 max-w-[80vw] ${showLogs ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-4 border-b border-green-700 flex justify-between items-center bg-green-900">
                            <h2 className="text-xl font-bold text-yellow-400 font-serif">Game Log</h2>
                            <button onClick={() => setShowLogs(false)} className="text-gray-300 hover:text-white text-xl cursor-pointer">✕</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                            {logs.map((log, i) => (
                                <div key={i} className="text-sm text-gray-300 border-b border-green-800/50 pb-2">
                                    {log}
                                </div>
                            ))}
                            {logs.length === 0 && <div className="text-gray-500 italic text-sm">No activity yet.</div>}
                        </div>
                    </div>

                    {/* Overlay to click off logs */}
                    {showLogs && (
                        <div className="fixed inset-0 bg-black/40 z-40 transition-opacity" onClick={() => setShowLogs(false)}></div>
                    )}

                    {gameState === 'start' && (
                        <div className="flex-1 flex flex-col items-center justify-center space-y-8 bg-green-900 overflow-y-auto py-10">
                            <div className="bg-emerald-800 p-6 sm:p-8 rounded-xl shadow-2xl border border-yellow-500 max-w-lg w-full mx-4">
                                <h2 className="text-4xl font-serif text-yellow-400 mb-4 text-center">High Society</h2>
                                <p className="text-gray-200 mb-6 text-center">Outbid your rivals for luxury, but don't be the poorest at the end, or you'll be ruined!</p>

                                <div className="mb-6 flex flex-col sm:flex-row items-center justify-between bg-green-950/50 p-4 rounded-lg border border-green-700">
                                    <label className="text-yellow-400 font-bold mb-2 sm:mb-0 cursor-pointer" onClick={() => document.getElementById('spectatorToggle').click()}>Spectator mode</label>
                                    <input
                                        id="spectatorToggle"
                                        type="checkbox"
                                        checked={spectatorMode}
                                        onChange={(e) => {
                                            const isChecked = e.target.checked;
                                            setSpectatorMode(isChecked);
                                            if (isChecked && selectedOpponents.length < 3) {
                                                const newOpp = [...selectedOpponents];
                                                for (let opp of AVAILABLE_OPPONENTS) {
                                                    if (!newOpp.includes(opp)) newOpp.push(opp);
                                                    if (newOpp.length === 3) break;
                                                }
                                                setSelectedOpponents(newOpp);
                                            } else if (!isChecked && selectedOpponents.length > 4) {
                                                setSelectedOpponents(selectedOpponents.slice(0, 4));
                                            }
                                        }}
                                        className="w-6 h-6 accent-yellow-500 cursor-pointer"
                                    />
                                </div>

                                {!spectatorMode && (
                                    <div className="mb-6">
                                        <label className="block text-yellow-400 font-bold mb-2">Your name</label>
                                        <input
                                            type="text"
                                            value={playerName}
                                            onChange={(e) => setPlayerName(e.target.value)}
                                            className="w-full bg-green-900 border border-green-700 rounded p-2 text-white focus:outline-none focus:border-yellow-500"
                                            maxLength="16"
                                            placeholder="You"
                                        />
                                    </div>
                                )}

                                <div className="mb-8">
                                    <label className="block text-yellow-400 font-bold mb-3">Select opponents ({!spectatorMode ? '2 to 4' : '3 to 5'})</label>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        {AVAILABLE_OPPONENTS.map(opp => {
                                            const isSelected = selectedOpponents.includes(opp);
                                            return (
                                                <button
                                                    key={opp}
                                                    onClick={() => {
                                                        if (isSelected) {
                                                            if (selectedOpponents.length > (!spectatorMode ? 2 : 3)) setSelectedOpponents(selectedOpponents.filter(o => o !== opp));
                                                        } else {
                                                            if (selectedOpponents.length < (!spectatorMode ? 4 : 5)) setSelectedOpponents([...selectedOpponents, opp]);
                                                        }
                                                    }}
                                                    className={`px-4 py-2 rounded-full border shadow-md transition transform hover:scale-105 text-sm font-bold ${isSelected ? 'bg-yellow-500 text-green-900 border-yellow-400' : 'bg-green-950 text-gray-400 border-green-700 hover:bg-green-800'}`}
                                                >
                                                    {opp}
                                                </button>
                                            )
                                        })}
                                    </div>
                                    <p className="text-sm text-gray-400 mt-4 text-center italic">
                                        {selectedOpponents.length} selected. Total players: {selectedOpponents.length + (!spectatorMode ? 1 : 0)}
                                    </p>
                                </div>

                                <div className="text-center mt-6">
                                    <button
                                        onClick={startGame}
                                        className="bg-yellow-500 hover:bg-yellow-400 text-green-900 font-bold py-3 px-8 rounded-full text-xl shadow-lg transition transform hover:scale-105 w-full sm:w-auto"
                                    >
                                        Start game
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="flex-1 flex flex-col relative overflow-hidden">

                            {/* OPPONENTS AREA */}
                            <div className="flex justify-around p-2 bg-green-900/50 flex-wrap">
                                {players.filter(p => p.isAI).map(p => (
                                    <div key={p.id} style={{ width: `${100 / players.filter(p => p.isAI).length}%`, maxWidth: '200px' }} className={`flex flex-col items-center p-2 rounded-lg transition-colors flex-1 ${turn === p.id ? 'bg-yellow-500/20 border border-yellow-500' : 'border border-transparent'}`}>
                                        <div className="font-bold text-yellow-300 text-sm md:text-base text-center whitespace-nowrap overflow-hidden text-ellipsis w-full">{p.name}</div>
                                        <div className="text-[10px] text-gray-300 mb-2">Hand: {p.hand.length}</div>

                                        {/* Opponent Estate */}
                                        <div className="flex flex-wrap justify-center gap-1 mb-3 min-h-[64px] content-start">
                                            {p.won.length > 0 ? (
                                                p.won.map((c, i) => <React.Fragment key={i}>{renderCard(c, 'tiny')}</React.Fragment>)
                                            ) : (
                                                <span className="text-[10px] text-gray-500 italic mt-2">No estate</span>
                                            )}
                                        </div>
                                        {p.pendingDiscard && <div className="text-[10px] sm:text-xs text-red-400 font-bold uppercase animate-pulse mb-1 -mt-2">Pending Drop!</div>}

                                        {/* Opponent Bid Area */}
                                        <div className="min-h-[40px] flex items-center justify-center mt-auto">
                                            {p.passed ? (
                                                <span className="text-red-400 font-bold text-xs bg-red-900/50 px-2 py-1 rounded">Passed</span>
                                            ) : (
                                                <div className="flex -space-x-4">
                                                    {p.bid.map((val, idx) => (
                                                        <div key={idx} className="w-8 h-12 bg-white rounded border border-gray-400 flex items-center justify-center text-xs text-green-900 font-bold shadow">
                                                            {val}k
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* TABLE CENTER */}
                            <div className="flex-1 flex flex-col items-center justify-center relative z-10 p-4">
                                {/* Deck and Revealed Card */}
                                <div className="flex items-center space-x-6 sm:space-x-8 mb-6">
                                    <div className="relative w-24 h-36 sm:w-32 sm:h-48 rounded-lg border-2 border-green-700 bg-green-800 flex items-center justify-center shadow-inner">
                                        <span className="text-green-600 font-bold opacity-50 text-lg sm:text-xl text-center leading-tight">
                                            {deck.length} <br />Left
                                        </span>
                                    </div>
                                    <div className="animate-fade-in scale-90 sm:scale-100">
                                        {renderCard(revealedCard, 'large')}
                                    </div>
                                </div>

                                {/* Auction Status */}
                                <div className="text-center bg-black/40 p-4 rounded-xl border border-green-700 w-full max-w-md">
                                    <h3 className="text-yellow-400 font-bold uppercase tracking-widest text-xs sm:text-sm mb-2">
                                        {revealedCard?.type === 'disgrace' ? 'Avoidance Auction (First to pass gets it!)' : 'Luxury Auction'}
                                    </h3>
                                    <div className="text-xl sm:text-2xl font-serif">
                                        Highest Bid: <span className="text-yellow-300 font-bold">{currentHighestBid}k</span>
                                    </div>
                                    {highestBidder !== null && (
                                        <div className="text-gray-300 text-xs sm:text-sm mt-1">
                                            by {players[highestBidder].name}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {(() => {
                                const human = players.find(p => !p.isAI);
                                if (!human) return (
                                    <div className="mt-auto p-8 border-t-2 bg-green-900 border-green-700 flex flex-col items-center justify-center relative">
                                        <div className="text-yellow-500 text-2xl uppercase tracking-widest font-bold mb-2">Spectator Mode</div>
                                        <div className="text-gray-300">Watch the AI players battle for high society!</div>
                                        <button
                                            onClick={() => setFastForward(!fastForward)}
                                            className={`mt-4 px-6 py-2 rounded-full font-bold shadow transition-colors text-sm ${fastForward ? 'bg-yellow-500 text-green-900' : 'bg-green-800 text-yellow-400 border border-yellow-500 hover:bg-green-700'}`}
                                        >
                                            {fastForward ? '⏩ FAST FORWARD (ON)' : '▶️ FAST FORWARD (OFF)'}
                                        </button>
                                    </div>
                                );

                                const isHumanTurn = turn === human.id;
                                return (
                                    <div className={`mt-auto p-4 border-t-2 ${isHumanTurn ? 'bg-green-800 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)]' : 'bg-green-900 border-green-700'}`}>
                                        <div className="flex flex-col md:flex-row justify-between items-center md:items-end mb-4 max-w-6xl mx-auto gap-4">

                                            {/* Player Won Cards */}
                                            <div className="w-full md:w-auto flex-1 flex flex-col items-center md:items-start">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <div className="text-xs text-yellow-300 font-bold uppercase tracking-wider">Your Estate</div>
                                                    {human.pendingDiscard && <div className="text-xs bg-red-900 border border-red-500 text-red-300 px-1.5 py-0.5 rounded font-bold animate-pulse">PENDING DROP!</div>}
                                                </div>
                                                <div className="flex flex-wrap justify-center md:justify-start gap-1 min-h-[96px] content-start">
                                                    {human.won.map((c, i) => <React.Fragment key={i}>{renderCard(c, 'small')}</React.Fragment>)}
                                                    {human.won.length === 0 && <span className="text-gray-500 text-sm italic mt-4">Empty</span>}
                                                </div>
                                            </div>

                                            {/* Player Controls */}
                                            <div className="flex-1 flex flex-col items-center w-full">

                                                {/* Current Bid Display */}
                                                <div className="mb-2 h-14 flex items-center space-x-2">
                                                    <span className="text-sm text-gray-300">On Table:</span>
                                                    {human.passed ? (
                                                        <span className="text-red-400 font-bold px-3 py-1 bg-red-900/50 rounded">You Passed</span>
                                                    ) : (
                                                        human.bid.map((val, idx) => (
                                                            <div key={idx} className="w-10 h-14 bg-gray-200 rounded border border-gray-400 flex items-center justify-center text-sm text-green-900 font-bold shadow">
                                                                {val}k
                                                            </div>
                                                        ))
                                                    )}
                                                    {human.bid.length === 0 && !human.passed && <span className="text-gray-500 text-sm">Nothing</span>}
                                                </div>

                                                {/* Pending Selection & Actions */}
                                                {isHumanTurn && !human.passed && (
                                                    <div className="flex flex-wrap justify-center items-center gap-4 bg-black/30 p-2 sm:p-3 rounded-lg w-full max-w-md">
                                                        <div className="flex space-x-4">
                                                            <div className="text-center">
                                                                <div className="text-[10px] sm:text-xs text-gray-400 uppercase">Adding</div>
                                                                <div className="text-lg sm:text-xl font-bold text-white">
                                                                    +{sumArray(humanPendingBid.map(i => human.hand[i]))}k
                                                                </div>
                                                            </div>
                                                            <div className="text-center border-l border-gray-600 pl-4">
                                                                <div className="text-[10px] sm:text-xs text-yellow-500 uppercase">New Total</div>
                                                                <div className="text-lg sm:text-xl font-bold text-yellow-300">
                                                                    {sumArray(human.bid) + sumArray(humanPendingBid.map(i => human.hand[i]))}k
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex space-x-2 w-full sm:w-auto mt-2 sm:mt-0">
                                                            <button
                                                                onClick={handleHumanBid}
                                                                disabled={(sumArray(human.bid) + sumArray(humanPendingBid.map(i => human.hand[i]))) <= currentHighestBid}
                                                                className="flex-1 bg-yellow-500 disabled:bg-gray-600 disabled:text-gray-400 hover:bg-yellow-400 text-green-900 font-bold py-2 px-4 sm:px-6 rounded shadow transition text-sm sm:text-base"
                                                            >
                                                                {human.bid.length > 0 ? 'Raise Bid' : 'Submit Bid'}
                                                            </button>
                                                            <button
                                                                onClick={() => executePass(human.id)}
                                                                className="flex-1 sm:flex-none bg-red-700 hover:bg-red-600 text-white font-bold py-2 px-4 sm:px-6 rounded shadow transition text-sm sm:text-base"
                                                            >
                                                                Pass
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                                {!isHumanTurn && (
                                                    <div className="text-yellow-400 font-bold animate-pulse py-4">Waiting for {players[turn]?.name}...</div>
                                                )}
                                            </div>
                                        </div>

                                        {/* Player Hand */}
                                        <div className="flex justify-start sm:justify-center gap-1 sm:gap-2 max-w-6xl mx-auto overflow-x-auto pb-4 px-2 w-full">
                                            {(() => {
                                                const handItems = human.hand.map((val, originalIndex) => ({ val, originalIndex }));
                                                handItems.sort((a, b) => a.val - b.val);
                                                return handItems.map((item, sortedIdx) => (
                                                    <React.Fragment key={sortedIdx}>
                                                        {renderMoneyCard(
                                                            item.val,
                                                            humanPendingBid.includes(item.originalIndex),
                                                            isHumanTurn && !human.passed ? () => toggleHumanPendingCard(item.originalIndex) : undefined
                                                        )}
                                                    </React.Fragment>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    )}

                    {gameState === 'end' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-4 bg-green-900 overflow-y-auto">
                            <div className="bg-emerald-800 p-6 md:p-10 rounded-xl shadow-2xl border border-yellow-500 w-full max-w-4xl">
                                <h2 className="text-3xl md:text-5xl font-serif text-yellow-400 mb-2 text-center">Season Over</h2>
                                <p className="text-center text-gray-300 mb-8">The 4th dark card was revealed, closing the auctions!</p>

                                <div className="space-y-4">
                                    {players.map((p, idx) => (
                                        <div key={p.id} className={`flex flex-col md:flex-row items-center p-4 rounded border ${p.isEliminated ? 'bg-red-950/50 border-red-800 opacity-70' : 'bg-green-950/50 border-green-700'}`}>

                                            <div className="w-full md:w-1/4 flex flex-col items-center md:items-start mb-4 md:mb-0">
                                                <span className="text-xl font-bold text-white flex items-center gap-2">
                                                    {idx === 0 && !p.isEliminated && '🏆'}
                                                    {p.isEliminated && '💀'}
                                                    {p.name}
                                                </span>
                                                <span className={`text-sm ${p.isEliminated ? 'text-red-400 font-bold' : 'text-gray-400'}`}>
                                                    Money Left: {sumArray(p.hand)}k
                                                </span>
                                            </div>

                                            <div className="w-full md:w-1/2 flex flex-wrap gap-2 justify-center">
                                                {p.won.map((c, i) => <React.Fragment key={i}>{renderCard(c, 'small')}</React.Fragment>)}
                                                {p.won.length === 0 && <span className="text-gray-500 italic">No assets acquired</span>}
                                            </div>

                                            <div className="w-full md:w-1/4 flex flex-col items-center md:items-end mt-4 md:mt-0">
                                                {p.isEliminated ? (
                                                    <span className="text-red-500 font-bold text-xl uppercase tracking-widest text-center md:text-right">Eliminated<br /><span className="text-xs text-red-400 normal-case">Poorest Player</span></span>
                                                ) : (
                                                    <>
                                                        <span className="text-sm text-gray-400 uppercase tracking-widest">Total Score</span>
                                                        <span className="text-4xl font-serif text-yellow-300">{p.score}</span>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-10 text-center">
                                    <button
                                        onClick={startGame}
                                        className="bg-yellow-500 hover:bg-yellow-400 text-green-900 font-bold py-3 px-8 rounded-full text-xl shadow-lg transition"
                                    >
                                        Play Another Season
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
