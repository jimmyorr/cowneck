<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape The Dungeon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f5f5f5; overflow: hidden; }
        .game-grid { display: grid; gap: 0; background: #0a0a0a; }
        .grid-cell { position: relative; aspect-ratio: 1; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .wall { background: #262626; box-shadow: inset 0 0 12px rgba(0,0,0,0.8); }
        .trap { background: rgba(239, 68, 68, 0.15); }
        .trap.active { background: rgba(239, 68, 68, 0.4); font-size: 1.2rem; }
        .ice { background: rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.2); }
        .portal { color: #a855f7; font-size: 1.2rem; animation: pulse-portal 1s infinite; }
        @keyframes pulse-portal { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .key { color: #fbbf24; font-size: 1.5rem; animation: pulse-key 0.5s infinite; }
        @keyframes pulse-key { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .door.locked { background: rgba(239, 68, 68, 0.1); color: #6b7280; }
        .door.unlocked { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .player { border-radius: 50%; font-weight: bold; z-index: 10; font-size: 1.1rem; }
        .skull { font-size: 1.2rem; z-index: 20; color: #f43f5e; }
        .control-btn { padding: 1rem; background: #404040; border: none; color: white; border-radius: 1rem; cursor: pointer; touch-action: manipulation; font-size: 1.5rem; }
        .control-btn:active { transform: scale(0.95); }
        @media (max-width: 640px) {
            .hidden-mobile { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100 flex items-center justify-center p-4">
    <div id="app" class="w-full h-full max-w-6xl flex flex-col"></div>

    <script>
        // ==========================================
        // GAME STATE & CONFIGURATION
        // ==========================================
        const GRID_WIDTH = 21;
        const GRID_HEIGHT = 15;
        const TRAP_CYCLE = 4500; // 1.5s ON, 3.0s OFF
        const SKULL_CYCLE = 5000; // 5 seconds per perimeter loop

        let gameState = {
            level: null,
            player: null,
            hasKey: false,
            won: false,
            trapsActive: false,
            skullPos: { x: -1, y: -1 },
            gameRunning: false
        };

        // ==========================================
        // LEVEL GENERATION
        // ==========================================
        function generateLevel() {
            const w = GRID_WIDTH, h = GRID_HEIGHT;
            const grid = Array(h).fill().map(() => Array(w).fill('1')); // '1' = wall
            const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];

            // Recursive backtracking to carve paths
            const carve = (y, x) => {
                grid[y][x] = '0'; // '0' = path
                const shuffled = [...dirs].sort(() => Math.random() - 0.5);
                for (let [dy, dx] of shuffled) {
                    const ny = y + dy, nx = x + dx;
                    if (ny > 0 && ny < h - 1 && nx > 0 && nx < w - 1 && grid[ny][nx] === '1') {
                        grid[y + dy / 2][x + dx / 2] = '0';
                        carve(ny, nx);
                    }
                }
            };
            carve(1, 1);

            // Add random loops for multiple paths
            for (let i = 0; i < 20; i++) {
                const rx = Math.floor(Math.random() * ((w - 3) / 2)) * 2 + 1;
                const ry = Math.floor(Math.random() * ((h - 3) / 2)) * 2 + 1;
                grid[ry][rx] = '0';
            }

            const pStart = { x: 1, y: 1 };
            const doorPos = { x: w - 2, y: h - 2 };

            // Guarantee door access
            grid[doorPos.y][doorPos.x] = '0';
            grid[doorPos.y - 1][doorPos.x] = '0';
            grid[doorPos.y][doorPos.x - 1] = '0';

            // Place Key
            let keyPos;
            while (true) {
                const rx = Math.floor(Math.random() * (w - 2)) + 1;
                const ry = Math.floor(Math.random() * (h - 2)) + 1;
                if (grid[ry][rx] === '0' && !(rx === pStart.x && ry === pStart.y) && !(rx === doorPos.x && ry === doorPos.y)) {
                    keyPos = { x: rx, y: ry };
                    break;
                }
            }

            // Place Fire Traps ('2')
            let traps = 0, attempts = 0;
            while (traps < 6 && attempts < 150) {
                const rx = Math.floor(Math.random() * (w - 2)) + 1;
                const ry = Math.floor(Math.random() * (h - 2)) + 1;
                if (grid[ry][rx] === '0' && !(rx === pStart.x && ry === pStart.y) && 
                    !(rx === doorPos.x && ry === doorPos.y) && !(rx === keyPos.x && ry === keyPos.y)) {
                    const distStart = Math.abs(rx - pStart.x) + Math.abs(ry - pStart.y);
                    if (distStart > 3) {
                        grid[ry][rx] = '2';
                        traps++;
                    }
                }
                attempts++;
            }

            // Place Ice Patches ('3')
            let icePatches = 0;
            attempts = 0;
            while (icePatches < 8 && attempts < 200) {
                const rx = Math.floor(Math.random() * (w - 2)) + 1;
                const ry = Math.floor(Math.random() * (h - 2)) + 1;
                if (grid[ry][rx] === '0' && !(rx === pStart.x && ry === pStart.y) && 
                    !(rx === doorPos.x && ry === doorPos.y) && !(rx === keyPos.x && ry === keyPos.y)) {
                    const dir = Math.random() < 0.5 ? [0, 1] : [1, 0];
                    let len = Math.floor(Math.random() * 3) + 2;
                    let placed = false;
                    for (let l = 0; l < len; l++) {
                        let ix = rx + dir[0] * l;
                        let iy = ry + dir[1] * l;
                        if (ix > 0 && ix < w - 1 && iy > 0 && iy < h - 1 && grid[iy][ix] === '0' &&
                            !(ix === pStart.x && iy === pStart.y) && !(ix === doorPos.x && iy === doorPos.y) && 
                            !(ix === keyPos.x && iy === keyPos.y)) {
                            grid[iy][ix] = '3';
                            placed = true;
                        } else {
                            break;
                        }
                    }
                    if (placed) icePatches++;
                }
                attempts++;
            }

            // Place Portals ('4')
            let portals = [];
            attempts = 0;
            while (portals.length < 2 && attempts < 100) {
                const rx = Math.floor(Math.random() * (w - 2)) + 1;
                const ry = Math.floor(Math.random() * (h - 2)) + 1;
                if (grid[ry][rx] === '0' && !(rx === pStart.x && ry === pStart.y) && 
                    !(rx === doorPos.x && ry === doorPos.y) && !(rx === keyPos.x && ry === keyPos.y)) {
                    grid[ry][rx] = '4';
                    portals.push({ x: rx, y: ry });
                }
                attempts++;
            }

            return { 
                layout: grid.map(row => row.join('')), 
                keyPos, doorPos, pStart, 
                width: w, height: h, 
                portals 
            };
        }

        // ==========================================
        // MOVEMENT & COLLISION
        // ==========================================
        function calculateMove(px, py, dx, dy, level, trapsActive, skullPos) {
            let cx = px, cy = py;
            let dead = false;

            while (true) {
                let nx = cx + dx;
                let ny = cy + dy;

                // Bounds/Wall
                if (nx < 0 || ny < 0 || nx >= level.width || ny >= level.height || level.layout[ny][nx] === '1') {
                    break;
                }

                // Hit the Skull
                if (nx === skullPos.x && ny === skullPos.y) {
                    dead = true;
                    break;
                }

                // Hit Fire Trap
                if (level.layout[ny][nx] === '2' && trapsActive) {
                    dead = true;
                    break;
                }

                // Commit Move
                cx = nx;
                cy = ny;
                let tile = level.layout[ny][nx];

                // Portal Teleportation
                if (tile === '4' && level.portals && level.portals.length === 2) {
                    const p1 = level.portals[0];
                    const p2 = level.portals[1];
                    if (cx === p1.x && cy === p1.y) {
                        cx = p2.x;
                        cy = p2.y;
                    } else if (cx === p2.x && cy === p2.y) {
                        cx = p1.x;
                        cy = p1.y;
                    }
                    break; // Stop sliding after teleport
                }

                // Stop sliding on normal floor or trap
                if (tile === '0' || tile === '2') break;
                // Continue sliding on ice ('3')
            }

            return { x: cx, y: cy, dead };
        }

        // ==========================================
        // GAME LOOP
        // ==========================================
        function updateTraps() {
            gameState.trapsActive = (Date.now() % TRAP_CYCLE) < 1500;
        }

        function updateSkull() {
            if (!gameState.level) return;
            const level = gameState.level;
            const w = level.width, h = level.height;
            const path = [];
            for (let x = 1; x < w - 1; x++) path.push({ x, y: 1 }); // Top
            for (let y = 1; y < h - 1; y++) path.push({ x: w - 2, y }); // Right
            for (let x = w - 2; x > 1; x--) path.push({ x, y: h - 2 }); // Bottom
            for (let y = h - 2; y > 1; y--) path.push({ x: 1, y }); // Left

            const progress = (Date.now() % SKULL_CYCLE) / SKULL_CYCLE;
            const index = Math.floor(progress * path.length);
            gameState.skullPos = path[index] || { x: -1, y: -1 };
        }

        function checkPassiveDeath() {
            if (gameState.won) return;
            const player = gameState.player;
            const level = gameState.level;
            const tile = level.layout[player.y][player.x];

            let dead = false;
            if (gameState.trapsActive && tile === '2') dead = true;
            if (player.x === gameState.skullPos.x && player.y === gameState.skullPos.y) dead = true;

            if (dead) {
                gameState.hasKey = false;
                gameState.player = { ...gameState.level.pStart };
            }
        }

        function handleMove(dx, dy) {
            if (gameState.won || !gameState.gameRunning) return;
            const { x: newX, y: newY, dead } = calculateMove(
                gameState.player.x, gameState.player.y, dx, dy,
                gameState.level, gameState.trapsActive, gameState.skullPos
            );

            if (dead) {
                gameState.hasKey = false;
                gameState.player = { ...gameState.level.pStart };
                render();
                return;
            }

            if (newX === gameState.player.x && newY === gameState.player.y) return;

            gameState.player = { x: newX, y: newY };

            // Check key pickup
            if (newX === gameState.level.keyPos.x && newY === gameState.level.keyPos.y && !gameState.hasKey) {
                gameState.hasKey = true;
            }

            // Check win condition
            if (newX === gameState.level.doorPos.x && newY === gameState.level.doorPos.y && gameState.hasKey) {
                gameState.won = true;
            }

            render();
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function render() {
            updateTraps();
            updateSkull();
            checkPassiveDeath();

            const level = gameState.level;
            const html = `
                <div class="w-full h-full flex flex-col">
                    <div class="flex justify-between items-center p-4 bg-neutral-900 border-b border-neutral-800">
                        <button onclick="goHome()" class="px-4 py-2 bg-neutral-800 hover:bg-neutral-700 rounded-lg transition-colors">← Back</button>
                        <div class="text-center">
                            <h1 class="text-2xl font-bold">ESCAPE THE DUNGEON</h1>
                            <p class="text-sm text-neutral-400">Key: ${gameState.hasKey ? '✓' : '○'} | Traps: ${gameState.trapsActive ? '🔥' : '⌛'}</p>
                        </div>
                        <button onclick="resetGame()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg transition-colors">New Game</button>
                    </div>
                    <div class="flex-1 flex items-center justify-center overflow-hidden">
                        <div class="game-grid" style="grid-template-columns: repeat(${level.width}, 1fr); grid-template-rows: repeat(${level.height}, 1fr); aspect-ratio: ${level.width}/${level.height}; width: min(90vw, 90vh * ${level.width}/${level.height}); height: min(90vh, 90vw * ${level.height}/${level.width});">
                            ${renderCells()}
                        </div>
                    </div>
                    <div class="sm:hidden fixed bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                        <div></div>
                        <button class="control-btn w-16 h-16" onclick="handleMove(0, -1)">↑</button>
                        <div></div>
                        <button class="control-btn w-16 h-16" onclick="handleMove(-1, 0)">←</button>
                        <button class="control-btn w-16 h-16" onclick="handleMove(0, 1)">↓</button>
                        <button class="control-btn w-16 h-16" onclick="handleMove(1, 0)">→</button>
                    </div>
                </div>
                ${gameState.won ? `
                    <div class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50">
                        <div class="text-6xl mb-8 animate-bounce">🏆</div>
                        <h2 class="text-5xl font-black text-yellow-400 mb-8">YOU ESCAPED!</h2>
                        <button onclick="resetGame()" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xl font-bold transition-colors">Play Again</button>
                    </div>
                ` : ''}
            `;
            document.getElementById('app').innerHTML = html;
        }

        function renderCells() {
            const level = gameState.level;
            let html = '';

            for (let y = 0; y < level.height; y++) {
                for (let x = 0; x < level.width; x++) {
                    const tile = level.layout[y][x];
                    let classes = 'grid-cell';
                    let content = '';

                    if (tile === '1') {
                        classes += ' wall';
                    } else if (tile === '2') {
                        classes += ' trap';
                        if (gameState.trapsActive) classes += ' active';
                        content = gameState.trapsActive ? '🔥' : '';
                    } else if (tile === '3') {
                        classes += ' ice';
                    } else if (tile === '4') {
                        classes += ' portal';
                        content = '◆';
                    }

                    // Key
                    if (x === level.keyPos.x && y === level.keyPos.y && !gameState.hasKey) {
                        classes += ' key';
                        content = '🔑';
                    }

                    // Door
                    if (x === level.doorPos.x && y === level.doorPos.y) {
                        classes += ' door';
                        if (gameState.hasKey) {
                            classes += ' unlocked';
                            content = '🚪';
                        } else {
                            classes += ' locked';
                            content = '🔒';
                        }
                    }

                    // Skull
                    if (x === gameState.skullPos.x && y === gameState.skullPos.y) {
                        classes += ' skull';
                        content = '💀';
                    }

                    // Player
                    if (x === gameState.player.x && y === gameState.player.y) {
                        classes += ' player';
                        content = '●';
                    }

                    html += `<div class="${classes}">${content}</div>`;
                }
            }
            return html;
        }

        // ==========================================
        // UI HANDLERS
        // ==========================================
        function startGame() {
            gameState.level = generateLevel();
            gameState.player = { ...gameState.level.pStart };
            gameState.hasKey = false;
            gameState.won = false;
            gameState.gameRunning = true;
            render();
        }

        function resetGame() {
            startGame();
        }

        function goHome() {
            window.location.href = 'tiny_projects.html';
        }

        // ==========================================
        // KEYBOARD CONTROLS
        // ==========================================
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    handleMove(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    handleMove(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    handleMove(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    handleMove(1, 0);
                    break;
            }
        });

        // Game loop for animation updates
        setInterval(() => {
            render();
        }, 50);

        // ==========================================
        // INIT
        // ==========================================
        startGame();
    </script>
</body>
</html>
