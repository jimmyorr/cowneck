<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Opening Simulator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow-x: hidden;
        }

        /* Carousel Styles */
        .carousel-viewport {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #0f172a;
            border-radius: 1rem;
            border: 2px solid #1e293b;
        }

        .carousel-reel {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
            will-change: transform;
        }

        .carousel-item {
            flex: 0 0 140px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
        }

        .winning-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #facc15;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 15px #facc15;
        }

        /* Animations */
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        @keyframes drift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes rotate-hue { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 5px currentColor; } 50% { transform: scale(1.02); box-shadow: 0 0 20px currentColor; } }
        @keyframes cosmic { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

        /* Rarity Styles */
        .rarity-common { background: #475569; animation: pulse-subtle 3s infinite ease-in-out; }
        .rarity-uncommon { background: linear-gradient(135deg, #16a34a, #15803d); animation: pulse-subtle 2s infinite ease-in-out; }
        .rarity-rare { background: linear-gradient(135deg, #2563eb, #1d4ed8); animation: drift 4s infinite linear alternate; background-size: 200% 200%; }
        .rarity-epic { background: linear-gradient(135deg, #9333ea, #7e22ce); animation: drift 3s infinite linear alternate; background-size: 200% 200%; box-shadow: inset 0 0 15px rgba(255,255,255,0.2); }
        .rarity-legendary { background: linear-gradient(135deg, #d97706, #b45309); animation: breathe 2s infinite ease-in-out; border: 1px solid #fbbf24; }
        .rarity-mythic { background: linear-gradient(135deg, #dc2626, #991b1b); animation: breathe 1.5s infinite ease-in-out; border: 1px solid #f87171; }
        .rarity-exotic { background: linear-gradient(135deg, #0d9488, #115e59, #0d9488); background-size: 200% 200%; animation: drift 2s infinite linear; border: 1px solid #2dd4bf; }
        .rarity-divine { background: linear-gradient(135deg, #fbbf24, #fef08a, #fbbf24); background-size: 200% 200%; animation: drift 1.5s infinite linear; border: 2px solid #fff; color: #451a03; }
        .rarity-transcendent { background: linear-gradient(135deg, #db2777, #f472b6, #db2777); background-size: 200% 200%; animation: drift 1s infinite linear, rotate-hue 4s infinite linear; border: 2px solid #fff; }
        .rarity-eternal { background: radial-gradient(circle, #1e293b 0%, #000000 100%); background-size: 200% 200%; animation: cosmic 10s infinite linear; border: 2px solid #fff; box-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .rarity-secret { background: linear-gradient(45deg, #ff0000, #ffff00, #00ffff, #ff00ff, #ff0000); background-size: 400% 400%; animation: drift 3s ease infinite, rotate-hue 2s infinite linear; color: black; border: 2px solid white; }
        .rarity-infinity { background: radial-gradient(circle, #ffffff 0%, #e0f2fe 50%, #38bdf8 100%); background-size: 200% 200%; animation: breathe 0.5s infinite alternate, rotate-hue 1s infinite linear; color: #020617; border: 3px solid #fff; box-shadow: 0 0 50px #38bdf8, inset 0 0 30px #ffffff; }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 0.8s linear infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .loading-overlay {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center p-4 pb-20">

    <!-- Loading State -->
    <div id="loading" class="fixed inset-0 z-50 flex items-center justify-center loading-overlay">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-sky-400 uppercase tracking-widest text-xs">Syncing Collection...</p>
        </div>
    </div>

    <!-- UI Overlay for Notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Shop Modal -->
    <div id="shop-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-md max-h-[85vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-emerald-400 uppercase tracking-tighter">🛒 Global Market</h2>
                <button type="button" onclick="toggleShop()" class="text-slate-400 hover:text-white text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="overflow-y-auto pr-2 flex-1 space-y-8" id="shop-items-container">
                <!-- Shop items categories injected here -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-sm m-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-sky-400 uppercase tracking-tighter">Settings</h2>
                <button type="button" onclick="toggleSettings()" class="text-slate-400 hover:text-white text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="flex items-center justify-between bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div>
                    <div class="font-bold text-slate-200">Creative Mode</div>
                    <div class="text-xs text-slate-400 italic">Unlimited funds for testing</div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="creative-toggle" class="sr-only peer" onchange="toggleCreativeMode(this.checked)">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
            </div>
        </div>
    </div>

    <header class="w-full max-w-md flex justify-between items-center mb-8 mt-4 bg-slate-900/50 p-4 rounded-2xl border border-slate-800 backdrop-blur-md">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Balance</span>
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black text-yellow-400 leading-tight" id="coins">0</span>
                <span class="text-lg">🪙</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <span class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Packs</span>
                <div class="text-xl font-black leading-tight" id="packs-stat">0</div>
            </div>
            <div class="flex gap-1">
                <button type="button" onclick="toggleShop()" class="p-2 bg-slate-800/80 hover:bg-emerald-500/20 hover:text-emerald-400 rounded-xl transition-all border border-slate-700 text-lg">🛒</button>
                <button type="button" onclick="toggleSettings()" class="p-2 bg-slate-800/80 hover:bg-slate-700 rounded-xl transition-all border border-slate-700 text-lg">⚙️</button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex flex-col items-center">
        <!-- Carousel -->
        <div class="w-full mb-8 relative">
            <div class="carousel-viewport shadow-2xl">
                <div class="winning-line"></div>
                <div id="carousel-reel" class="carousel-reel">
                    <div class="carousel-item opacity-40">
                        <div class="text-5xl">📦</div>
                        <div class="mt-2 font-black text-xs text-sky-500 uppercase tracking-tighter">Tap to Open</div>
                    </div>
                </div>
            </div>
            <div id="sparkle-container" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col gap-3 w-full max-w-md">
            <div class="grid grid-cols-3 gap-2">
                <button type="button" onclick="openPack(1)" class="open-btn bg-sky-600 hover:bg-sky-500 text-white font-black py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-sky-900/20 disabled:opacity-50">1 PACK</button>
                <button type="button" onclick="openPack(5)" class="open-btn bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-indigo-900/20 disabled:opacity-50">5 PACKS</button>
                <button type="button" onclick="openPack(10)" class="open-btn bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-purple-900/20 disabled:opacity-50">10 PACKS</button>
            </div>

            <div class="flex gap-2">
                <input id="custom-amount" type="number" placeholder="Custom" min="1" max="100000" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 font-black focus:outline-none focus:border-emerald-500 transition-colors text-center text-sm" value="50">
                <button type="button" onclick="openCustom()" class="open-btn bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 px-6 rounded-xl transition-all active:scale-95 shadow-lg shadow-emerald-900/20 disabled:opacity-50 text-xs">OPEN MASS</button>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mt-2">
                <button type="button" onclick="sellAll('Common')" class="bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] font-black py-3 rounded-xl transition-colors uppercase tracking-widest">Sell Commons</button>
                <button type="button" onclick="sellAll('all')" class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-500 text-[10px] font-black py-3 rounded-xl transition-colors border border-rose-500/20 uppercase tracking-widest">Sell Duplicates</button>
            </div>
        </div>

        <!-- Display Case -->
        <section id="display-case-section" class="w-full mt-10 max-w-md mx-auto hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.2em] text-emerald-500 mb-3 ml-1">Rare Collectibles</h2>
            <div id="display-case" class="grid grid-cols-5 gap-3 bg-slate-900/50 border border-slate-800 p-4 rounded-2xl backdrop-blur-sm"></div>
        </section>

        <!-- Inventory -->
        <section class="w-full mt-8 max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-sky-400 ml-1">My Collection</h2>
                <span id="inv-count" class="text-[10px] font-black bg-slate-800 px-3 py-1 rounded-full text-slate-400">0 ITEMS</span>
            </div>
            <div id="inventory" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const packCost = 25;
        const rarityOrder = ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary', 'Mythic', 'Exotic', 'Divine', 'Transcendent', 'Eternal', 'Secret', 'Infinity'];
        const rarityWeights = {
            Common: 50,
            Uncommon: 25,
            Rare: 12,
            Epic: 6,
            Legendary: 3,
            Mythic: 2,
            Exotic: 1,
            Divine: 0.6,
            Transcendent: 0.3,
            Eternal: 0.2,
            Secret: 0.1,
            Infinity: 0.05
        };

        const itemTemplates = {
            Common: ['Scrap Token', 'Dull Card', 'Vintage Sticker', 'Basic Emblem'],
            Uncommon: ['Prism Chip', 'Mystic Coin', 'Silver Banner', 'Lunar Patch'],
            Rare: ['Nebula Shard', 'Celestial Medal', 'Orbit Badge', 'Aurora Seal'],
            Epic: ['Pulse Crystal', 'Quantum Lens', 'Starlight Crest', 'Vortex Sigil'],
            Legendary: ['Phoenix Feather', 'Aether Globe', 'Solar Prism', 'Nova Fragment'],
            Mythic: ['Dragon Scale', 'Eclipse Shard', 'Chrono Relic', 'Spectral Orb'],
            Exotic: ['Void Shard', 'Auric Rune', 'Galactic Tear', 'Cosmic Pearl'],
            Divine: ['Celestial Crown', 'Empyrean Flame', 'Seraphic Talisman', 'Divine Luminar'],
            Transcendent: ['Infinity Blade', 'Nebula Heart', 'Chronicle Stone', 'Astral Signet'],
            Eternal: ['Endless Chalice', 'Timeless Crown', 'Eternal Thread', 'Infinity Eye'],
            Secret: ['Prismatic Secret', 'Hidden Cosmos', 'Legendary Codex', 'Mythical Phantom'],
            Infinity: ['Omega Glyph', 'Paradox Core', 'Absolute Beacon', 'Void Sovereign']
        };

        const rarityValue = {
            Common: 5,
            Uncommon: 15,
            Rare: 40,
            Epic: 120,
            Legendary: 350,
            Mythic: 900,
            Exotic: 1800,
            Divine: 4000,
            Transcendent: 9000,
            Eternal: 20000,
            Secret: 50000,
            Infinity: 120000
        };

        const gameState = {
            coins: 100,
            inventory: [],
            totalOpened: 0,
            creativeMode: false
        };

        function weightedChoice(weights) {
            const entries = Object.entries(weights);
            const total = entries.reduce((sum, [, weight]) => sum + weight, 0);
            let roll = Math.random() * total;
            for (const [key, weight] of entries) {
                if (roll < weight) return key;
                roll -= weight;
            }
            return entries[entries.length - 1][0];
        }

        function randomFrom(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function createCollectible() {
            const rarity = weightedChoice(rarityWeights);
            const name = randomFrom(itemTemplates[rarity]);
            return {
                id: `${rarity}-${name}-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
                name,
                rarity,
                value: rarityValue[rarity],
                colorClass: `rarity-${rarity.toLowerCase()}`
            };
        }

        function showToast(message, variant = 'default') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'rounded-2xl px-4 py-3 text-sm font-semibold shadow-xl border border-slate-700 backdrop-blur-sm transition-all duration-300';
            if (variant === 'success') {
                toast.classList.add('bg-emerald-500/15', 'text-emerald-300', 'border-emerald-500/25');
            } else if (variant === 'warning') {
                toast.classList.add('bg-amber-500/15', 'text-amber-300', 'border-amber-500/25');
            } else if (variant === 'danger') {
                toast.classList.add('bg-rose-500/15', 'text-rose-300', 'border-rose-500/25');
            } else {
                toast.classList.add('bg-slate-900/95', 'text-slate-200');
            }
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function updateUI() {
            document.getElementById('coins').textContent = gameState.coins.toLocaleString();
            document.getElementById('packs-stat').textContent = gameState.totalOpened.toLocaleString();
            document.getElementById('inv-count').textContent = `${gameState.inventory.length.toLocaleString()} ITEMS`;
            renderInventory();
            renderDisplayCase();
            renderShop();
        }

        function renderInventory() {
            const inventoryContainer = document.getElementById('inventory');
            if (!gameState.inventory.length) {
                inventoryContainer.innerHTML = '<div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center text-slate-500">No collectibles yet — open some packs to start your collection.</div>';
                return;
            }

            const grouped = gameState.inventory.reduce((acc, item) => {
                const key = `${item.rarity}|${item.name}`;
                if (!acc[key]) acc[key] = { ...item, count: 0 };
                acc[key].count += 1;
                return acc;
            }, {});

            const entries = Object.values(grouped).sort((a, b) => rarityOrder.indexOf(a.rarity) - rarityOrder.indexOf(b.rarity) || b.count - a.count);
            inventoryContainer.innerHTML = entries.map(item => `
                <div class="flex items-center justify-between gap-4 bg-slate-900/80 border border-slate-800 rounded-2xl p-3 ${item.colorClass}">
                    <div>
                        <div class="text-sm uppercase tracking-[0.18em] text-slate-400">${item.rarity}</div>
                        <div class="font-black text-slate-100">${item.name}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-400">x${item.count}</div>
                        <div class="text-sm font-bold text-slate-100">${item.value.toLocaleString()} 🪙</div>
                    </div>
                </div>
            `).join('');
        }

        function renderDisplayCase() {
            const displaySection = document.getElementById('display-case-section');
            const caseGrid = document.getElementById('display-case');
            const rareItems = gameState.inventory
                .filter(item => rarityOrder.indexOf(item.rarity) >= rarityOrder.indexOf('Legendary'))
                .sort((a, b) => rarityOrder.indexOf(b.rarity) - rarityOrder.indexOf(a.rarity) || b.value - a.value)
                .slice(0, 6);

            if (!rareItems.length) {
                displaySection.classList.add('hidden');
                caseGrid.innerHTML = '';
                return;
            }

            displaySection.classList.remove('hidden');
            caseGrid.innerHTML = rareItems.map(item => `
                <div class="p-3 rounded-2xl text-center ${item.colorClass}">
                    <div class="text-4xl">✨</div>
                    <div class="mt-3 text-xs uppercase tracking-[0.2em] text-slate-200/70">${item.rarity}</div>
                    <div class="font-black mt-2 text-slate-100">${item.name}</div>
                    <div class="mt-2 text-[10px] uppercase tracking-[0.3em] text-slate-200">${item.value.toLocaleString()} 🪙</div>
                </div>
            `).join('');
        }

        function renderShop() {
            const shopContainer = document.getElementById('shop-items-container');
            shopContainer.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 rounded-3xl p-4">
                    <div class="text-xs uppercase tracking-[0.25em] text-emerald-300 font-black mb-2">Starter Offer</div>
                    <div class="text-sm text-slate-200 mb-3">Double your next 10 packs with this limited-time booster.</div>
                    <button type="button" onclick="showToast('This shop offer is coming soon.', 'warning')" class="w-full py-3 rounded-2xl bg-emerald-500/15 border border-emerald-500 text-emerald-300 font-black hover:bg-emerald-500/25 transition">Unlock Booster</button>
                </div>
            `;
        }

        function openPack(amount) {
            amount = Math.max(1, Number(amount) || 0);
            if (!amount) {
                showToast('Enter a valid pack amount.', 'warning');
                return;
            }

            const totalCost = amount * packCost;
            if (!gameState.creativeMode && gameState.coins < totalCost) {
                showToast('Not enough coins to open that many packs.', 'danger');
                return;
            }

            if (!gameState.creativeMode) {
                gameState.coins -= totalCost;
            }

            const opened = [];
            for (let i = 0; i < amount; i += 1) {
                opened.push(createCollectible());
            }
            gameState.inventory.push(...opened);
            gameState.totalOpened += amount;

            const topRarity = opened.reduce((best, item) => rarityOrder.indexOf(item.rarity) > rarityOrder.indexOf(best.rarity) ? item : best, opened[0]);
            updateUI();
            showToast(`Opened ${amount} pack${amount === 1 ? '' : 's'} and found ${topRarity.rarity} item: ${topRarity.name}!`, 'success');
        }

        function openCustom() {
            const amount = parseInt(document.getElementById('custom-amount').value, 10);
            openPack(amount);
        }

        function sellAll(rarity) {
            if (!gameState.inventory.length) {
                showToast('Nothing to sell yet.', 'warning');
                return;
            }

            if (rarity === 'Common') {
                const commons = gameState.inventory.filter(item => item.rarity === 'Common');
                if (!commons.length) {
                    showToast('No common items in your collection.', 'warning');
                    return;
                }
                const value = commons.reduce((sum, item) => sum + item.value, 0);
                gameState.inventory = gameState.inventory.filter(item => item.rarity !== 'Common');
                gameState.coins += value;
                updateUI();
                showToast(`Sold ${commons.length} common item${commons.length === 1 ? '' : 's'} for ${value.toLocaleString()} coins.`, 'success');
                return;
            }

            const grouped = gameState.inventory.reduce((acc, item) => {
                const key = `${item.rarity}|${item.name}`;
                acc[key] = acc[key] || { item, count: 0 };
                acc[key].count += 1;
                return acc;
            }, {});

            let sold = 0;
            let value = 0;
            const kept = [];

            Object.values(grouped).forEach(({ item, count }) => {
                kept.push(item);
                if (count > 1) {
                    sold += count - 1;
                    value += (count - 1) * item.value;
                }
            });

            if (sold === 0) {
                showToast('No duplicate items to sell.', 'warning');
                return;
            }

            gameState.inventory = kept;
            gameState.coins += value;
            updateUI();
            showToast(`Sold ${sold} duplicate item${sold === 1 ? '' : 's'} for ${value.toLocaleString()} coins.`, 'success');
        }

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function toggleCreativeMode(enabled) {
            gameState.creativeMode = enabled;
            if (enabled) {
                gameState.coins = 999999;
                showToast('Creative Mode enabled. Unlimited coins unlocked.', 'success');
            } else {
                showToast('Creative Mode disabled. Your collection stays intact.', 'warning');
            }
            updateUI();
        }

        window.addEventListener('load', () => {
            updateUI();
            document.getElementById('loading').style.display = 'none';
        });
    </script>
</body>
</html>
