<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonaga - Hexagonal Strategy Game</title>
    <meta name="description" content="A strategic hexagonal board game of movement and connection. Slide your tokens and rearrange the board to win.">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            700: '#44403c',
                            800: '#292524',
                            900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>

    <!-- React and Dependencies via Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react"
      }
    }
    </script>
    
    <!-- Babel Standalone to compile JSX on the fly -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            background-color: #f5f5f4; /* stone-100 */
            color: #1c1917; /* stone-900 */
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            min-height: 100vh;
        }

        /* Smooth fade-in for the app */
        .app-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #d6d3d1;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: #1c1917;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <a href="index.html" class="fixed top-6 left-6 z-50 text-stone-400 hover:text-stone-900 transition-colors flex items-center gap-2 font-medium text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Games
    </a>
    <div id="root">
        <!-- Initial Splash / Loader -->
        <div class="flex flex-col items-center justify-center min-h-screen gap-6 bg-stone-100">
            <div class="loader"></div>
            <div class="flex flex-col items-center gap-2">
                <h1 class="text-3xl font-display font-black tracking-tighter text-stone-900 uppercase">Nonaga</h1>
                <p class="text-sm font-medium text-stone-500 animate-pulse">Initializing strategic board...</p>
            </div>
        </div>
    </div>

    <!-- Application Mounting Logic -->
    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        
        /**
         * Dynamic Loader for the React component in nonaga.js
         * This handles the JSX transformation and module resolution at runtime.
         */
        async function mountApp() {
            const rootElement = document.getElementById('root');
            
            try {
                // 1. Fetch the user's nonaga.js source
                const response = await fetch('nonaga.js');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const source = await response.text();
                
                // 2. Transform the source with Babel
                // We use the 'react' preset to handle JSX
                const result = Babel.transform(source, {
                    presets: ['react'],
                    // Ensure imports are preserved as ESM
                    sourceMaps: false,
                    compact: false
                });
                
                if (!result || !result.code) throw new Error("Failed to transform nonaga.js");
                
                // 3. Create a blob for the transformed module
                // We wrap it in a URL that can be imported
                const blob = new Blob([result.code], { type: 'application/javascript' });
                const moduleUrl = URL.createObjectURL(blob);
                
                // 4. Dynamic import of the transformed code
                const module = await import(moduleUrl);
                const App = module.default;
                
                if (!App) throw new Error("nonaga.js does not have a default export. Ensure it has 'export default function App()'.");
                
                // 5. Render the application
                const root = createRoot(rootElement);
                root.render(
                    <div className="app-fade-in h-full">
                        <App />
                    </div>
                );
                
                // Cleanup the object URL
                URL.revokeObjectURL(moduleUrl);
                
            } catch (error) {
                console.error("Nonaga Initialization Error:", error);
                rootElement.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-6 bg-stone-100">
                        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-red-100 flex flex-col items-center text-center gap-4">
                            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <h2 class="text-2xl font-display font-bold text-stone-900">Failed to load Nonaga</h2>
                            <p class="text-stone-600 text-sm leading-relaxed">
                                We encountered an error while trying to compile and run your code. 
                                Make sure <strong>nonaga.js</strong> is in the same directory and contains valid React code.
                            </p>
                            <div class="w-full p-4 bg-stone-50 rounded-xl text-left overflow-auto max-h-32">
                                <code class="text-xs text-red-600 font-mono">${error.message}</code>
                            </div>
                            <button onclick="window.location.reload()" class="mt-4 px-6 py-2 bg-stone-900 text-white rounded-xl font-bold hover:bg-stone-800 transition-colors">
                                Try Again
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // Execute the mount
        mountApp();
    </script>
</body>
</html>
