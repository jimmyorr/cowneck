<!DOCTYPE html>
<html lang="en">

<head>

    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stand Clear - MTA Audio Voice Mimicry Game</title>
    <meta name="description" content="Listen to the MTA subway chime, then hold to record and match the chime's audio amplitude envelope and pitch to see if you can voice the announcement perfectly!">

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React and Dependencies via Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react"
      }
    }
    </script>

    <!-- Babel Standalone to compile JSX on the fly -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #171717; /* neutral-900 */
            color: #f5f5f5; /* neutral-100 */
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            min-height: 100vh;
        }

        /* Smooth fade-in for the app */
        .app-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <a href="jimmy.html" class="fixed top-6 left-6 z-50 text-neutral-500 hover:text-neutral-200 transition-colors flex items-center gap-2 font-medium text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Games
    </a>

    <div id="root">
        <!-- Initial Splash / Loader -->
        <div class="flex flex-col items-center justify-center min-h-screen gap-6 bg-neutral-900 text-white">
            <div class="relative flex items-center justify-center">
                <!-- Outer glowing pulsing ring -->
                <div class="absolute w-24 h-24 rounded-full bg-orange-500/20 animate-ping duration-1000"></div>
                <!-- Subway logo / icon container -->
                <div class="relative w-20 h-20 bg-gradient-to-br from-orange-500 to-red-600 rounded-full flex items-center justify-center shadow-lg border border-orange-400/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <rect x="4" y="3" width="16" height="14" rx="2" />
                        <path d="M12 17v4M8 21h8M18 7v4M6 7v4" />
                    </svg>
                </div>
            </div>
            <div class="flex flex-col items-center gap-3 text-center px-4">
                <h1 class="text-3xl font-display font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500 uppercase">STAND CLEAR</h1>
                <div class="h-1 w-20 bg-gradient-to-r from-orange-500 to-red-600 rounded-full"></div>
                <p class="text-sm font-medium text-neutral-400 tracking-wide animate-pulse">Initializing audio engines & loading MTA chimes...</p>
            </div>
        </div>
    </div>

    <!-- Application Mounting Logic -->
    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';

        /**
         * Dynamic Loader for the React component in stand-clear.jsx
         * This handles the JSX transformation and module resolution at runtime.
         */
        async function mountApp() {
            const rootElement = document.getElementById('root');

            try {
                // 1. Fetch the user's stand-clear.jsx source
                const response = await fetch('stand-clear.jsx');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const source = await response.text();

                // 2. Transform the source with Babel
                const result = Babel.transform(source, {
                    presets: ['react'],
                    // Ensure imports are preserved as ESM
                    sourceMaps: false,
                    compact: false
                });

                if (!result || !result.code) throw new Error("Failed to transform stand-clear.jsx");

                // 3. Create a blob for the transformed module wrapped in a URL
                const blob = new Blob([result.code], { type: 'application/javascript' });
                const moduleUrl = URL.createObjectURL(blob);

                // 4. Dynamic import of the transformed code
                const module = await import(moduleUrl);
                const App = module.default;

                if (!App) throw new Error("stand-clear.jsx does not have a default export. Ensure it has 'export default function App()'.");

                // 5. Render the application
                const root = createRoot(rootElement);
                root.render(
                    <div className="app-fade-in h-full">
                        <App />
                    </div>
                );

                // Cleanup the object URL
                URL.revokeObjectURL(moduleUrl);

            } catch (error) {
                console.error("Stand Clear Initialization Error:", error);
                rootElement.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-6 bg-neutral-950 text-white">
                        <div class="max-w-md w-full bg-neutral-900 p-8 rounded-3xl shadow-2xl border border-red-950 flex flex-col items-center text-center gap-4">
                            <div class="w-16 h-16 bg-red-950/50 text-red-500 rounded-full flex items-center justify-center mb-2 border border-red-900/30">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <h2 class="text-2xl font-display font-bold text-white">Subway Delay!</h2>
                            <p class="text-neutral-400 text-sm leading-relaxed">
                                We encountered an error while trying to compile and run your code. 
                                Make sure <strong>stand-clear.jsx</strong> is in the same directory and contains valid React code.
                            </p>
                            <div class="w-full p-4 bg-neutral-950 rounded-xl text-left overflow-auto max-h-32 border border-neutral-800">
                                <code class="text-xs text-red-500 font-mono">${error.message}</code>
                            </div>
                            <button onclick="window.location.reload()" class="mt-4 px-6 py-3 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-xl font-bold hover:brightness-110 active:scale-95 transition-all">
                                Try Again
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        // Execute the mount
        mountApp();
    </script>
</body>

</html>
