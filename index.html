<html lang="en">

<head>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            background-image:
              radial-gradient(circle at 10% 15%, rgba(99, 102, 241, 0.25) 0%, transparent 45%),
              radial-gradient(circle at 90% 85%, rgba(244, 114, 182, 0.2) 0%, transparent 45%),
              radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.15) 0%, transparent 60%);
        }

        .container {
            text-align: center;
        }

        .links {
            margin-top: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .links a {
            text-decoration: none;
            color: #3b82f6;
            padding: 10px 18px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 500;
        }

        .links a:hover {
            color: #fff;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .links a.link-games:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .links a.link-projects:hover {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-color: transparent;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #080d1a;
                background-image:
                  radial-gradient(circle at 10% 15%, rgba(99, 102, 241, 0.15) 0%, transparent 45%),
                  radial-gradient(circle at 90% 85%, rgba(244, 114, 182, 0.12) 0%, transparent 45%),
                  radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 60%);
                color: #e2e8f0;
            }
            .links {
                color: #94a3b8;
            }
            .links a {
                background: rgba(255, 255, 255, 0.05);
                color: #f8fafc;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }
            .links a:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
                border-color: rgba(255, 255, 255, 0.2);
            }
            #chester-link img {
                box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 30px rgba(99, 102, 241, 0.2);
            }
        }

        #chester-link {
            display: inline-block;
            width: 400px;
            max-width: 400px;
            transition: transform 0.2s ease;
            margin: 0 auto;
        }

        #chester-link img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            /* Fixes the artifact dots at the corners of the original image */
            mask-image: radial-gradient(circle, white 100%, black 100%);
            -webkit-mask-image: -webkit-radial-gradient(circle, white 100%, black 100%);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        #chester-link.bouncing-chester {
            position: fixed;
            width: 150px;
            max-width: 150px;
            height: auto;
            top: 20px;
            left: 20px;
            z-index: 9999;
            transform: translate(0, 0);
            transition: none;
            cursor: pointer;
        }

        #drop-button {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            padding: 14px 30px;
            border: none;
            border-radius: 999px;
            color: white;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.22), 0 0 30px rgba(255,255,255,0.18), inset 0 0 20px rgba(255,255,255,0.12);
            background: linear-gradient(135deg, #f43f5e, #fb7185, #facc15, #22c55e, #0ea5e9, #a855f7);
            background-size: 350% 350%;
            animation: rainbow-glow 3s ease infinite, drop-glow 1.8s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.32);
            display: none;
            z-index: 10000;
        }

        @keyframes rainbow-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes drop-glow {
            0%, 100% {
                box-shadow: 0 22px 48px rgba(0,0,0,0.26), 0 0 32px rgba(255,255,255,0.22), inset 0 0 20px rgba(255,255,255,0.14);
                transform: translateX(-50%) scale(1);
            }
            50% {
                box-shadow: 0 26px 60px rgba(0,0,0,0.28), 0 0 48px rgba(255,255,255,0.32), inset 0 0 28px rgba(255,255,255,0.18);
                transform: translateX(-50%) scale(1.04);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a id="chester-link" href="https://linktr.ee/jimmyorr">
            <img src="./chester.webp" alt="Chester" />
        </a>
        <div class="links">
            <a href="games/" class="link-games">games</a>
            <a href="projects/" class="link-projects">projects</a>
        </div>
    </div>
    <button id="drop-button">DROP</button>
    <script>
        const initChesterBounce = () => {
            const chester = document.getElementById('chester-link');
            const dropButton = document.getElementById('drop-button');
            if (!chester || !dropButton) return;

            const cleanup = () => {
                if (chester._chesterRafId != null) {
                    cancelAnimationFrame(chester._chesterRafId);
                    chester._chesterRafId = null;
                }
                chester.classList.remove('bouncing-chester');
                chester.style.position = '';
                chester.style.top = '';
                chester.style.left = '';
                chester.style.width = '';
                chester.style.transform = '';
                chester.style.pointerEvents = '';
                dropButton.style.display = 'none';
                dropButton.onclick = null;
            };

            cleanup();

            const shouldBounce = Math.random() < 0.1;
            if (!shouldBounce) return;

            const rect = chester.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;

            dropButton.style.display = 'block';
            dropButton.onclick = () => {
                dropButton.style.display = 'none';
                startDvdAnimation();
            };

            const startDvdAnimation = () => {
                const startX = rect.left;
                const startY = rect.top;
                const dropDistance = 120;
                const duration = 500;
                let startTime = null;
                let x = startX;
                let y = startY - dropDistance;
                let vx = 4 + Math.random() * 2;
                let vy = 4 + Math.random() * 2;

                chester.classList.add('bouncing-chester');
                chester.style.position = 'fixed';
                chester.style.width = '150px';
                chester.style.left = `${startX}px`;
                chester.style.top = `${y}px`;
                chester.style.pointerEvents = 'auto';

                const easeOut = t => 1 - Math.pow(1 - t, 3);

                const update = timestamp => {
                    if (chester._chesterRafId == null) return;
                    if (startTime === null) startTime = timestamp;
                    const elapsed = timestamp - startTime;

                    const viewportWidth = window.innerWidth;
                    const viewportHeight = window.innerHeight;
                    const currentRect = chester.getBoundingClientRect();
                    const imgWidth = currentRect.width;
                    const imgHeight = currentRect.height;

                    if (elapsed < duration) {
                        const progress = easeOut(Math.min(elapsed / duration, 1));
                        y = startY - dropDistance + progress * dropDistance;
                        chester.style.top = `${y}px`;
                        chester._chesterRafId = requestAnimationFrame(update);
                        return;
                    }

                    x += vx;
                    y += vy;

                    if (x <= 0) {
                        x = 0;
                        vx = Math.abs(vx);
                    } else if (x + imgWidth >= viewportWidth) {
                        x = viewportWidth - imgWidth;
                        vx = -Math.abs(vx);
                    }

                    if (y <= 0) {
                        y = 0;
                        vy = Math.abs(vy);
                    } else if (y + imgHeight >= viewportHeight) {
                        y = viewportHeight - imgHeight;
                        vy = -Math.abs(vy);
                    }

                    chester.style.left = `${x}px`;
                    chester.style.top = `${y}px`;
                    chester._chesterRafId = requestAnimationFrame(update);
                };

                chester._chesterRafId = requestAnimationFrame(update);
            };

            window.addEventListener('pagehide', cleanup, { once: true });
            window.addEventListener('beforeunload', cleanup, { once: true });
        };

        window.addEventListener('pageshow', initChesterBounce);
    </script>
</body>

</html>
