<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cowneck</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RNVL7JZVJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-6RNVL7JZVJ');

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
        }

        .links {
            margin-top: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .links a {
            text-decoration: none;
            color: #0066cc;
            padding: 10px 15px;
            border: 1px solid #0066cc22;
            border-radius: 8px;
            background: #fff;
            transition: all 0.2s ease;
        }

        .links a:hover {
            color: #fff;
            text-decoration: none;
        }

        .links a.link-games:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .links a.link-projects:hover {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-color: transparent;
        }

        #chester-link {
            display: inline-block;
            width: 220px;
            max-width: 220px;
            transition: transform 0.2s ease;
            margin: 0 auto;
        }

        #chester-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        .bouncing-chester {
            position: fixed;
            width: 110px;
            max-width: 110px;
            height: auto;
            top: 20px;
            left: 20px;
            z-index: 9999;
            transform: translate(0, 0);
            transition: none;
            cursor: pointer;
        }

        .chester-fall {
            animation: chester-drop 0.85s ease-out forwards;
        }

        @keyframes chester-drop {
            0% {
                top: -180px;
                opacity: 0;
            }
            40% {
                opacity: 1;
            }
            100% {
                top: 20px;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a id="chester-link" href="https://linktr.ee/jimmyorr">
            <img src="./chester.webp" alt="Chester" />
        </a>
        <div class="links">
            <a href="games/" class="link-games">games</a>
            <a href="projects/" class="link-projects">projects</a>
        </div>
    </div>
    <script>
        const initChesterBounce = () => {
            const chester = document.getElementById('chester-link');
            if (!chester) return;

            chester.classList.remove('bouncing-chester');
            chester.style.position = '';
            chester.style.top = '';
            chester.style.left = '';
            chester.style.width = '';
            chester.style.transform = '';

            const shouldBounce = Math.random() < 0.1;
            if (!shouldBounce) return;

            chester.classList.add('bouncing-chester');
            chester.style.position = 'fixed';
            chester.style.top = '-180px';
            chester.style.left = '20px';
            chester.classList.add('chester-fall');

            let x = 20;
            let y = 20;
            let vx = 3 + Math.random() * 2;
            let vy = 3 + Math.random() * 2;
            const padding = 12;
            let rafId = null;

            const startBounce = () => {
                chester.classList.remove('chester-fall');
                x = 20;
                y = 20;
                rafId = requestAnimationFrame(update);
            };

            const update = () => {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const rect = chester.getBoundingClientRect();
                const imgWidth = rect.width;
                const imgHeight = rect.height;

                x += vx;
                y += vy;

                if (x <= padding) {
                    x = padding;
                    vx = Math.abs(vx);
                } else if (x + imgWidth + padding >= viewportWidth) {
                    x = viewportWidth - imgWidth - padding;
                    vx = -Math.abs(vx);
                }

                if (y <= padding) {
                    y = padding;
                    vy = Math.abs(vy);
                } else if (y + imgHeight + padding >= viewportHeight) {
                    y = viewportHeight - imgHeight - padding;
                    vy = -Math.abs(vy);
                }

                chester.style.left = `${x}px`;
                chester.style.top = `${y}px`;

                rafId = requestAnimationFrame(update);
            };

            chester.addEventListener('animationend', startBounce, { once: true });

            const cleanup = () => {
                if (rafId !== null) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
                chester.classList.remove('bouncing-chester');
                chester.style.position = '';
                chester.style.top = '';
                chester.style.left = '';
                chester.style.width = '';
                chester.style.transform = '';
            };

            window.addEventListener('pagehide', cleanup, { once: true });
            window.addEventListener('beforeunload', cleanup, { once: true });
        };

        window.addEventListener('pageshow', initChesterBounce);
    </script>
</body>

</html>
