<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cowneck</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RNVL7JZVJ"></script>

        function gtag() { dataLayer.push(arguments); }

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
        }

        .links {
            margin-top: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .links a {
            text-decoration: none;
            color: #0066cc;
            padding: 10px 15px;
            border: 1px solid #0066cc22;
            border-radius: 8px;
            background: #fff;
            transition: all 0.2s ease;
        }

        .links a:hover {
            color: #fff;
            text-decoration: none;
        }

        .links a.link-games:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .links a.link-projects:hover {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-color: transparent;
        }

        #chester-link {
            display: inline-block;
            width: 360px;
            max-width: 360px;
            transition: transform 0.2s ease;
            margin: 0 auto;
        }

        #chester-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        .bouncing-chester {
            position: fixed;
            width: 150px;
            max-width: 150px;
            height: auto;
            top: 20px;
            left: 20px;
            z-index: 9999;
            transform: translate(0, 0);
            transition: none;
            cursor: pointer;
        }

        #drop-button {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            padding: 14px 26px;
            border: none;
            border-radius: 999px;
            color: white;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0,0,0,0.18);
            background: linear-gradient(135deg, #f43f5e, #fb7185, #facc15, #22c55e, #0ea5e9, #a855f7);
            background-size: 300% 300%;
            animation: rainbow-glow 3s ease infinite;
            display: none;
            z-index: 10000;
        }

        @keyframes rainbow-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body>
    <div class="container">
        <a id="chester-link" href="https://linktr.ee/jimmyorr">
            <img src="./chester.webp" alt="Chester" />
        </a>
        <div class="links">
            <a href="games/" class="link-games">games</a>
            <a href="projects/" class="link-projects">projects</a>
        </div>
    </div>
    <button id="drop-button">DROP</button>
    <script>
        const initChesterBounce = () => {
            const chester = document.getElementById('chester-link');
            const dropButton = document.getElementById('drop-button');
            if (!chester || !dropButton) return;

            const cleanup = () => {
                if (chester._chesterRafId != null) {
                    cancelAnimationFrame(chester._chesterRafId);
                    chester._chesterRafId = null;
                }
                chester.classList.remove('bouncing-chester');
                chester.style.position = '';
                chester.style.top = '';
                chester.style.left = '';
                chester.style.width = '';
                chester.style.transform = '';
                chester.style.pointerEvents = '';
                dropButton.style.display = 'none';
                dropButton.onclick = null;
            };

            cleanup();

            const shouldBounce = Math.random() < 0.1;
            if (!shouldBounce) return;

            const rect = chester.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;

            dropButton.style.display = 'block';
            dropButton.onclick = () => {
                dropButton.style.display = 'none';
                startDvdAnimation();
            };

            const startDvdAnimation = () => {
                const startX = rect.left;
                const startY = rect.top;
                const dropDistance = 120;
                const duration = 500;
                let startTime = null;
                let x = startX;
                let y = startY - dropDistance;
                let vx = 4 + Math.random() * 2;
                let vy = 4 + Math.random() * 2;

                chester.classList.add('bouncing-chester');
                chester.style.position = 'fixed';
                chester.style.left = `${startX}px`;
                chester.style.top = `${y}px`;
                chester.style.pointerEvents = 'auto';

                const easeOut = t => 1 - Math.pow(1 - t, 3);

                const update = timestamp => {
                    if (chester._chesterRafId == null) return;
                    if (startTime === null) startTime = timestamp;
                    const elapsed = timestamp - startTime;

                    const viewportWidth = window.innerWidth;
                    const viewportHeight = window.innerHeight;
                    const currentRect = chester.getBoundingClientRect();
                    const imgWidth = currentRect.width;
                    const imgHeight = currentRect.height;

                    if (elapsed < duration) {
                        const progress = easeOut(Math.min(elapsed / duration, 1));
                        y = startY - dropDistance + progress * dropDistance;
                        chester.style.top = `${y}px`;
                        chester._chesterRafId = requestAnimationFrame(update);
                        return;
                    }

                    x += vx;
                    y += vy;

                    if (x <= 0) {
                        x = 0;
                        vx = Math.abs(vx);
                    } else if (x + imgWidth >= viewportWidth) {
                        x = viewportWidth - imgWidth;
                        vx = -Math.abs(vx);
                    }

                    if (y <= 0) {
                        y = 0;
                        vy = Math.abs(vy);
                    } else if (y + imgHeight >= viewportHeight) {
                        y = viewportHeight - imgHeight;
                        vy = -Math.abs(vy);
                    }

                    chester.style.left = `${x}px`;
                    chester.style.top = `${y}px`;
                    chester._chesterRafId = requestAnimationFrame(update);
                };

                chester._chesterRafId = requestAnimationFrame(update);
            };

            window.addEventListener('pagehide', cleanup, { once: true });
            window.addEventListener('beforeunload', cleanup, { once: true });
        };

        window.addEventListener('pageshow', initChesterBounce);
    </script>
</body>

</html>
