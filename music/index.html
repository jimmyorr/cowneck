<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimmy's Liked Music</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="topbar">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="#ff0000" width="28" height="28">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"
            />
          </svg>
          <h1>Jimmy's Liked Music</h1>
        </div>
        <div class="controls">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search songs or artists..."
          />
          <select id="sortSelect" class="sort-select">
            <option value="recent">Recently liked</option>
            <option value="titleAsc">Title (A-Z)</option>
            <option value="titleDesc">Title (Z-A)</option>
            <option value="artistAsc">Artist (A-Z)</option>
            <option value="viewsDesc">Views (high to low)</option>
          </select>
          <div class="toggle-container">
            <span class="toggle-label">Hidden gems</span>
            <label class="switch">
              <input type="checkbox" id="hiddenGemsToggle">
              <span class="slider round"></span>
            </label>
          </div>
          <div class="tabs-container">
            <button class="tab-btn active" data-view="grid">Gallery</button>
            <button class="tab-btn" data-view="insights">Hipster index</button>
            <button class="tab-btn" data-view="artists">Top artists</button>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <div class="stats-card">
            <h2>Library stats</h2>
            <div class="stat-item">
              <span class="stat-value" id="totalSongsCount">0</span>
              <span class="stat-label">Total tracks</span>
            </div>
          </div>

          <div class="top-artists">
            <h2>Top artists</h2>
            <ul id="topArtistsList" class="artist-list">
              <!-- Rendered via JS -->
            </ul>
          </div>
        </aside>

        <main class="content">
          <div id="chartContainer" class="chart-container hidden">
            <canvas id="insightsChart"></canvas>
          </div>
          <div id="songsGrid" class="songs-grid">
            <!-- Cards rendered via JS -->
          </div>
          <div id="sentinel"></div>
          <div id="loading" class="loading">Loading library...</div>
          <div id="noResults" class="no-results hidden">
            No songs found matching your search.
          </div>
        </main>
      </div>
    </div>

    <div id="bottomPlayer" class="bottom-player hidden">
      <div class="player-info" id="playerInfo">
        <img src="" id="playerThumbnail" class="player-thumbnail" alt="" />
        <div class="player-text">
          <div id="playerTitle" class="player-title"></div>
          <div id="playerArtist" class="player-artist"></div>
        </div>
      </div>
      <div class="player-controls">
        <button id="playPauseBtn" class="play-pause-btn" disabled>
          <svg
            id="playIcon"
            viewBox="0 0 24 24"
            width="32"
            height="32"
            fill="white"
          >
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg
            id="pauseIcon"
            viewBox="0 0 24 24"
            width="32"
            height="32"
            fill="white"
            class="hidden"
          >
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
      </div>
      <div
        id="ytplayerContainer"
        style="position: absolute; top: -9999px; width: 1px; height: 1px"
      >
        <div id="ytplayer"></div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
